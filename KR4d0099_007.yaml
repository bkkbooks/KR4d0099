body:
  text: 陶山集卷七宋陸佃撰表謝資善堂修定說文書成賜銀絹表臣某言近以臣修定說文書成伏䝉聖恩特賜銀絹尋具狀奏聞不敢祇受伏奉聖㫖不許辭免者鉛黃初具曽微隻字之奇銀幣曲加更誤十行之重賞踰所藝愧溢于顔伏念臣本以下愚親逢上聖早玷龍飛之榜旋居鷺集之班稍逮陛升寖䝉器使一覲清光之邃屢叨殊寵之榮恭惟皇帝陛下獨智泛觀同仁博施憲天為大濟世用光夬決明庭繩難施于農政汴通溫洛龜將兆于禹書式究人文使新世教偶逡巡而代匱姑黽勉以奏成訓發罔功匪頒非次增咸陽之字幾同揚子之載金上建光之書竊陋許沖之賜布誓堅丹懇圖稱鴻私謝中書舍人表原注元豐五年四月時官制初行佃與曾鞏同命方具奏辭免閣門告報奉聖㫖竝不許辭佃與鞏皆就職年案宋史神宗紀及職官志改正官名在元豐三九月此言元豐五年四月官制初行與史文互異伏䝉制命除授臣依前通直郎試中書舍人兼侍講仍改賜章服者叨膺殊寵彌切震驚伏念臣遭值盛明獲親文藝秖知自守實無他長每以信書之太専更成與世而多忤比緣孤進獨被聖知察臣于隱約之中擢臣于疏賤之外方陛下以聖文樂育秀異而臣濫逰文館陛下以神武攬御雄俊而臣濫處武庠考正書名多忘闕之陋詮録史事微善敘之能荏苒嵗時費糜廩祿叨塵踰量憎嫉寖多屢招繁言幾致顛殞陛下曲加辨察每賜保全久辜天地之恩莫效涓埃之補敢圖眷矚更致超踰拔從經幄之嚴進直綸闈之重受恩彌大圖報益艱況當陛下董正官名布新治具維時在位思日奏功體堯舜之其難迪夏商之用乂臣敢不持循素學追跋前修承問盡論思之忠代言希潤色之美徐收薄效少副洪私辭免給事中表原注元豐五年五月今月初二日准閣門告報伏䝉聖恩授臣依前通直郎試給事中兼侍講者承命震驚不遑寧息竊念臣芻微近識蕪陋淺聞出于休明好是朴直初攀緣于仕路恥依傍于人門敢圖遭逢獨被簡拔眷憐異甚稱效缺然試言之墨未乾裁詔之席不暖亟從綸掖旋易瑣闈況當陛下好惡遵王陟降在帝宅堯臨之四表寶禹惜之寸隂改新官儀協用彝訓盛德在夏爰乘運以對天爵名從唐案章如愚羣書考索神宗喜觀唐六典慨然欲更官制元豐三年八月遂下詔肇新官制九月詳定所上寄祿格㑹明堂禮成近臣遷秩即用新制姑俯身而詢世法貽千載選極一時顧惟量踰誠已顔厚敢懷叨竊復冒寵榮所有告命不敢祗受謝給事中表伏䝉聖恩授臣依前通直郎試給事中兼侍講者寵榮甚渥塵竊至深伏念臣為學寡能蒞官孤進自愧超踰之速衆驚遭遇之隆陛下政無闕失而臣以論駮為官學有光明而臣以勸講為職雖抱蠢愚之極固知稱愜之難兹蓋伏遇皇帝陛下德務兼容道惟善貸故無棄物而有成功咫尺便近天光毫髮無非帝力臣敢不竭誠以處推理而前叱雀官倉彌極嚮公之意服羔私室更堅退食之忠少著微勞仰裨洪造庶幾蛇雀之報不勝犬馬之情謝賜對衣金帶表伏䝉聖恩授臣給事中特賜衣一對金帶一條者犀未離角帶莫貴于黃金鵜不下梁服難叨于赤芾內循尸竊仰愧匪頒伏念臣抱甕迂愚挈瓶細智曾乏削縫之益更塵衣被之榮兹蓋伏遇皇帝陛下剛健日新聰明時憲惟衣在笥常欲勸賢束帶立朝務令圖報臣敢不禔身衆正宅志一中永懷改造之宜奉兹更化近取忘腰之適移以捐軀謝入伏早出表金氣伏潛方屬初庚之後玊音溫潤甫傳夙退之期憐眷有加感慚罔極伏念臣等獲逢昌運代匱近司共惟夙夜之致勤少副旰宵之求治伏遇皇帝陛下深仁恤物厚禮使臣雖夏后之惜隂是輕惟璧而周王之扇暍所寶在慈俾當藴隆早就休燕舜琴靜御民咸阜于薰風羲轡徐行天迥長于化日誓收薄效仰稱洪私謝加天章閣待制表伏䝉聖恩授前件職者祗奉制函寵升延閣仰懷眷矚內竊兢慚竊念臣起自寒生㑹逢神考執經軒幄倏更再閏之餘論駮瑣闈乃涉四秋之暮案佃以元豐五年試給事中至八年三月哲宗即位時則已歷四秋矣此表當上于元祐未改元之前雖衆嗤其朴鈍每自愧于叨塵屬上聖之嗣興厠羣英而孤進猥當劇選纍玷華資兹蓋伏遇皇帝陛下學有光明體純仁孝將繕完于官制姑修講于職名遂令荒蕪亦被甄奬誓益殫于鼠技用少答于龍光謝太皇太后加天章閣待制表丁吉逢辰方預中臺之列纍勞積日更躋內閣之華祗荷眷憐伏增悚懼竊念臣器惟凡陋學匪該明偶遭遇于先朝遂叨塵于近侍逮聖神有作首庶物以惟新顧愚陋無堪尾百僚而乃分敢圖冒昧亦與甄收兹蓋伏遇太皇太后陛下德㝢兼包仁天廣覆思補六官之典俾益三閣之名誓更竭于駑駘期少酬于覆幬謝轉左朝請郎表伏奉告命䝉恩授臣左朝請郎依前充龍圖閣待制差遣勳封賜如故者奏課上聞幸叨于嵗比敘官增峻誤被于階升聞命若驚撫躬罔措伏念臣早緣雕篆獲際盛明以閭巷鯫薄之孤生䝉朝廷採擢之不次入持荷槖久二星闈日月雖勤事功蔑著比丐居于藩輔方勉奉于詔條尚未報成復䝉進秩此蓋伏遇皇帝陛下容光必照廣覆無遺不棄薄材曲矜舊物豈獨舉陟明之故典蓋將勸宿業之庶官遂致孱微亦膺寵渥敢不銘肌淪髓誓堅頂踵之酬續短增長仰答雲天之賜潁州謝上表伏奉告命授臣龍圖閣待制知潁州已于八月二十四日到任訖涓選日時祗見民吏道揚聖澤歡動羣情伏念臣自奮單門敢求伸宦學古有信書之纍逢時無應用之長偶遭睿明特達之知遂備高華侍從之列叨塵甚矣報稱蔑然屬二聖之當天拔羣賢而授職更以先朝緝熙之典付之晚學瑣末之材嵗月屢淹簡編僅次深惟愚暗久負聖明因剡奏以上陳得分符而共理而況汝隂山水之郡最為京西魚稻之鄉地本贍腴民無捐瘠追胥不擾賦斂以時第遵奉于教條自妥安于里俗物㫖有庭闈之養俸贏無婚嫁之虞豈期公朝併獲私願此蓋伏遇皇帝陛下堯仁天覆湯敬日躋德合并而為公躬明哲以作則乃眷搢紳之末未忘簪履之遺委以名邦輟從清禁恩榮及此職分謂何不敢怠遑體上聖好生之德庶幾夙夜為微臣報國之忠謝賜元祐六年厯日表原注潁州紹堯之後茂躋五帝之隆行夏之時丕舉三王之政誕頒玊厯申飭訓詞恭惟皇帝陛下德契離明道符乾健奉三無而勞天下總四大以居域中爰覃太史之書以謹諸侯之度臣敢不寅遵詔令祗奉教條敬授民時既協齊于五紀欽成嵗事庶昭格于三登鄧州謝上表伏奉敕命授臣依前朝奉大夫充龍圖閣待制就差知鄧州軍州事充京西南路安撫使臣已于今月某日到任訖一麾出守方臨東潁之優十國為連俄徙南陽之重已涓時日初見吏民祗荷寵靈惟深感涕竊念臣斗筲近器樗櫟散材早玷儒科寖階仕路三年太學官冷如冰十載長安粟貴于玊偶被先皇之識擢實為希世之遭逢一侍書惟久陪法從粵聖人之繼統與英俊而并升恩重丘山效微毫髮輒緣私義得請便州事為不煩俸入良厚敢冀嚴宸之異眷更加巨屏之優除而況臥龍鳯雛多異人之間出召父杜母有循吏之相望年榖屢登閭里無事絶鼠偷之出沒任燕户之往來夫何淺迂而此幸冒此蓋伏遇皇帝陛下聰明淵懿剛健粹精纘禹儉勤體堯仁孝雨暘略無違拒神民長有依歸遂令孤生亦預共理臣敢不旁求民瘼上報國恩慕史氏之循良蹟詩人之豈弟玊堂金馬時夢到于華胥花渚菊潭日心遊于魏闕誓收薄效用贖空餐謝賜元祐七年厯日表原注鄧州鳯鳥名官餼羊視朔欽崇天道敬授人時恭惟皇帝陛下昭明三辰協正百度廣輪所抵聲教是加視南向四星之中正西流再閏之失臣猥臨侯屏欣戴國恩雖莫陪觀臺書雲物之儀而幸預明堂頒政教之賜矞三慶五徒望日于堯天箱萬倉千姑祈年于穰社用遵聖訓以協民彝謝郊祀加恩表原注元祐七年十一月伏念早以諸生出逢丕旦和鉛懷筆曾無橫草之功持槖乘軒徒有受薪之誚簪履未終于棄置涓埃尚冒于採收而奠玊泰壇莫預駿奔之多士稱觴華闕阻趨法從之清塵遽被恩私惟增戰栗此蓋伏遇皇帝陛下拱三靈之密祐席六聖之宏圖乃眷初郊丕釐巨典疇勳進秩第慚犬馬之微勞陳力捐軀誓答乾坤之大賜江寧府謝上表伏奉敕命除臣依前朝奉大夫充龍圖閣待制就差知江寧軍府事臣已于今月某日到任訖規求家便昧冒國恩初許覲于闕庭仍容歸于里閈併叨寵假深積兢榮竊念臣門地素寒人材甚陋偶緣遭遇遂致超踰少年通書有未離于場屋同時賜第獨先在于朝廷五十才歷外官三遷皆為佳郡秦頭望重潁尾俸優維是建業之為邦實臣熙寧之游學人來日下稔聞江左之風流山似洛陽猶識京西之氣象土風甚美公事不煩又況若耶之快風非遙秦淮之明月未改棣華相望知親養之甚歡楷木成隂顧師承之可想伊臣何者有此幸焉兹蓋伏遇皇帝陛下纘禹成功急堯先務王者之風粹美聖人之學光明寵綏方維恩禮臣下致令蹇薄獲被矜憐臣敢不布宣邦條勉勵州事庶收尺寸圖報萬分執玊造朝敢綴諸侯之後賜金久任願居循吏之間謝賜元祐八年厯日表原注江寧府少昊紀瑞致鳯鳥以名官有虞頒常在璇璣而齊政聿追治古允屬清朝恭惟皇帝陛下敬授民時曰稽天若頒諸侯之正朔察上帝之休祥臣敢不深體眷懷謹遵彝訓仰觀俯察實繄裁成之功東作西成願伸勸相之助謝落龍圖閣待制表原注紹聖二年二月初有㫖降一官言者不已遂落職復有㫖還所降一官仍與小郡今月某日准越州公文准都進奏院遞到誥一道授臣朝請郎落龍圖閣待制者蕪功還官有罪落職慚悔為之汗浹感嘆至于涕零退惟虛孱仰荷矜貸竊念臣久塵侍從初出遭逢狗馬故識主恩螻蟻頗知臣節方勤報禮適㑹修書人其異心臣則盡力嵗月之更固久涓塵之補亦多惜未終篇忽先去國從前之所爭辨去後之所變更既無具藁之可尋難逃疑似縱有司存之能識敢自辨明此蓋伏遇皇帝陛下茂聖神之姿純仁孝之德明慎刑罰緝熙典章重愛惜于羣材賜保完于孤進止從薄責未忍遐遺雖褫延閣之圖書仍付小邦之民社重念臣持心過厚推理輒前與世曾無機防立朝粗有本末尚懷荆國之誨育敢負裕陵之眷知雖憂患之餘顧嵗時之能幾惟精誠之至冀天地之終回謝特許任知州差遣表臣自十月得疾久在病告伏准十一月初八日進奏院報籍記人除陸佃外並不得任知州差遣者掛名罪戾已分隔于雲泥曲意矜憐獨容有其民社闔門飽暖舉族依歸竊念臣熟爛腐儒聱牙曲士久叨法從濫預政機果然災興忽以罪去驚魂戰灼病骨纒綿誰謂再生自知千死忽覩恩言之照察得與罪黨而差殊回顧沈疴不知去體此蓋伏遇皇帝陛下體堯蹈舜跨商軼周孝友有光慈夀無極火炎玊在實資鴻造之私桂死魄蘇彌極大明之望泰州謝上表案泰州原本作秦州與宋史本傳恰合但據表文云矧海陵之善地亦淮甸之近州海陵乃泰州非秦州也又佃在外前後所歷州郡皆有可考未嘗為秦州今改正伏奉告命授臣朝請郎知泰州軍州事已于今月某日到任訖圖書三閣尚懷降褫之慚飽暖一麾更荷矜容之賜恩私甚厚性命惟輕竊念臣樗散薄材芻蕘近識偶遭逢于先帝遂度越于稠人亟踐禁途切循分域逮及信書之作誤膺良史之求纂修無功報稱不效惟私心之曲盡曾公議之難逃尚賴宸慈姑從薄譴矧海陵之善地亦淮甸之近州居民靖淳出産繁錯飛蚊漸少迥無澤國之風過客甚稀至有道堂之號于焉循省乃爾叨塵此蓋伏遇皇帝陛下睿哲淵深至仁天粹諸福之祥畢至九功之敘惟歌遂容孤平亦預共理再念臣頃罹家難久愧國恩誦堯言之傳每深欣戴睹禹功之復惟有涕零想魏闕于江湖形清都于夢寐雲天在望心目交馳問宣室之鬼神頗違始願執塗山之玊帛猶冀終諧更為後圖以贖前咎謝賜紹聖三年厯日表原注泰州舜璣觀政仰合于乾文堯厯定時俯頒于人統拜恩知幸藏朔為榮恭惟皇帝陛下表正萬邦協修五紀欽崇天道恭授民時獨觀新化之隆兼舉舊章之重秉文之德已收順帝之功行夏之時更極為邦之用豈期僻陋亦荷頒宣臣敢不祗奉王正率循國典土膏才起便候于農祥蓂莢再榮即歌于聖瑞陶山集卷七
