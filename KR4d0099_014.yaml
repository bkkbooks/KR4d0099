body:
  text: 陶山集卷十四宋陸佃撰志銘通直郎邊公墓志銘公諱珣字仲寶姓邊氏給事中贈工部侍郎諱肅之孫兵部員外郎贈開府儀同三司諱調之子給事在真宗時嘗守邢會契丹大入帝幸澶淵密詔若州不可守聽以便宜南保給事匿詔書督丁壯乘城悉所部兵陳以待之賊騎傅城不能下時鎮魏深趙磁洺六州閉壁不出老幼皆趨邢所全活甚衆擢樞密直學士河朔之民至今能道之兵部在仁宗時嘗更省府與韓忠獻公及豫祖諫議為僚友相好也有醇德美行終福建路轉運使公以父蔭補太廟齋郎調越州餘姚縣尉又為尉會稽進梓州監亭縣令書寫河東路經略安撫都總管司機宜文字改平江軍節度推官邠州觀察支使揚州觀察推官遂以宣德郎致仕賜五品服今上即位遷通直郎紹聖二年三月甲子以疾卒于姑蘇採蓮涇之私第享年七十有二疾革曰吾少時遇持戒僧以所誦佛書置吾頂祝之曰願他日臨終無疾痛若將夢寐然是時頗諱聞今思之真善頌也語訖奄然如寐其孤卜十有一月甲子葬公吳縣蒸山之原公少孤能立事諸兄惟謹宗族鄉黨稱其悌在官有能名威敏孫公頗稱之威敏公姊之夫也帥并門辟公以自助不専為親居無何威敏以治錢塘行事或越法度貶公亦傍緣被譴纍或勉之自明公曰孫公既不辨吾雖無言可也及英廟起威敏經略陜西有司亦言公初無罪實朝廷乃復公官始赴平江之任會崑山旱蝗公被檄督捕而瀕海萑葦盤互蝗集其下不可得莫知為計者公使為連梃碎根植于上而蝗悉斃諸郡取以為法又嘗直盜牛者之寃今其家尚存言輒流涕公為人樂成人之美聞善抵掌稱慕與人交有終始自初仕宦所與逰多豪英後多為名卿重人而公蹭蹬終微遭遇然夀考康寧殆五十年往來吳中極山水之勝扁舟乘興時過其子官舍所謂名卿重人者未必如也豈五福難備罕得而兼歟將達宦酣于富貴與處間就曠薄滋味為適而已者其得失自然不同歟夫人陸氏前卒二男子裕睦州團練推官祁習進士三女子長適朝散大夫梁黃裳次為比丘尼次適奉議郎陸傳孫五人知微知章知白知常一女子也裕諸邊之秀喜學有志尚能似其先人公吾舅也吾母葬會稽其地曰寶峯夢想慈顔抱終天之恨幸時見公以慰渭陽無窮之思孰謂去越尚新而公已云亡矣其尚忍為之銘乎噫憂患之餘逡巡夢境精思凋落如老畫師非復昔時文彩雖欲盡公之倣佛不能也銘曰我見舅氏如母之存舅氏見我其如子孫寶峯相望蒸山之原今其已矣尚復何言朝奉大夫陸公墓志銘佃之皇祖吏部郎公諱軫越人也逮真宗仁宗在館閣最久華文質行粹美無疵為子若孫若其從子安承善訓隨性之厚薄各有得焉蓋得其質素不為表襮以能政事者公也公諱琮字寶之吏部再從子也幼孤吏部自教養之公亦感憤為學甚力能如吏部意乃任公為郊社齋郎為吉州龍泉縣主簿南康軍星子縣尉夀州夀春縣令知虔州石城虔化兩縣又知江寧府上元縣知連州通判潤州又知處州最後根括兩浙路鹽錢官八遷至朝奉大夫勳四轉至上輕車都尉公為虔化令少保趙公抃辟也邑號難治風俗壞久矣至于子輾父足弟捩兄臂自其意為之者莫怪也無幾何有翁在庭訴其子毆者問之真是也使腰以石沈諸江若是者殺三人焉于是一邑大驚俗驟變子為後以孝弟為下以恭人或以比鄴令殺為河伯娶婦者在潤州也嵗大飢斗米錢三百疫繼作公方攝州事圖所以救恤之方備至適有官舟溺米數萬石有司請曝之入州廩公盡使貸民人用以濟餘所在大略亦如此而尤清慎蓋去夀春嘗有以錢千緡粟千石半途贐者公不顧公為人尚氣節對賓客不改越音言雖無華然意所造自有餘趣老猶賦詩以公餘觀史以俸餘買書曰吾以此終身亦以此遺子孫可矣娶楊氏封金華縣君光祿卿璵之女五子俁早卒侁今為太廟齋郎俯傑僎舉進士皆勤孝有立有公之風四女長以疾在室次適進士桑定國次適盧州舒城縣主簿章劭次適奉國軍慈溪縣主簿劉芹孫男五人女二人春秋六十有六元豐五年十月八日以疾卒葬宣州清流鄉義安山之原其日元豐七年十二月乙酉也公在上元時今王荆公為州多任之事嘗臥疾幽屏一室有神人告曰汝夀盡此然隂有功在物當延二八逮公之亡果十有六年也曾祖郇祖仁旺贈太子中允父明贈朝奉大夫噫寓言十九重言十七今諸孤不以公籍外論之而屬佃為若佃之言豈足以重公也亦論次之如此銘曰猗歟大夫維政之優威在為邑惠在為州威也如何子孝而磯牆無讒鬩室無勃磎惠也如何爰衣爰食水無龜手路無莩踣亦有清白化墨為廉子孫保之國人是瞻黃君墓志銘君姓為黃名曰頤字謂之吉老剡人也南齊金紫光祿大夫僧成之後今剡有寺號宣妙光祿之舊第也君為人篤實善良讀書聞大略元豐中以恩補將仕郎試將作監主簿調南康軍司户參軍以重離親不復出仕宦熙寧嵗在單閼吳越大飢且疫病相漬死相枕籍者十五六雖其妻孥往往走避君獨為粥藥救治之無所不至至取家人首飾以貸之扶其病而起若死而葬祭之者蓋不可勝數平居嘗曰治生焉用多求可焉可矣即為善不可以不多也故其用意處能以不貪為寶以教子為義賙人之急為仁居久之鄉人多信向有疑往謀焉有急往求焉孱子弱女有嫁娶往投焉剡在東為地最髙一遇旱乾民輒拱手受斃君創水利溉田幾萬畝嘗有為盜者君面以錢與之曰前日作此亮乏此物也其人愧羞恨不死由是里中盜走他境誓不敢妄意黃氏之藏有無也其宗族鄉里執友交逰多以佛稱之而先生長者亦以為長者也曾王父某王父某父某娶王氏生四子理中早卒特持時盡遣為學為孰門側有願求學者皆給飲食筆札以成其志願後又請遷縣學而新之剡自職方史公賜第釋褐縣大夫榮其歸揭其西門曰繼錦以追買臣且以來其後自君遷學徐充求移忠姚舜明皆相繼登科特亦其一也特持受學豫所言多時亦在太學特今為瀛州防禦推官知通州靜海縣丞女三人適王奕周詡徐明逺明遠主杭州餘杭簿孫八人端彥正彥假承務郎皆已卒濤習進士孫女十人長適假承務郎龔節亨餘皆尚幼君享年五十有九紹聖四年七月甲子卒里人初皆為君禱祠及卒皆奔走赴哭至噎填門織路未捐館前忽語諸孤初七日吉日也諸孤以為是日疾愈矣其日乃披衣起坐作句偈一有委蛻塵垢之趣諸孤筮以十二月甲子葬來乞銘曰日月有期矣請願先一言以慰存沒豫閔君之亡又義不得辭故作是銘彼滿茍得者以財得魘無一夕安枕是亦可以少警矣元祐之末有陳誨者閩産也相陵阜得其妙嘗曰剡多竒峯秀嶺然皆無如永安鄉所謂黃山者又稱君多隂善其後將大後將有葬此者今君之兆即陳所指也銘曰義有弗行行靡不到仁有弗為為靡不報譬彼接花實因爾舊花變子移亦躋厥後花則大矣自跗徂杪其或不培後將復小匪接之艱續則匪易顧而孫曾尚引無替諸暨黃君墓志銘諸暨為邑萬户能力教子者三家朱氏諱瑩子名戩韓氏諱彥昌子名羽黃氏諱舜卿子名彥熙寧中先皇帝以德更化以道更法百度修而萬事舉始詔諸路置學官方是時豫為鄆州州學教授彥等裹糧走汶上有良質美志不愧齊魯自兹從豫逰蓋纍年買鄰太學之東衡門懸箔而容貌甚渥豫固知其非長厄者也後羽登科彥繼之戩又繼之鄉人莫不欣慕其父子甚可喜也戩父卒豫銘其墓矣羽父卒豫又銘之今又銘君之墓何其甚可哀也傳曰慶者在堂弔者在閭言禍福之相尋如此羽雖不幸短命今彥及戩宦學方優異時烜赫為世聞人殆未可量則豫又將為之喜矣君字醇翁贈衛尉少卿諱振之子守約而能以仁守豐而能以義施其宗族鄉黨待君而後舉火且數十家以急難告者門幾如市一邑稱其慈仁至號為佛元祐六年八月辛亥卒卒時沐浴易衣冠危坐結印如髙僧趨寂享年八十可謂夀矣然人不以為多聞其卒多為之出涕初娶王氏再娶李氏生五子雍賡彥侃革雍革嘗預計偕彥今為興化軍録事參軍二女適申屠琦蔣復禮孫男女二十四人諸孤卜以十二月庚申葬君范公鄉任氏之野銘曰觀流泉相隂陽卜云吉終允臧李司理墓志作乂吾壻也名知剛世有令德為時聞家曾大父諱執中纍贈正議大夫大父諱審一父諱棫作乂五嵗而孤又十嵗而母夫人侯氏卒伯父今寧陵縣大夫公權育之所以長養成就恩義甚篤方為兒時不喜嬉弄顧有文字書畫處往觀焉大父異之試使為詩語能動人既長志尚特然嗜問學至忘飲食與兄知柔在太學久二李名動京師作乂元祐五年舉進士為别試第一遂中丙科又明年見豫穰下如虎豹之駒犀象之犢豫章秠秬之苗其精神氣格自然異也至其經術終日似不能言者雖近在户庭豫纍年而後知之由此以觀焉天下之士潛光匿迹以逺不得而知者顧豈少哉居久之豫自南陽趣闕下沿汴絶淮訪吳市之異書探稽山之勝穴切磋琢磨相將以道一日忽謂豫曰春秋屬商其學之不傳久矣公其為發明之願聞謦咳之餘也豫曰聞之先生長者仲尼以魯春秋為春秋魯春秋今亡則春秋有不可讀者作乂應曰經一而足聖人以比貫類使從可知耳雖無魯春秋猶著豫異其言及得所謂繁露之書作乂讀至春秋無傳而著引之魯則謂之外引之夷狄則謂之內會同之事大者主小戰伐之事後者主先易無達占詩無達詁春秋無達辭曰此等真竒語也其他雖多亦或抵牾且在易到之域矣豫以仲舒積精此書至三年不窺園乘馬不知牝牡斯已勤矣而作乂展卷疾讀初不經意便能摘玉杯之瑕造竹林之美若指白黑而數一二何其敏也嘗謂豫曰三傳傳經公羊最精榖梁殆其後人其佳處拾公羊之遺耳先儒云公羊不如榖梁之精似誤也豫以其言考之信然作乂從豫至數年矣始以經術知之每自以為不如也竊謂異時當為國器斯文實有寄焉孰謂不幸短命死矣死時召其僚吳君願屬以後事願去即盥手靧面揖吾女令勿悲惱西向端坐而逝噫死生之際亦大矣其處之定有名僧髙道憚而愧之者也使老且死德義備成事業著見闡前人而振後世雖使搢紳先生願學焉可也初訃至豫哭之慟絶有解豫者曰此誠可痛然年未三十文足以華國行可以儀世早成如此理自不得長也豫以為詣理然有不能割也尚忍為之志耶作乂享年二十有五為池州司理參軍以紹聖二年三月六日卒四年正月三十日葬墓在其鄉龍舒祔春秋里之先塋二女子皆尚幼光祿寺丞陳君墓志銘光祿寺丞致仕鄱陽陳侯者少讀書慕段干木之為人自名木其友李介字之曰子仁介秦産也往來五嶽采芝與侯善蓋亦有道者侯之曾大父嵩嵩生洪以力田孝弟五世同居闔門千口洪生樞五舉而仕終臨江軍清江縣主簿與故相國王公隨結交相好也相國以詩遺之稱其學問行治侯有父風舉進士不中歎曰吾所以學者將以修性求道之真而已豈與其黨汩汩應舉角一日之勝哉于是返耕養親手寫五經以訓諸子有宅一區植佳花美木曰此吾所以寄樂也當其風清月明行吟坐嘯一觴一豆適然忘已不知世之榮利有以悅而臞也然而好賢樂士其門多食客雖浮屠老子醫卜修生學死之流無不禮以故博通衆説其鄉人問疑以侯為蓍龜殆古所稱多聞之友也平居周人之急至于解衣輟食無所愛吝宗族之窶不能嫁娶與死無以葬者皆賴侯以集嘉祐中左目失明不藥久矣後十二年一日晝臥讀書忽能覩物覽照視之瞳子瞭然江表多云侯有隂德此其報也夫人夀安縣君周氏五男子晞守太常博士侯與夀安皆以晞貴汝言同學究出身繫守著作佐郎素潔皆舉進士四女子進士易濋彭諫彭詵應城縣主簿杜坦侯壻也孫男十人女十七人曾孫五人晞性和厚吾逰之賢者也善篆有古風與建安章友直相上下以晞占之其弟之材可知矣然則侯之隂德將在諸子陳氏之興未艾也其受成報豈一目之明哉享年七十二元豐三年六月一日以疾卒于家明年十有一月甲子葬其墓在林塘東南之岡昔侯所自擇者銘曰樂哉林塘陳侯之宰我日征矣而風未改有羣勿捕有樵勿採百世之下其人如在許侯墓志銘侯氏許名拯字之曰康伯開封襄邑人纍贈大中大夫諱齊之子生數載賦桑詩有可惜松封五大夫之句大中因大竒之景祐中以通三經登第調安州應山縣尉鳯翔府麟逰縣令泉州録事參軍黃州軍州潤州觀察推官亳州觀察推官隨州支使主京西南路安撫使右諫議大夫吕公晦等十七人致太子中允案主京西南路安撫使至太子中允二十五字文義不可解疑有脫誤監亳州永城縣稅又監應天府南河商稅知京兆府奉天縣賜五品服分司南京遂以奉議郎致仕侯之為麟逰惡少張保者彝酒無賴為鄉市患侯痛繩之以法由是改行後數年遇諸二崤之間以壺漿拜侯馬前自囋曰張保也頃微公非復自好實懷公惠無已侯慰勉之為酌一杯而去其在泉州也商有白晝為盜所殺者尉探同行槖中得死商咽上之索半驗治以為真盜上之州獄侯曰果為盜者索尚存乎即屛囚一室佯為囚訊曰殺某人者有真刀某色在某所若將取焉夜使人徴之得代置刀者問之乃應捕盜者也以白州將將大驚既而果獲真盜奉天故治乾州初廢為邑而州之事故在侯至遂大治作新市以便民而民歡樂之號其街曰許公街平居清約不祈人知嘗去官以家過函谷關惟故事敝衣數篋關吏歎曰清哉是官也前夫人王氏後夫人陳氏陳封金華縣君金華有七子皆力為學安世安國安期安石安行安雅安節安國安期早卒安世尚書都官員外郎安石黃州麻城縣令女四人進士董繼傑樂轂和州司理參軍陳石太廟齋郎吳汝楫侯壻也孫男三人女四人春秋六十九元豐六年八月甲子以疾卒有文集十卷嘗曰學者為言不必是堯非桀亦不必詆盜跖毁孔子而後為知道蓋其趣如此安世字少張吾友之賢者也舉進士第一文足以華國才足以應世不幸短命灰晦不光以即大夜在侯卒之後四十九日也其遺言以侯之志屬豫將以明年十月乙酉葬侯于廣代鄉龜岡之原悲豫友之不復見也故為志侯之墓銘曰皎皎許侯掩此幽宅孰豫其性而命之嗇乃生斯男維伯維亞伯邦之傑言從之化亞曰嗟豫有穹者昊胡轉豫毒又續之蓼云誰不猶以弗眉夀實虹我心無所歸其咎傅府君墓志銘府君諱珏字仲溫山隂人為人深厚溫雅老謀壯決與仁相資少失所怙事母兄甚孝悌兄早卒遂應門户不得一意于學然其操行有餘學者多不及也聞人寸長片善樂稱道之使在虞庠夏校雖綴國老鄉先生可也常勵諸子為學曰吾本搢紳儒家可自寂寥無聞耶諸子承其意爭自樹立其門下客多相繼掇詞科而諸子獨未能如志願府君嘗以問我對曰讀書必效譬如服食仙丹今雖未功後當有證惟俟之而已府君以豫之言為然嘗夢異人授以術可化丹砂為黃金既覺尚識其方按以求藥皆信然終不為也享年八十有一平居安強德尊福備生日內外族姻舉觴為夀至溢出庭外可為盛矣紹聖二年夏豫被命守海陵府君灑涕與豫别曰我旦暮之人耳公他日晝錦來歸某定不復見矣豫亦為之嘻吁明年十二月甲子府君果卒其卒時如客得歸欣然就駕何其達也嘗聞之自古聖賢死皆不亡其智氣在上往往挾日月騎星辰傅説是也府君實説之後今能死如此光靈不昧必有在矣宜不與卉木同榮灰土共盡也曾大父光弼大父安遂皆終縣令父宗翊有德鄉里夫人錢氏後夫人周氏嫓德合善中外宜之五男子天秩天牧天啓天勤天敘孫九人汝亮汝丹汝諧汝能汝賢汝為汝翼汝楫案孫九人原本缺一人無别本校增姑仍其舊孫女十有二人適奉議郎褚理鄂州蒲圻縣主簿陳處進士禇唐鄉張緯桂簡思張規褚交戚曄張􅞯陳師臯餘尚處曾孫女六人天秩天敘與其孫女歸戚氏者皆已卒府君之葬以五年四月甲子在紫洪澳周氏後府君三十有五日亦卒遂以祔銘曰是封是樹于斯藏亦于斯慕將作監主簿蓋君墓志銘君諱淑字子美其先蓋公者善黃老言曹參避正堂師之終以相漢民用寧一至唐文達文懿又以儒術顯號二蓋逮君之四世祖鐸始自信都家于曹故今為冤句縣人父某大父某曾大父某君入孝出悌為學甚力以書就鄉舉屢試禮部不中第歎曰得之不得有命也因以緒餘教子已而士宣士安士宏相屬登科曹人榮之于是里中教子者輒引蓋氏為法其兄之子士明瘻生于頭膻惡不可親君方爞暑為之藥瘍扇蠅略無難色周巨源鄉之善士也母死結廬墓次晝夜號哭不止君率鄉人詣州乞旌其賢孝朝廷為之賜粟帛蓋其篤行樂人之善如此熙寧六年以特奏名授曹州長史久之調婺州義烏縣主簿州縣之勞非所好也乃以將作監主簿致仕且將自肆于山水之間佳趣未伸不幸以疾卒實元豐三年八月八日也春秋六十有四初娶楊氏再娶竇氏以子封夀安縣君四男子士宣興元府觀察推官士安贊善大夫兩浙提刑司檢法官士宏蘇州司理參軍士完舉進士二女子皆嫁東州士人張須劉先君壻也孫男十有二人孫女十人諸孤卜以四年十月葬君太平鄉小康里士安與豫善曉吏事習刑名學而能以公恕將之故為銘君之墓以告後世銘曰展也蓋侯匪逰匪遨維善之嗜而忘其勞子孫紹之厥門用高有朱有藍有笏有袍曰未艾只其來滔滔俔彼宛水尚興于曹陶山集卷十四
