body:
  text: 陶山集巻二宋陸佃撰七言律詩依韻和呈劉貢父舍人三首鵷鷺朝來又集西聨鑣初卸錦障泥奪袍況有詩先捷倒玉何妨酒屢攜詔下競看花作判賦成曾借栁為題衣冠異日傳圖畫惟有三家盛事齊酒半詩成日轉西驪珠纔抵一丸泥未饒白雪無人和不忿東山有妓攜班綴定應連玉筍姓名還得夢金題飛騰便見新官上傳語花開慎莫齊三家成佛本來西共坐蓮胎出淤泥原註舊謂知制誥為一佛出世歸侍玉除還似約去腰金印定如攜慇懃鳥勸花前醉邂逅人逢葉上題縱有鳯毛傳序逺未應能似鴈行齊用前韻呈蘇子容尚書顰里従來敢效西龍門登日尚雲泥紫垣正掌絲綸美絳帳初将杖屨攜原註公在掖垣知貢舉佃始以門生登第紅錦未酬青玉案黄金應䕶碧紗題正堂若許曹參避願更虚心問相齊依韻和頓起郎中瓊林苑奉迎神主追懐同年兼呈座主蘇丞相清風明月本閒人鳯闕初來一幅巾淡墨姓名才烜赫横金班綴偶叨塵鼎湖龍去池臺古遼海人歸冢墓新惟有蘇家老仙樹能将五百嵗為春送楊損赴黄陂主簿詩酒相從秖嵗餘雲樓鳯閣在空虚驪龍光燄隨尊俎鸞鳯精神入簿書内翰風流知有後狀元門閥是當初恨無一物堪持贈梅未全開栁尚疎送虞太熙學士知太平州黄塵初出國門東楊栁青青畫隼紅占得度闗雲色異想知登望月明同曾傳嚼蠟風情外更悟烹鮮政事中聞說太平迎候逺安排騎竹有兒童送致政邢定國通判七十平頭便拂衣舞雩風月有光輝尋常薄飯猶能足多少高官未肯歸鷗鳥等閒還自樂杜䳌容易重相違想知遼鶴歸來早城郭人民未盡非圓石蒼仞千尋畫不如信知韞玉勝懐珠一巻㑹使民瞻峻三品何妨主眷殊看日謬煩鞭氣力補天真待鍊工夫寄聲欲取黄金印雨後還曾墮鵲無送張頡待制帥瀛州食貨方艱不忍籠長才宜有濟時功閣當龍馬圖書後錢入紅牙算子中音信定應隨朔鴈夢魂多擬託南風如何更講黄河策定取横流副兩宫送許遵少卿知潤州丹陽太守舊名卿騎竹兒童夾道迎醉尹笙歌甘酒病謫仙風月苦詩情江湖天氣農桑早水竹人家枕簟清白首愛君心未已夢魂猶遶鳯凰城題海岳樓贈米元章千級仙梯第一層闌干常為水雲凭起為霖雨從膚寸活得魚龍用斗升鵬有程途知可到鼇非番次信難勝即今姓米仙人住雲母中間一片冰依韻和青州程給事見寄出守東州異故園臨岐花鳥共無言度闗有客占雲氣夐野何人肖夢魂蘭辟白蟫書殿祕茅分青土社壝尊相望幾直蓬萊宿燈影寒籠月滿軒送王柄教授場屋論才昔議魁教庠官冷尚低徊靈龜縮甲専藏六老雉斜冠怯應媒半醉珠璣隨咳唾一方桃李待栽培塞垣錯莫風沙晚南北相望首重回和巖老遭遇何人更得如同時幾許待公車官清自可看竒字俸薄猶能寫異書千里水雲藏舊隠一番雷雨報新除自憐霄漢華塗穏鴻鴈横飛序尚疎依韻和查應辰朝散雪二首三陽新已換三隂潤澤才踰一寸深無地得施調國手惟天知有愛民心霜毛一半渾如雪玉貌諸餘少似今且向尊前盡情醉不須辛苦問為霖抱甕何人似漢隂一番膏潤及根深稍蘇南畝耕耘力甫逼東君造化心堪畫不應須到晚可收除是趁如今寳陁若更施餘力豈獨坊名揭望霖依韻和蒋津雪中見寄蓬萊宫闕鎖崔嵬書史頻看秖亂堆華葢稍瞻天北極紫雲曾識道東來功名方與英豪共懐抱仍逢故舊開造物為君如有意一番風雪洗浮埃答張朝奉二首太公年甲伯夷清早早休官樂盛明西子横陳花一徑北牕高臥稻千城喜聞客去如多病老見春歸似薄情曾向先師得門户不知何日煉丹成一番相見一番清坐久精神轉更明詩裏欲投亡命社酒邊甘在受降城此身到處堪乘興萬事由來枉用情試問仙翁多少夀定應三度見桃成依韻和羅畸學録一番驚雷一番風巨魚看得化為龍原註君登科日佃預攷校銷殘白日書千巻付與浮雲禄萬鍾珠玉貫穿成把握星辰羅絡在心胸怪來佳句清人骨正值溪寒雪滿峯呈周承議兼簡通判簽判二首政事相傳舊有經為州前後半台星嵗教諸縣無公事原註今秋陳蔡皆被水而潁獨豐登如常年雨使佳人上使㕔原註大排以雨遂令升㕔行酒太守未甘雙鬢白西湖惟欠逺山青經過況有風騷将乞取篇章作畫屏下車明日燕西湖醉倚高花不用扶鷗鳥便應知我意海棠今復恨公無佳人舞罷頭纒錦座客詩成咳有珠聖主若容長守此不妨生就白髭鬚呈幕府諸公十年騎馬困京塵乞得州來潁水濱苔蘚滿庭無字押蓮花全幕是詩人原註簽判節推皆善詩嘗以新集見借樓臺雪後如聞雨歌舞尊前秖看春半刺㑹須拌共醉銀條方共徳爭醇原註通判徳性醇厚飮銀條酒至斗不亂宴西湖用前韻呈諸公十頃湖光辟盡塵女郎臺榭占沙濱杜鵑言語瞋為客楊栁腰肢瘦似人便擬曲留今夜月已知虚度去年春憑君為伴花前醉況復香醪特地醇依韻和再開芍藥十六首案此詩係佃守潁州時作第二首原註云今嵗閏月兩見中秋以哲宗紀攷之則元祐六年也是年佃初補外故詩中多寄託語同時幾許已成空回首榮枯是夢中自昔一般稱國豔而今兩度嫁春風誰人與刻三年葉何事惟開十日紅試倚玉梯丹漢外為渠方便問元功百花羞縮敢爭先雨露仍隨愛惜偏青帝擬教春一見素娥留待月重圓原註今嵗閏月兩見中秋相逢可惜非三月自歎無因更少年終日倚闌看不足直須風雨送歸天前來樓子妙凌空若比今生是下中曾與阿衡調鼎鉉擬教周昉畫屏風再生檜老無多緑四季花凡一餉紅認得洛陽人未識信知天地有竒功秖受姚黄一著先兒家元在郡西偏解殘珠佩迎新見尋得金鐶依舊圓一過馨香猶半日再來期約本明年向人自有凌雲意不羨城南尺五天市井初傳為一空直疑伊洛謾當中原註花譜云洛陽得天地之中故花比他州特異别承仙掌非時露剩占薰弦幾日風自愧霜髭難更黑誰憐粉面不長紅豈惟畫史愁傳貌兼使詩人費盡功一番風信作花先未必春工㑹黨偏玉杵買來容再覩金釵分與卻重圓幾回衆裏知誰似一墮人間有幾年我是玉皇香案吏可能相與便朝天十方生滅盡虚空往往看花似醉中再見傾城彌愛日一聞絶代競趨風不知世逐仙棊換未免身歸爝火紅自㫁此生真夢幻直須成佛是殊功牡丹猶自欲推先傳語諸花莫恨偏淚眼始看金谷墜指環尋伴玉簫圓原註玉簫韋僕射妾後再生侍韋其留别玉環隠然在指見雲溪子此身那復思前事半面猶應記往年畢竟得歸歸甚處玉樓深在九重天誰言見慣是司空舊説揚州未必中可是兩三千處月原註見揚州詩能如二十五般風原註此花再開又添一般風依稀仙帳魂今返遭遇神針肉更紅卻得蓬蒿遮蔽力便教重見太平功詩成贏得錦袍先自是高才遣将偏稀遇仙丹時下熟荐驚神女夢中圓丹梯直上三千級間氣于今五百年為報百花休暗恨便開三度也由天春歸岑寂厭書空賴爾相陪酒屢中未必前身非叔子不應後至似防風賭留坐客排雙陸借與都人畫二紅須信年芳有虚發莫教楊栁誤前功阿誰蓮步擬攙先相見從他次數偏曾學駐顔知藥喜免教渝約問蓍圓春風省識非平日昬霧中看類老年聞說上林今更好一如堯禹舊時天來時賓客正談空更值僧齋飯一中原註此花至日適齋薦福送與諸公同看便擬商量歸慧日豫傳消息與香風夏蠶三葉空餘緑秋木重花秖浪紅惟有此花花與子兩曾相見是神功姿貌新來勝日先託根何事得州偏起将玉骨靈符異分出金身覺性圓如不能言常竟日似曾相識是今年也應解笑山茶晚長占東南小雪天諸縣豐登獄屢空珍祥如欲助升中不妨故故留連月未到頻頻惱亂風向上鬱葱佳氣紫現前圓滿報身紅自今長許汾陽醉内外曾無緦少功發居衆後摘居先玉色無端稟賦偏華表卻歸仙夢逺寳陁重現瑞光圓少師花譜三千字吏部春詩二百年原註花譜専論牡丹吏部獨無夏詩兩處偶然渾忘卻不須惆悵對炎天依韻和雙頭芍藥十六首案此詩亦守潁州時作第十一首聊伴西湖地主人句可證末一首云故應此戰今須解兵法曾教避不如正敘當日所以乞郡之意詩多寓言與前篇同品格由來自出羣就中相竝轉驚人且同藥使求民瘼終與花王秉國均李廣無雙空自老崔徽有兩竟誰真因君翦寄和詩看始信人間别有春怕草侵陵為翦除新詩應笑病尚書瀟湘煙水愁相對巫峽雲山欲獨居有客彈冠連茹進誰家高髻合歡梳年來太守雖加老為爾情懐亦自如不與尋常草木羣看來端的好于人神仙比竝容顔似姊妹推排次第均浮薄未應隨世態靚妝渾似任天真得他和氣知多少占盡河陽一縣春曾與宫花傍玉除芳名消得用金書已教荘蝶雙雙引更伴台星兩兩居官樣自應能笑語家常誰欲傚妝梳大都好物難摹寫未信屏風畫得如白也雖云思不羣賦君猶有調高人更相汲引風流在各自芳菲雨露均因藥封王誰是假與花為后自應真思量消得黄金屋回首戎葵也是春誰将花譜更刪除妙品須教末上書案末上書未詳所出無别本可校姑仍之未必楚王曾夢見秖應青女解孀居行雲莫向中間度新月纔成一半梳若使覺王今識汝蓮花寜復竝真如竝驂鸞鶴下珍羣為愛詩人不避人半醉奈何非李白獨醒愁殺是靈均空花在處黏成妄草木何時鍊得真顧我無心爭彼此即今開落任青春盡日經營對廣除旁邊奴婢亦詩書俱飛蛺蜨渾相學共戲鞦韆秖竝居説著定應成膾炙買栽真是置箆梳更嫌病眼無憑據細看元來玉不如一經瞻顧遂空羣疑是同時解佩人曾對絲綸當禁掖終隨弦誦到成均有如一夢邯鄲假未始相離渾沌真可怪滿城尋國豔不知花在此中春玉顔高竝向階除靜笑寒藤學草書未信東君無職事不慙西子是鄰居曾教王母藏青鳥擬問嫦娥借玉梳尊得花王威勢重也應知慕藺相如共抛花縣暫離羣聊伴西湖地主人豔粉兩應歸藻繪香泥俱合在陶均雄風為借吹嘘力雌霓叨䝉激賞真移在洞天深處種與誰同見八千春幾時詩債許蠲除直待金雞放赦書神峽自來雲一片仙山多是玉羣居秖縁貌類欣臨鏡卻為情親忘見梳不怕飛泥侵妙質吾家斤斧正風如神仙流品信難羣絶似人間兩麗人暫得借觀猶占久便教偷戴也分均原註荘子曰分均仁也秖邀竹葉相為伴更對菱花自寫真原註事見遺史開向夏天縁底事算來多是不宜春桃茢無堪謾祓除芭蕉何事倒抽書鳯凰騎罷猶輕舉烏鵲橋成得燕居抵死勸持雕玉盞象生描在鏤金梳當時若使閼氏見未怕平城刻得如晚菘早韭謾連羣過眼終無愛惜人照日舞鸞情款曲趁風飛燕勢停均原註見九章術名歸本草千方祕職在司花一命真回首鳳凰城闕下倩誰移與後園春曾伴長楊草詔除信知長合在中書暫違紫袖雙瞻立聊伴紅裙一餉居小子正狂心已醉老奴猶愛髪方梳故應此戰今須解兵法曾教避不如依韻和門下吕相公從駕視學案宋史哲宗紀元祐六年十月幸國子監佃時在潁州故有侍臣獨恨身千里之語門下吕相公謂大防也纁帛升龍日月章平明鸞輅幸膠庠侍臣獨恨身千里邸報空看字數行故事一遵皇考廟原註仁宗有視學故事餘波仍及武成王誰知玉尺横經處猶是當時舊講堂依韻和趙令畤三首百步廳邊放兩衙夜深燈火見人家提壺勸我教沽酒鸜鵒逢君要㸃茶舞得六么除是栁啼消紅粉奈何花使君被爾牽詩思可是無心憶浣紗鳥排行陣樹排衙且喜西湖屬當家揚子已無騎鶴事原註揚州既無湖榭勝㮣兼俸入今亦不厚會稽惟有臥龍茶原註會稽州宅産茶雖及殊品然去鏡湖頗逺未妨春帝常為帝須信名花始是花更住一年方五十不應情味薄于紗方朔無端溺殿衙得州仍是地仙家海紅謾與陪尊酒原註果實惟常見海紅在筵應以耐久淮白猶堪當分茶原註茶雖不及京師而淮魚甚美夜靜青天十分月春深平地尺餘花誰将園裏新蜂蜨織就佳人護項紗依韻和趙令畤爭標才氣兩相高不獨詩豪酒亦豪戰得蟻酣成後殿探知龍睡遇先逃曾于寳月求斤斧欲以春風代翦刀他日若稱詩宰相定應先後秉鈞陶依韻和田虎通判兼呈吕防簽判四首楚尾秦頭俗久移豐穰仍值太平時渚花盡日臨書幌潭菊如今在酒巵十里麝香行驛近三竿紅日坐㕔遲愛君古錦囊中句不負文忠國士知冉冉年光逐閏移㕔閒賓客坐多時主恩未報空持橐軍政無妨數舉巵潘鬢雪霜何太早傅巖霖雨不應遲原註近時鬚鬢稍有白者時雨稍缺現祈求頷珠竟被君探得正值驪龍睡不知劇談終日少文移幕府新開盛一時羊酪未妨留灌頂蟹螯何苦負操巵原註南陽多酪而無蟹詩成醉裏遺忘易思發花前屬和遲更許此生剛節在秖應惟有嵗寒知春花秋葉兩推移未有涓塵補聖時新識豹胎休負鼎舊成蛇足謾持巵山如水墨屏間見日向棊盤子上遲便使北歸應念此白鷗黄鳥盡相知用田倅韻答孫勉教授二首淺紅深紫旋教移直待開無空闕時花十八中看蹋鞠玉東西外聴揚巵笙歌船舫天圍合燈火樓臺月上遲顧我若非鄉曲逺定應長占此州知原註時方上書乞四明造化從他宻宻移聰明非復似前時暫披金甲為儒将曾燕珠宫對玉巵一日看回花恨疾三年生就葉嫌遲慇懃為訪春消息賴有羮梅探得知用前韻答謝推官小立桑隂尚未移便如相識已多時鋸沙我就玉界尺㸃礫君成金屈巵原註君詩以屈巵自況靈運自應為佛早退之今恨學仙遲當年江左堂前燕卻又飛來未可知依韻和趙令畤無事何妨數命賓一湖清境是西鄰栽花要與春為主對酒瞋将目借人詩就彩牋斜巻玉舞餘花椀倒垂銀由來景物常無價謾道錢多㑹有神和朱昪朝奉湖上尋常日一臨年華無用苦相侵夢隨蝴蝶悠悠覺日待蟾蜍款款沈醉裏笙歌傳盞疾壺中天地著花深回瞻象闕恩難報願盡平生一寸心答張朝奉四首赤松居處近州衙況復詩情是作家收得夕陽歸老境破除春睡有新茶年華一任隨流水世事多應似落花卻笑宦㳺閒不得塵埃昏盡幞頭紗誰将兩制比三衙千騎猶如布素家何日龍巾容吐酒而今紗帽自煎茶十年膠柱空調瑟三月羮梅始見花醉裏不知身在此夢魂猶傍御袍紗押了文書坐了衙尋常行過秖如家苦無公事妨攜酒賴有詩情得試茶便到五更猶有月算來一日可無花垂綸更作輕鷗伴坐看寒汀學縐紗門鎖尋常付守衙穿湖曾不礙民家慣看妙舞資豪飲生怕清歌送好茶山盍飛來圍著水春休歸去帶將花從教魏紫姚黄下也合翬衣裏素紗依韻和孫勉教授菊花芳叢宜宻不宜疎何事瓊花秖一株苦勸白衣成酩酊儘饒紅粉插茱萸定應青帝稀曾見端的黄金似得無便擬栽培伴桃李盡移春色入洪爐依韻和李元中兼寄伯時二首龍眠三李晦聲塵長望淮壖與海濱自古市朝成底事即今猿鶴伴他人細思南陌東阡月大勝千門萬户春可惜欲歸歸未得不知家釀為誰醇五丈河邊避俗塵閉門情味似漳濱抛離鵲渚今三嵗成就華嚴秖兩人原註伯時畫華嚴元中寫貧裏有時求得玉老來無可奈何春平生共學王丞相更覺荀揚未盡醇
