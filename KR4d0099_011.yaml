body:
  text: 陶山集卷十一宋陸佃撰敘論神宗皇帝實録敘論上聰明睿廣臨政英果而將之以慈仁敬事兩宫篤于誠孝遇諸王宗室甚友愛慈聖光獻太皇太后上賓宫中自行三年之制後嵗時酌獻别廟每至繼仁殿即感哭流涕哀動羣臣雍王皓曹王頵請居外第章數十上弗許至太后為言之猶纍年而後可加以聖學高逺深知道德之意每論經史多先儒所不到雖兵書律令無不貫達至于舟車宫室器械之制亦極其妙百官賜見顧問各以其職常出人意表多不能酬對然上恐其失次輒顧而言他終不面窮之也熙寧之初鋭意求治與王安石議政意合即倚以為輔一切屈己聽之更立法度拔用人才而耆舊多不同于是人言沸騰中外皆疑雖安石不能自保亦乞罷政事然上獨用之確然不移安石性剛論事上前有所爭辨時辭色皆厲上輒改容為之欣納蓋自三代而後君相相知義兼師友言聽計從了無形迹未有若兹之盛也及安石罷相上攬綱柄而自為之益加勵精因任原省賞罰有序旁延俊茂與之立功而政治文學法理之臣各以其彚進得盡所長雖拳勇之士亦皆作使士有獻書闕下往往朝奏暮召拔之常流之中而奬用之雙日一御講筵雖風雨不易禁中觀書每至夜分遇休假猶間御便殿訪政事日昃或不遑暇食至兩宫遣人趣之侍臣有以為言者上曰朕享天下之奉非嘉勞惡逸誠欲以此勤報之也在位雖久未嘗御賞花釣魚之會其幸西池與民同樂亦才一二至爾是以羣臣悚惕奔走赴功百度齊而萬事理勸農桑興學校講禮文議音樂修令式定厯象正官名申軍政下至道家齋祭科儀亦皆有法度一日執政事已語及淤田之利上曰大河源深流長皆山川膏腴泛浮滲漉溉灌民田可以變斥鹵而為肥沃朕遣中使往取淤田之土自嘗之極為細潤輔臣恭聽德音皆以為上之愛民博求物理精意如此雖炎帝之嘗百草禹之辨庶土唐文皇之吞蝗殆無以過也交人犯塞命將討伐既克廣源州知桂州趙卨以為嵗用戍兵三千十死五六可以守禦上曰朝廷比以乾德犯順焚劫三州故興師討罪郭逵不能翦滅垂成而還今廣源瘴癘之地我得之未為利彼失之未為害一夫不獲朕尚憫之況十死五六耶河北緣邊安撫司嘗言邊民王習于北界市到馬尋牒送順義軍訖上曰時聞北界知賣馬人名氏皆置極典全家逺配兹亦可惻自今如北界無移文根究即差人夜放界首其獲到人毋令通析賣馬人名氏及所居處免令屠戮蕃民若髙麗于闐諸國皆務以德懷之梯航而至無虛嵗平居亦間言兵然非羣臣所能望也每邊奏至處畫常中機會號令諸將多下手札詞協事稱皆粲然可觀故平瀘戎闢洮隴南征交趾西討靈夏威聲所加震疊海外常惋憤敵人倔強久割據燕慨然有恢復之志聚金帛內帑自製四言詩一章曰五季失圖獫狁孔熾藝祖造邦思有懲艾積帛內帑幾以募士曾孫承之敢忘厥志每庫以詩一字目之既而儲積如丘山屋盡溢不能容又别命置庫增廣之賦詩二十字分揭其上曰每虔夕惕心妄意遵遺業顧豫不武姿何日成戎捷其規模宏逺如此逮元豐間年榖屢登積粟塞上蓋數千萬石而四方常平之錢不可勝計餘財羡澤至今蒙利嘗語侍臣曰善為師者無智名無勇功自周以還惟漢高祖為近之若魏武可謂有智名若項籍可謂有勇功然皆不能一天下竊觀聖謨博大豈嘗須臾少忘藝祖之志哉嗟乎天不少延不及宣究駿功偉業以竟一代之能事然在位十有九載積精會神興為建立所以作人經世之略亦足以度越漢唐追迹三代矣況復謙沖退託去華務實終辭尊號弗受抑盛德之舉也然則廟號稱神姑徇天人之意爾序爾雅新義序萬物汝固有之是書能為爾正非能與爾以其所無也名之曰爾雅以此莊子曰中無主而不正外無正而不行舊説此書始于周公以教成王子夏因而廣之雖不可考然非若周公子夏不能為也故豫每盡心焉雖其微言奧旨有不能盡不得謂不知者也豈天之將興是書以豫贊其始譬如繪畫我為發其精神後之涉此者致曲焉雖使僕擁篲清道跂望塵躅可也鶡冠子序鶡冠子楚人也居于深山以鶡為冠號曰鶡冠子其道踳駮著書初本黃老而末流迪于刑名傳曰申韓厲名實切事情其極慘礉少恩而原于道德之意蓋學之弊有如此者也故曰孔墨之後儒分為八墨離為三嗚呼可不慎哉此書雖雜黃老刑名而要其宿時若散亂而無家者然其竒言奧旨亦每每而有也自博選篇至武靈王問凡十有九篇而退之讀此云十有六篇者非全書也今其書雖具在然文字脫謬不可考者多矣語曰書三寫魚成魯帝成虎豈虛言哉余竊閔之故為釋其可知者而其不可考者輒疑焉以俟博洽君子鬻子序鬻子名熊楚人也九十適周文王曰先生老矣對曰使臣捕獸逐麋則熊老矣若使坐籌國事臣尚少焉文王師之著書二十二篇實諸子濫觴之始今十有五篇者蓋闕而列子天瑞篇稱熊曰運轉無已天地密移疇覺之哉其力命篇又稱熊語文王曰自長非所增自短非所損者即南華藏舟鳧鶴之義也而今其書無之則熊之嘉言要旨亡者多矣可不惜哉文字脫謬為之校正四字增者七減者八注百有五十二字云送李泰叔序二南之詩多矣而召南之王道成于騶虞周南之帝道成于麟趾者蓋國君之尊至于仁賢公子之貴篤于信厚而後關雎鵲巢道化德教之應極焉何則富貴之族氣驕貧賤之士志苦逸樂之習難移憂勤之性易感也是故好德樂道之士出于憔悴枯稿之家者多焉至若髙明之裔纍世貴達非夫篤信而好之者則不足預此也真定泰叔故宰相文正李公之家也宰相之子翰林翰林之子尚書相繼而貴蓋三世矣真宗皇帝以為宋之世家嘗于從容語翰林曰卿之保守門户如朕之保守社稷也其家世如此今又有泰叔焉泰叔好學樂易氣質混然如渾金璞玉而又以逺器望之與人無疑喜嘉客典衣延之與其妻無明日之飯不顧也以此其志意使不為理鄣不為事蔽以明擇其始以剛保其終而遂能成就其才則尚書之後保翰林之門户者斯在泰叔矣官于會稽與豫逰相好也既别姑道此以勉之書後書王荆公逰鍾山圖後荆公退居金陵多騎驢逰鍾山每令一人提經一僕抱字説前導一人負木虎子隨之元祐四年六月六日伯時見訪坐小室乘興為豫圖之其立松下者進士楊驥僧法秀也後此一夕夢侍荆公如平生豫書法雲在天寶月便水二句便初作流字荆公笑曰不若便字之為愈也既覺悵然自失念昔橫經座隅語至言極逮今閲二紀無以異于昨夕之夢人之生世何如也伯時能為我圖之乎吳郡陸某農師題書王文惠公詩後山隂陸某嘗觀如公德宇固相度也猶欲留此示有命焉然世之人麋迷狗茍以幸富貴者何哉元祐庚辰十月二日記越州寶林院重修塔記於越有山焉嘗飛而至其名為寶林有靈鰻岫居禱旱輒雨山雖不甚高而花木蕭間自然出于塵垢之外吳越春秋云范蠡初作月城缺西北此峯一夕飛至實琅琊東武海中山也蓋三神山俱在渤海中其上臺觀皆金玉而羣仙據之昔嘗有飛者兹山豈其類耶疑以仙聖久居亦舍不死之藥因以仙去故能乘風凌虛輕舉而至此不然何以能飛也越人以儲兹山之粹固多竒秀有仙國之餘風而其隂功著在福庭煉丹辟榖幾換金骨若余大父是也某獲承遺緒槩聞其一二矣故常希跂聖真而屢至其寺觀所謂鰻岫錫痕巨人之迹為之躊躇四顧以想像三神山于此已而登其塔高雲不違簷咫尺俯瞰闤闠若纍塊積蘇焉越人瞻之遙以起信蓋乾德中漢南王之所造也熙寧十年八月丙申其寺與塔俱焚光影所照其彤燭天鳥皆夜鳴逮曉一木無遺者山勢斗輕更欲飛舉而城郭氣象為之荒涼居無何廣平侯程公來領州政目無全事百廢俱興而有多餘之間升鹿麗龜望之悵然且思有以復之自其塔始而宰官比丘與其州人莫逆公意于是良木之施雲如椎鑿雷如斧斤風如自春迄冬費幾萬緡而嚮之煙燼之餘已爛然金碧與日星爭麗矣何其速也蓋公自少年已擢顯科治外處內四紀于兹天下稱其才焉今雖老矣而謀國尚壯如獲興事造業更以協濟神明之運某將為公識其大者然則一塔之敏尚其餘事也台州黃巖縣妙智寺記佛出西方不知幾千萬里其書之契理會道與中國聖人之言一又其神靈之寓光景著見若今峨眉天台感觸之異非獨中州之人聞而趨之雖西域其徒亦纍譯而至也與道家之説蓬萊方丈乃在煙海渺茫荒忽不考之外異矣黃巖逺邑也其鄰天台其俗無貴賤大抵嚮佛雖屠羊履豨牛醫馬走漿奴酒保洴澼之家亦望佛剎輒式遇其像且拜也以故學佛之徒飾宫宇為莊嚴則吝者施財惰者輸力傴者獻塗眇者效準聾者與之磨礱而土木之功蒼黈赭堊之飾殆無遺巧然其最佳曰妙智寺蓋建隆中僧南惠之所造逮今百年繼者非一而卒成之者如吉也余聞之也夫所謂妙智者佛之所知是也疏觀泛應無適而非真可得而不可求可知而不可授雖母欲以與季不能也蓋智難口傳妙須心解如此今以名其寺如吉與其徒託而居之矣當知是也彼世之人舍是弗圖而逐逐于外以事莊嚴則雖飾以金銀絡以珠玉譬猶蜃噓成樓半出霄漢其彩五色終非實相如吉善住持置田數百畝延十方衆以為無窮永久之賴邑人多之而余兄嘗宰是邑言其善故與為記因附以所聞使刻諸石焉永慕亭記熙寧三年豫之同年友衢梁陳君澤民會葬其親于州南龍塘之原而屋其墓之南嚮以致孝饗而命之曰永慕之亭謂夫榮祿之不逮吾親而恨慕于此亡窮也其後二年書走京師屬豫記之而敘以書曰沐天不與幸嘉祐中先妣棄諸孤于齊先妣之憂未禫而先君如京師捐館舍先君之禍又未祥而先大母復棄諸孤于齊首尾四年三遭大變護持重喪千里旋反而先君客殯未克東也居五年沐天與幸既中第矣始克奉先君之柩以歸三親之喪雖畢集鄉里未顧何有一壞之土以封瘞也西安徐氏閔沐之貧無以葬以其地與之于是沐之志遂焉蓋扶舁之艱難經營之勤苦至于如此此沐之所以屬吾朋友以記也余聞之也自王者之迹熄而澤亡南陔白華之詩不作于世而先王之美俗敝矣事親者齋無以潔身戒無以養志廉恥衰陵孝友微缺而其末流以至于今猶在也澤民于是時乃不易乎世而自拔于常流之中祿不逮親而懷無窮之慕其孝可謂至矣使澤民由是焉擴而充之則南陔之養今雖無所及矣其所謂白華之潔而以事君則忠以事長則順終于隂可以通神明而陽足以厚風俗者將在于兹此豫之所以記也適南亭記會稽為越之絶而山川之秀甲于東南自晉以來高曠宏放之士多在于此至唐餘杭始盛而與越爭勝見元白之稱然杭之習俗華媚善占形勝而丹樓翠閣輝映湖山如畫工小屏細巧易好故四方之賓客過而覽者往往後越夫越之美豈至此而窮哉意者江山之勝雖在而昔賢往矣距今千嵗幽深寂寞殆有鬱而不發者也熙寧十年給事中程公出守是邦公吏師也所至輒治故其下車未幾弗出庭户之間而政成訟清州以無事乃與賓客沿鑑湖上蕺山以尋將軍祕監之迹登望稍倦未愜公意于是有以梅山勝告公者蓋其地昔子真之所居也今其少西有里曰梅市其事應史公聞往焉初屆佛剎橫見湖山一面之秀以為未造佳境也因至其上望之是日也天和景晴竹莖尚疏木葉微合峯巒如削間見層出公曰此山之佳處也已而北顧見其煙海杳冥風帆隱映有魁偉絶特之觀而高情爽氣適相值也夕陽在下不得已而後去其山之僧用和者契公之意因髙構宇名之曰適南蓋取莊周大鵬圖南之義暇日以衆飲而賞焉水轉挹轉清山轉望轉碧而俯仰之間海氣浮樓臺野氣墮宫闕雲霞無定其彩五色少頃百變殆詞人畫史不能寫也于是闔州以為美觀而春時無貴賤皆往又其風俗潔雅嬉逰皆乘畫舫平湖清淺晴天浮動及登是亭四眺無路風輕日永若在蓬萊之上可謂竒矣然則所謂餘杭者未必如也公蘇人也自其少時已有詩名咳唾成珠人以傳玩則摹寫物象道所難言其在公賦之乎雖然公之美志喜于發揚幽懿豈特賁一山而已凡此鄉之人藏道蓄德晦于耕隴釣瀨屠市卜肆魚鹽之間者正仰天子仁聖拔用忠賢夢想多士斯可以出矣庶幾託公之翼摶風雲而上哉陶山集卷十一
