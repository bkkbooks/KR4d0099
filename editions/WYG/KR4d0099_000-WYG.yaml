body:
  text: 陶山集别集類二宋提要臣等謹案陶山集十四巻宋陸佃撰佃有埤雅已著録此集據書録解題本二十巻嵗乆散佚今以永樂大典所載裒為十四巻盖僅存十之七矣佃本受學於王安石故埤雅及爾雅新義案爾雅新義乆佚今散見永樂大典中訛脱斷爛殆不可讀多宗字説然新法之義獨斷斷與安石争後竟入元祐黨籍安石之沒佃在金陵為文祭之推崇頗過然但叙師友淵源而無一字及國政元祐初預修神宗實録亦頗為安石諱數與史官辨争是外補然徽宗初召還復用佃仍欲參用元祐舊人復與時宰齟齬而罷盖其初悮從安石逰故牽於舊恩文字之間不能不有所假借至於事闗國計則毅然不以私廢公亦可謂剛直有守者矣佃既以新法忤安石不復問以政事惟以經術任之神宗命詳定郊廟禮文佃實主其義今集中所載諸篇是也其他文字勘以史傳所紀亦皆相符惟元豐大裘議集稱佃為集賢校理史乃稱同列皆侍從佃獨以光禄丞居其間當為宋史之訛又佃紹聖初落職知泰州亦為字謝表有海陵善地淮甸近州語史乃稱知秦州亦為字悮殆修宋史時其集已不甚顯歟佃所著有禮象諸書當時以知禮名集中若元豐大裘議諸篇大抵宗王而黜鄭理有可通不妨各伸其説惟其中自出新意穿鑿附㑹者如以特牲饋食禮饎㸑在西壁主婦視饎㸑於西堂下為在廟外引爾雅門側之堂謂之塾饎㸑在廟門外之堂堂下今以儀禮考之燕禮曰小臣師一人在東堂下大射儀曰賓之弓矢與中籌豐皆止於東堂下賓之矢則以授矢人於西堂下公食大夫禮曰小臣東堂下士喪禮曰饌於東堂下既夕禮曰設棜於東堂下少年饋食禮曰司官溉豆籩勺爵觚觶几洗於東堂下凡此諸條俱未有以東西堂為東西塾之堂者士冠禮曰具饋於西塾聘禮曰擯者退負東塾而立又曰擯者退負東塾又曰出門西面於東塾南士喪禮曰卜人及執燋者在塾西士虞禮曰七俎在西塾之西特牲饋食禮曰筮人取俎於西塾凡此諸條俱未有稱東西塾為東西堂者又士冠禮曰適東壁士昏禮曰退適東壁亦無以為在廟門外者佃之説殊為牽合佃又謂北堂有北壁考大射儀工人士與梓人升下自北階注曰位在北堂下既有北階明知其無北壁佃弗及考詳而輕詆賈疏亦為未允至謂禓襲之襲從龍龍衣為襲則又附和字説而為之尤無足深詰矣方回瀛奎律髓稱胡宿與佃詩格相似宿詩傳者稍多佃詩則不槩見惟詩林萬選載其送人之潤州一首瀛奎律髓載其贈别吳興太守中父學士一首能改齋漫録載其韓子華挽詩一聨而已今考永樂大典所載篇什頗夥大抵與宿並以七言近體見長故回云然厥後佃之孫㳺以詩鳴為南宋與尤袤楊萬里范成大並稱雖得法於茶山曽幾然亦喜作近體家學淵源殆亦有所自来矣乾隆四十七年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三陶山集目錄别集類二宋巻一五言古詩一首七言古詩三首五言律詩十五首五言排律詩一首七言律詩三十八首巻二七言律詩七十八首巻三七言律詩六十三首五言絶句四首七言絶句二十一首巻四劄子十三首狀八首巻五議二首巻六議四首巻七表二十首巻八表二十二首巻九經解四首䇿一首䇿問十二首巻十制二十六首巻十一叙論一首序四首書後二首記四首巻十二書六首巻十三啓二十九首祝文十一首祭文六首巻十四誌銘九首巻十五誌銘十六首巻十六誌銘七首墓表三首行狀二首
