body:
  text: 陶山集巻九宋陸佃撰經解易解凡物有掛者有象卦掛也故孔子釋卦體謂之象天行健地勢坤之類是也有效者有繫爻效也故周公作爻辭謂之繫潛龍勿用履霜堅冰至之類是也周禮于天官言懸治象于地官言懸教象此有卦者有象之證也曲禮言效馬效羊者右牽之效犬者左牽之此有效者有繫之證也懸者掛之也牽者繫之也八卦解上方近剛圓近柔柔非所以為健也圓則通方則滯滯非所以為順也天之形圓以柔地之形方以滯圓以柔故其形不健方以滯故其形不順雖然天形不健其行健地形不順其勢順故乾曰天行健坤曰地勢坤天在道故乾以行言之行出于徳故也地在器故坤以勢言之勢生于形故也夫天以剛濟圓地以柔濟方此性命自然之理也王弼曰圓而又柔方而又剛求安難矣柔説而附之者麗也剛止而并之者兼也故艮言兼山兌言麗澤行而從之者隨也存而㫁之者洊也蓋氣以散相推而成風以聚相持而成雷存則聚行則散故巽言隨風震言洊雷起而上者作也推而下者至也火炎上水潤下故離言明兩作坎言水洊至兩物相差為二二物相敵為兩于離言兩作者以重明相繼而作于上也文于象形鳥飛而下為至于㑹意水洊而至為洊于坎言洊至者以重險相繼而存于下故也八卦解下乾言重剛則坤可知也巽言重巽則震可知也以重險言坎以重明言離則艮兌皆可知也蓋天下之理有體斯有用有性斯有材故乾以重剛言其體巽以重巽言其用坎以重險言其性離以重明言其材非獨如此而已也又其以健設位髙而大者乾也乾者體之至以入行權稱而隠者巽也巽者用之至故乾以重剛言其體巽以重巽言其用離者南方之卦也南者材之所坎者北方之卦也北者性之所故離以重明言其材坎以重險言其性材則華性則質華則見質則隠故離為文明坎為信坎為隠伏離為見也夫有體以藏其性而性足以成體有用以顯其材而材足以致用則天下之理具矣于父言體則于母闕之者舉陽以見隂也于長女言用則于長男闕之者舉隂以見陽也言性于中男言材于中女而闕于男女之少者舉隂陽以相見也乾也者用天者也坤也者用地者也以乾坤而推六子則震巽坎離艮兌者各用其形者也離之性麗坎之性陷以坎離而推六卦則健順動入止説者各因其性者也故以重巽而推之則天重乾地重坤雷重震水重坎火重離山重艮澤重兌從可知矣以重險而推之則乾重健坤重順震重動巽重入離重麗艮重止兌重悦從可知矣以重明而推其材以重剛而推其用則諸卦宜亦若此而已河圖洛書説原註誤載荆公集中孔子曰河出圖洛出書聖人則之夫圖必出于河而洛不謂之圖書必出于洛而河不謂之書者我知之矣圖以示天道書以示人道故也蓋通于天者河而圖者以象言也成象之謂天故龍負之而其出在河龍善變而尚變者天道也中于地者洛而書者以法言也效法之謂人故龜負之而其出在洛龜善占而尚占者人道也此天道自然之意而聖人之作易所以則之者也策御試策案佃本傳熙寜三年廷試賦遽發策題士皆愕然佃從容就對擢甲科此策即其廷對時所作問朕徳不類託于士民之上所與待天下之治者惟萬方黎獻之求詳延于廷諏以世務豈特攷子大夫之所學且以博朕之所聞蓋聖王之御天下也百官得其職萬事得其序有所不為為之而無不成有所不革革之而無不服田疇闢溝洫治草木暢茂鳥獸魚鼈無不得其性其富足以修禮其和足以廣樂其治足以致刑子大夫以為何施而可以臻此方今之弊可謂衆矣救之之術必有本末所施之宜必有先後子大夫之所宜知也生民以來所謂至治必曰唐虞成周之時詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善要其所以成就亦必有可言者其詳著之朕将親覽焉臣對臣聞聖人之王天下也教有條理政有節目其為數雖大且多而其要乃在于任賢立本而已蓋其哲足以知人然後有以任賢其惠足以安民然後有以立本哲者智之發也惠者仁之施也其智能哲其仁能惠則其施于任賢立本之際也無所不宜使之以因任責之以原省翼脩者無卑棲器近者無逺用而長于教者不以典刑審于禮者不以司樂此百官之所以各得其職也道徳已明然後次之以仁義刑名已詳然後次之以分守其治至于定然後文之以禮其功至于成然後文之以樂小大有秩先後有宜此萬事之所以得其序也當是之時政教既成道徳同而風俗一上有道揆下有法守朝信道工信度君子不犯義小人不犯刑所循者一理所共者一意而為之上者有以見天下之賾又有以見天下之動而至精之神足以通天下之志至變之機足以成天下之務其所更者必其民之所既倦也其所循者必其民之所已安也是以凡所謂精義入神備物致用立成器以為天下利者莫不家使之同人與之共也而又未嘗不鼓舞以盡其神變通以盡其利此其有所不為為之而無不成有所不革革之而無不服也臣聞唐虞之際建官惟百至夏商而二百又至于周而三百其員亦可謂多且備矣然迹而攷之官之為農而設者蓋特衆也故方是時閭有胥族有師與夫田畯大夫之徒夙夜勸相而其相見有至誠之喜絲事既畢而麻事繼興野功既訖而宫功尋至藏蔬于其秋以備不給之冬索綯于其夜以備不足之晝勉之如此其至也然不耕者其恥無盛而其罰有屋粟不蠶者其恥無帛而其罰有里布驅之又如此其備也而井牧之内十夫有溝百夫有洫千夫有澮萬夫有川旱得以聚水得以洩此田疇之所以闢溝洫之所以治也當是之時百度修而萬事理上下治而財用足其神徳有以範圍天地之化其聖功有以輔相天地之宜而所交者有道所奉者有禮豺獺既祭然後漁獵興鷹隼既擊然後罻羅設妄斧者有誅數罟者有禁胎不得而損巢不得而覆四海之内山繁川富區萌達羽翼奮夏希革冬氄毛各得其時而魚麗之盛多崇丘之高大皆得而極焉自晚周以來而世所謂隂陽失序非春而燠非冬而寒草木不待霜而落昆蟲不待雷而奮者于此之時蓋未之有此鳥獸草木之所以無不得其性盡其宜而其禮足以備其樂足以廣其刑足以致也是以唐虞之際行天道以治人行人道以奉天建天官以熙人績建人官以亮天功明之以俊徳神之以妙用而政教之及其逺至于暘谷幽都之方其詳至于東作西成之事其微至于希革氄毛之類其象至于日月星辰其器至于律度量衡而推而下之至于有周其治又極矣故其齊莊有造之徳至于始笄之季女未冠之幼士而其戒慎無愧之行至于漢上之游女林間之鄙夫有後世壯夫老婦禮義之士愧而懼之者也先王之往既逺矣自漢以來其餘澤已熄其舊法已微雖欲治之主合謀之臣固多而創法立制庶幾于先王之意者獨有唐而已蓋常員定設官之制永業限授田之法置府衛之二兵以寄習軍之政設租庸調之三法以制取民之節此其有以宜于當世而庶幾有古人立法創制之意其詳可得而言者也若夫致今之治革弊之本末制宜之先後蓋陛下有天地之體有神明之用而方舉賢于朝協心委誠敦守位之仁講理財之義興農桑以根天下之政事開學校以本天下之禮義一切不惑于流俗之言可謂堯舜之用心而篤于自信者也雖然臣抑聞之圖天下之治者存乎意無良法以施之則雖有良意不能立施天下之意者存乎法無良材以守之則雖有良法不能行陛下之意可謂有至誠惻怛求治之志而其創設之法又已良矣惟成之以不倦之勤待之以勿亟之漸而擇天下之良材盡得以任之則所謂唐虞成周之隆可以坐致而彼有唐之制焉足以參其議哉臣昧死臣謹對策問太學策問案佃嘗為國子監直講疑此策問即為當時試諸生之作問大學之道方興未艾也士之來學者蓋已千數有司為之并錫慶兼朝集而地乃至更乏别為憩賓溢為待試而人乃至更多可謂盛矣然竊或有疑焉蓋諸生之從事于斯也彌年矣學有制齋有規而行未盡篤實或至于冒戒禁公有試私有課而言未盡簡文或至于戾勸講意者刻核太至法有難遵而諸生固不得已耶意者非法之罪諸生言失于率爾行失于且然而智不能自工義不能自克耶伊欲論古之長道議今之圓法因貳參合以率于大具而使諸生共宜之庶幾言皆有文行俱有實也然其所以時措之方未燭厥理吾子為陳之可乎又問堯舜三代逺矣區區漢唐雖欲追古然君臣皆卑弱不足以堪其任故道化政法寂寞無聞而先王之風以至于今未返也聖上閔焉以盛徳作新之士為之崇學校訓經術更選舉之具官為之飾府寺增吏禄操督責之柄農付之常平商委之市易皆以興利除害而其為法深逺矣又以在我者潤澤之蓋意常嚮望堯舜三代是所以千萬于漢唐而無算者也今将討論似續一二以還先王之政則因此數法者須之以久遂可以追于古歟抑将有續終成後者而施設之方序有所未逮勢有所未遑歟夫治古逺矣且欲追而復之以償千世之望則事半而功倍正在聖時二三子其為言之省試策問原註元豐八年問昔之善為士者問學必有師講習必有友以論經則明以議史則達以立文則工以造行則美其磨礱陶冶之漸非一日也今諸生䝉被徳澤而從事于斯固勤矣願聞平居所以嚴師親友之義經如何觀而得道之真史如何閲而得事之要立文曷為而工造行曷為而美其悉數之以應有司之求可乎武學策問問天下之理至精無二孫武之書一義不容兩為之説而注之者至十數家何其説之多也今欲集諸家之善統異端庶幾學者有所折衷而衆言具在于武之意孰得一二孰得三四孰得五六諸生從事于此久矣當能辨之又當有以自得之者以發前説之所未嘗也有司願併聞之可乎又問天右序有宋篤生聖上全治所覆從化之以文横勵之以武英威俊徳度越前古是以東懐高麗南屈交趾洮河以西窮髪之北莫不賓順而國家閒暇矣吾子幸丁斯時惟閒暇故得嫺習于此然而孫武曰善戰之勝無智名無勇功武之為説雖多未有賢此者吾子以古求之孰有智名孰有勇功孰無智名勇功且其智名勇功奚自而有無也其有與無厥效如何試為言之又問材勇機智人各有能求其兼長豈易得哉有詞辯縱横足以屈人而不可以決戰者有氣俠精悍足以摧鋒而不可以合變者有習知天時而昧于伺敵之情偽有明識地利而拙于出竒以攻守行師之際用非所長則安可以辨勝今子之應選固将以就功名也其材勇之所堪任者何事其機智之所優為者何術願罄所藴以陳庶觀異日之效又問方今夷狄款附内外無患主上以士之或不習用兵也學校以養之以民之或不習于為兵也什伍以教之選命将帥修飭器械十年于此士有所養矣或述其答問計數之故智而虚實竒正之勢未必皆知也民有所教矣或安于坐作進退之常法而戰陣撃刺之事未必皆勇也将帥選矣而尚慮人材之或遺器械利矣而尚慮法度之未盡諸君以策應有司之求如之何使士于虚實竒正之勢皆知民于戰陣擊刺之事皆勇将帥無遺材器械無遺法其詳言之又問孫吳韜略之書具在子嘗學之矣然其論兵孰疎孰密其合于先王之師孰多孰寡設此四人起于一時其兵同戰之地又同各以其術決戰則孰勝孰負以之城守孰堅孰脃試為言之又問兵無選鋒曰北故古之善為武者後必有殿而前必有選鋒詩不云乎元戎十乘以先啓行凡烏合之衆易散勝不相推敗不相救非若禮義之師則突前之利尤在選鋒一入而以後繼之此勝勢所以如破竹之聲今天下無事矣而未忘講武者蓋求所以禦邊之策而已方将復先王選鋒之法而教所謂車戰則造車必有制行軍必有法若為徒若干則其為乘宜幾何其為陣宜奚若子嘗從事故知之願言所以為此之方也又問古之善用兵者豈必同哉歸于能勝而已故李廣簡易而程不識繁密子儀寛厚而李光弼嚴整體雖不同皆足以取勝號稱名将諸生求學為此久矣審已之長其志宜有所在設為聖時任使則馭軍決勝将為簡易乎為繁密乎将為寛厚乎為嚴整乎不然其志安在又問兵者百世不一用不可一日忘也國家承平百年兵習久安而惰驕民非素教而憚怯數嵗以來主上以訓齊之法新之而精鋭並出蓋昔之惰者今奮怯者今勇矣今諸君見用于世以制戎狄得此兵用之自度能幾教如何行愛如何立願聞其略又問學之法所以選試諸生先之以弓馬申之以策義者豈誠以為驗天下周智全勇在此也哉抑亦以觀諸生之略而已今諸生應法之求弓馬雖或優策義雖或善然所謂周智全勇果在此乎将在彼不在此也其在彼則所以養之當自何始願聞其道陶山集巻九
