body:
  text: 陶山集卷三宋陸佃撰七言律詩依韻和毅夫即事五首昨日紅裳伴燕游渚花爭好草爭柔依稀黃鳥渾相識期刻青山卒未休風似去年搴翠幕原注去年天穿日晚筵亦風雨分明日與芳洲原注次日雨還移㑹花洲即今太守無佳句空愧當時宋采侯卻笑元宵是夜游金針穿石綵絲柔萱堂帳幄閒仍出幕府文書了即休顧我寶珠連合浦愛君仙果滿瀛洲誰知竝轡聊同俗拜後如今有魯侯平明一雨阻重游風皺前溪緑謾柔況已上元連夜出不如寒食看春休弄珠灘漲平侵岸摸石江深抹盡洲自是苦隂無意思莫將潮信枉陽侯十年京洛從宸游得郡終難繞指柔廬舍昔希三肯顧亭臺今負四宜休何人正在芙蓉島有客空吟杜若洲為問西街孔君子設監那得似諸侯謝安攜妓是清游玉瑩金尊十指柔桃自三千年結子鼇于六萬嵗更休猿啼謾想黃牛峽鳯去空傳白鷺洲我若他年封萬户秖來穰下作穰侯依韻和毅夫百花洲新橋省中何必就尚書且向新橋一振裾嬌女頃嫌撐小艇偏親今喜度安輿假饒跨鯉終難學除卻垂虹盡不如原注垂虹松江橋名從此使衙烏亦好豈無遺愛在胥餘原注事見尚書大傳答毅夫遺橘株之什三首平生希慕范萊蕪恥把耕耘一問奴碑較智愚能幾里樹爭貧富沒多株報之瓊玖如投李遺以珩璜恍弋鳧傳語小城休負固元侯今後不言無亭榭新修道不蕪豐年焉用橘千奴請教青帝留三月擬就嫦娥乞一株種玉水田飛白鷺泳珠風檻對沈鳧便難圖畫猶爭看定是京西一路無曾因書史翦繁蕪更與花王置木奴藍舊出師青萬頃竹新齊母緑千株睡餘枕簟屏開鳯飲盡尊罍勺用鳧一種梧桐亦遭遇翦封終愧內虛無和毅夫倒用無字韻春詩四首皇家寶厯萬年餘禮貌羣臣自古無龍馬己陪阿閣鳯鼎湖猶想裕陵鳧劉郎莫恨桃千樹匠伯應憐櫟一株猶喜後來門户在小兒能賦崑原注入聲崙奴一别勾芒僅嵗餘不知今度老顔無管人憂喜何如鵲與世浮沈可奈鳧擬看笏頭花四朵更栽槐面樹三株若教上番成新竹須戒人家婢與奴附庸新又進於餘原注花洲中新為十花渚欲共南鄰鬭有無橫列溪山埋積雪臥開桃李映新鳧擬舂玉臼丹千杵更種金鎚麥一株原注酉陽雜俎從此有人殽亦有不煩公帑與官奴公錢雖少俸錢餘明日如今作㑹無況有鱉裙勝膾鯉豈無鵝掌代蒸鳧慶歸子舍芝三秀官入卿曹棘九株聞說麗人推不去愛才何止十年奴和毅夫病目三首使君詩思謾雕肝安得頭風與阿瞞然艾為誰甘受痛看花緣此負追歡通天犀帶應憐瘦雲母屏風尚畏寒何日長安同一醉擬教歌舞衒華丹詩戰空懷壯士肝未容旃旆纍祁瞞竝逰曾許花含笑孤憤今慙樹合歡五朵謾將春色寄二篇還伴夜光寒憑君休造斑貓毒且向三田養就丹報君平日願輸肝常笑飛蝗纍李瞞一雨固宜知上德是花猶可盡君歡孤根自識恩波暖老健誰爭氣候寒從此憂民免髭白卻疑甘澤是金丹依韻和毅夫兒病二毛蕭索未應羞謾說初懷弄瓦憂原注毅夫嘗有詩云所憂惟弄瓦又云二色慙衰鬢珠母光芒今吐月豹駒才氣已窺牛自知隂德仙能學誰有靈符鬼可囚早晚病除聞藥喜與君詩酒共清逰易守建業毅夫有詩贈别次韻五首太守無堪久借留君王恩禮與升州親輿自可時來往漁唱猶能數原注一作侑獻酬原注公在金陵有漁家傲十首風色得經揚子渡月明知在海棠洲北山楷木今成列獨傍師門想見丘凌晨寒日弄輝輝我旆東來子旆西對此銷魂兩無語恨初相遇一何稽梅花可惜空隨驛鷗鳥多應不下溪猶有往來魚與鴈好將詩什當書題紫案焚香拜敕黃無因久借蓋公堂不堪落日離魂斷賴有薰風引夢長吹律漸知寒谷暖賣漿曾值暑天凉他年果若成功去乞取南陽作鄧王春渚秋潭不可尋回頭城郭礙高林但知自白三分鬢更與誰論一寸心紅粉淚痕消片玉故人情分重千金臨岐不忍醒時别一任玻瓈酒盞深誰信金陵刺史腸曾懷珠玉夜光芒一塵侍從才雖短雙奉君親日更長得郡免營三釡粟過都容捧萬年觴遙知南北相望處風在檀欒月在棠依韻和徐大夫鳯凰池九首借山樓小已新竒更近東邊得鳯池一日未嘗無客過百年今始有人知原注案圖經鳯凰池百四十年前曾有刺史增修舞餘裙帶雙垂緑詩就珊瑚半露枝為問鵷雛歸得未虛來阿閣已多時使君年老强搜竒來傍吟窗擁被池明月清風初未覺原注公詩有明月清風尚不知之句白鷗黃鳥舊相知原注佃昔嘗有詩句云白鷗黃鳥盡相知水通河漢無多地鳯在梧桐第幾枝好是與民同此樂豐穰仍值太平時池就臺成竟大竒畫堂新燕亦差池人非楊栁看來瘦春有梅花探得知華髮漸驚强半白素娥曾與第三枝海邦莫道無賓客冠蓋如今盛一時東君著力信神竒桃李中間水滿池定是秖教淮甸有若為長得泰州知案佃在紹聖初落職知泰州詩即作于此時徐大夫未詳何人按其語意蓋亦同時長官也行藏正倚樓千尺勳業初橫草一枝投老尚堪驅使在問春何似少年時公事稀疏已自竒那堪園更勝舒池誘將醉尹來無數禁得詩人瘦不知蝶夢幾隨蝴蝶逺鳯雛仍在鳯凰枝賞心樂事知多少雪月風花是四時平生仕宦不求竒誰怕他人奪我池地勝更無塵可到天隂惟有病先知從教寶塔來當面消得雲樓為折枝看取鶠堂何似好夜深歌管月明時老懶由來怕立竒偶然尋得舊家池一州秖此為無及纍政因何盡不知歌吹徹雲城百尺樓臺侵夜火千枝憑誰為報鶯花道一日須來十二時倣佛華胥一夢竒斬新樓閣舊城池夜深猶有人家看晝寢惟應燕子知疏雨有時三兩㸃好花何啻萬餘枝諸公若肯相追逐趁取春風爛漫時恰似蒲萄水亦竒逰人多似後園池壺中日在歸前落醉裏詩成醒後知芳徑綽開楊栁樹小牆闌出杏花枝老拳毒手渾相若望立降旗是幾時朝散案宋官志朝散大夫從五品下朝散郎從七品下此云朝散似非即徐大夫據本集有和查應辰朝散雪及贈新恩先輩之什疑是指應辰言而上下尚有闕文使君竟亦不能竒賴有詩翁壯觀池二百年來無此作兩三人外有誰知魚應變化垂天翼鵲不經營墮地枝况復鳯毛如得鳯古來遭遇或同時依韻和張椿一年三十有餘旬最愛韶華是令辰坐久落花深一尺睡餘淺粉看重勻況當諸縣無公事且與雲樓作主人今日與君俱白髮看花情味尚青春依韻和查朝散贈新恩先輩收得宫花上帶春緑袍仍共草爭新發揚杜老詩無敵蓋覆吳侯政不神平地彩雲看接武一天明月負垂綸怪來瀕海多儒士龍閣從來是里人依韻和徐大夫朱絲同直水同清紅袖何妨當使令可惜去年他處看原注公去年不同此㑹不知今夜幾州明年華老去知無補眉嫵初閒似有情且向雲樓拌共醉儘他燈火暮禽驚中秋微隂年年月色是中秋莫為今宵海上樓要得長圓真妄意放教微暗亦良籌步金甎上顔仍好頽玊山前德盡柔生怪嫦娥苦羞澀都緣瞋不强公逰中秋用别韻答張椿兼呈徐瓘偶被微雲掩素娥昏昏如似隔輕羅原注是夕中秋有纖雲蔽虧秖應夢裏朦朧慣可是秋來淡薄多捨此豈無珠可玩學渠猶有扇能歌㑹須明夜分明在況有詩人為琢磨依韻和查許國二首重淵誰道探珠難恰值驪龍睡重間工部藩籬今夢草司空門館舊銜環心腸何啻吞雲夢身手猶堪擘華山況有舊家仙桂在姮娥留著待君攀誰作明堂一柱看謫官猶詿罪中間名成何必頻看鏡道在終須得賜環一片靈臺江上月七株仙果海中山回頭為報姮娥道擬把高枝次第攀寄龔深之曾子開先生官冷久京華衣有塵埃飯有沙半夜尚聞親舊草一春長是負新花兩龔清潔推君子二陸文章屬當家更憶巷南曾學士坐將盤誥解聱牙依韻和查許國梅花六首臘月狐裘尚御黃靚妝先了為誰忙與春不足都緣淡教雪難知秖為香曾擁旌旗聞鼓角終隨彝鼎見蒸嘗少陵賴爾牽詩思得向詩中號帝王水天清淺月昏黃傳語諸花未要忙詞客盡應相識早玊人誰有自然香秖承雨露尤消得況乃冰霜已備嘗未用夜寒吹玉笛切須丁囑與寧王平日栽培土盡黃看來人自有閒忙池臺直下疏疏影簾箔中間淡淡香命說夢魂猶未破說湯滋味得先嘗憑誰為訪桃花浪何路能酬百谷王妝閣無端畫月黃見他閒淡轉蒼忙隴頭惆悵經年别衣上殷勤盡日香期刻莫將蓬鬢插思量消得瓠犀嘗若教梵竺諸天有何必龍華引象王北窗高臥識羲黃靜看東君職事忙短帽上垂年少事淨瓶中養月餘香鏡鸞羞愧臨梳裹鹽虎推先在饗嘗試問古來誰可伴風流東晉有諸王共月新成榜字黃使君霜鬢未須忙春前臘後千回顧天上人間一分香莊子夢魂休道識太公牙齒要須嘗論功縱在姚黃下果子花中合是王原注共月亭名依韻和許安石風和鵲喜就中靈忽報軒車到驛亭解得禮經歸指掌弄成詩筆勝丹青早年花蕚光原隰今日芝蘭滿户庭聞說龍州佳闕近蜀人先已望流星從駕幸龍德宫案宋史徽宗紀元符三年九月己巳幸龍德宫時佃為吏部尚書詩中第六句及注與史事正合玉鎖晨開厚載門人家隨處著雕輪潛龍宫邸來惟舊復辟簾幃卷尚新深巷盡言窺日月粗官難得後埃塵原注尚書非逰幸不許從駕戴恩自覺丘山重願放鼇更六萬春天寧節口號原注亳州日案宋史徽宗紀帝生為天寧節九天宫闕五雲新共向中間望紫宸几杖一千年父老衣冠三萬里君臣瀨鄉老子如今檜䝉縣莊生上古椿就祝聖君千萬嵗過于天上夀星辰寄彥猷閣老某前嵗奉使還領揚州今彥猷亦自境外歸得姑蘇案宋史本傳佃以吏部尚書報聘于遼據徽宗紀在元符三年七月逾年拜尚書右丞未嘗領揚州前此亦未嘗奉使此詩與紀傳不合疑非佃作或誤以他人詩雜入者今姑存之相望持節出盧龍繼踵分符别紫宫汲黯雖嫌棄為郡袁絲應憚久居中文章不見于時益出處何知與子同紅藥萬株天下絶謝公來肯醉薰風原注此州芍藥冠絶天下和周邠朝奉相見還如潁水濱不應衰邁久風塵幾回醉裏成狂客一向詩中作貴人故國生涯元自薄老來情分剩相親薦賢況有諸公在早晚除書下玉宸新橋碧光新近跨長橋免使逰人隔岸招想像蓬瀛今倣佛丁寧風雨莫漂搖少浮蛟蜃平生氣才露虹霓一半腰明月滿天天似水直疑霄漢路非遙題周中散至樂堂一瓢到底勝珠玊萬籟由來當管弦盡日海鷗陪燕坐有時溪栁伴閒眠不知萱草憂何事今見蟠桃定幾年回首真人足官府劉安何苦要升天丞相荆公挽歌詞慣識無心有海鷗行藏須向古人求臯陶一死隨神禹孟子平生學聖丘雕纂想陪清廟食玊杯應從裕陵逰遙瞻舊館知難報絳帳橫經二十秋吕申公挽歌詞家世從來聳具瞻平生僚友憚方嚴挂閒麈尾清談罕傅盡龍髭老病添共惜一朝埋玊樹正當雙日下珠簾自慙曾借風雷便初與魚龍出滯淹韓康公挽歌詞三首熙寧初見築隄沙曾與千官聽白麻常棣行中排宰相原注公家呼公為三相公洛中相公為六相公梧桐名上識韓家原注京師人呼桐木韓家以别魏公平生事業留青史一夜塵埃暗碧紗聞說手栽桃李在春來應有萬株花三台光耀紫微中康國仍兼萬户封有子晨昏長侍膳原注公子少卿未嘗出仕常在左右誰家兄弟盡登庸非關庚日曾占鵩自是辰年並值龍原注公以辰年原月辰日辰時薨他日凌烟求繪匠願憑丹筆為形容龍虎常瞻榜上名識公初向鳯凰城三千賓客知毛遂原注晚登公門最辱知遇五百人家待晏嬰原注公分俸贍族人甚衆擬看玉書容拔宅安知金鼎誤垂成後園履迹今蕪沒惟有清風伴月明吕尚書挽歌詞禍患相仍涕淚頻司空墳上草猶新鶺鴒花蕚空餘子龍馬圖書併失人原注孫莘老李公擇蔡仲逺王子難并公五人皆以是年卒遍歷名藩今始老長如寒士本非貧如何一日埋金碗獨向清時不秉鈞蹇翁待制挽歌詞仕宦聲名四十年歸心日夜望林泉文移竟負登山屐箋記空隨過海船原注上命儒臣草高麗書獨用公詞花塢夕陽今逝矣錦江春色謾依然傳家況有珠璣在㑹向人間月夜圓程給事挽歌詞桃花墳塢土新乾歎息高才又玊棺竟逐兩翁談笑盡空留三老畫圖看異書㑹見傳吳市妙斫何知失郢墁聞說錦囊佳句在光芒猶伴夜珠寒王聖美學士挽歌詞使君政事與文章憂患平生亦備嘗資善故人今白髮邯鄲一夢已黃粱田園倚仗千株橘花蕚飄零一樹崇聞說異書竒字在不妨分付與諸郎魏國太夫人陳氏挽歌詞門户同歸太史評傳芳消息在瑶瓊鳯銜誥詔從夫貴龍負圖書識父清金鴨火銷香自逺玊奩珠在月空明也知欲向華胥問炊盡黃粱夢不成五言絶句送李劭縣令長官衫色暗玊雪久甘貧為問江西月如君有幾人悼亡二首門巷雨蕭蕭黃昏掩寂寥曲終人不見花落夢無聊燈火夜寥寥殘香不可招朱扉寒半掩金鴨暖全消詠史珠履三千兩金椎四十斤阿誰知狗盜郤解脫田文七言絶句景德寺考試秋日即事四首朝來爽氣雨初乾喬木隂隂鎖晝寒深院下簾風不動夕陽幽鳥傍闌干秋聲一夜滿長安密雨疏風次第寒幽草落花歸思亂寂寥終日倚䦨干西風吹皺一池秋故殿疏簾半上鈎滿眼夕陽歸未得菊花桐葉伴人愁看盡斜陽夕未還夜天如水斷雲閒玊樓咫尺無人去月上珠簾第幾間又景德再考試秋日即事重來時節又秋深黃菊香中一炷沈渾覺去年無限恨物華人意總如今試院夜雨思秦叔仲至呈信道秋聲秋色總無聊千里相思鬢欲凋獨繞曲廊花院閉夜深燈火雨蕭蕭依韻和程給事贈法雲長老重喜識字如今尚未深掃廊才悟便能吟法雲香火修行久夜半潮聲避梵音送俞括知貢州太守官清著破衫秖應泉水誤名貪遙知鴈足書難到州在衡陽盡原注上聲近南悼亡八首索寞還尋靜處行物華如舊嵗華更緑槐蒼檜曾相識想見英雄訝瘦生深炷爐香淺㸃茶午庭愁寂下寒鴉佳人仙去無消息腸斷春風一院花雪消姑射豐肌盡雲入陽臺短夢頻可惜舞衣猶粉黛不堪歌扇已埃塵春逺落花隨水盡夜深明月向人圓崑崙欲使知無路仙苑分明隔洞天風月相望也不多秖應清淺隔天河欲憑烏鵲傳消息一度逢秋一度過忽地輕紅四散飛尋常春色未應稀東風大是無情思吹落餘香便不歸百花流轉逐浮萍柔質那堪殞妙齡畫手若能圖列女玉顔應許上丹青淡紅濃紫總銷魂春恨無人可共論徙倚暮寒襟䄂薄落花門巷月黃昏題李門下江行初雪圖二首漁翁披得一漁蓑物色雖幽奈冷何長怪高宗問霖雨元來黔首要中和須知元化仗丹青移得滄江在畫屏看取乾坤一般色可憐長短謾相形題王允中至樂堂顔巷雖貧樂有餘簞瓢終不換金珠長安大第連雲起還有君家此樂無傳神詩富貴從來我自知商巖霖雨偶愆期秖應鬚鬢年來改不及高宗夢裏時送陳初道録巉巖瘦骨欲成金雲鎖三茅洞府深莫遣桃花流水出等閒應被客相尋陶山集卷三
