body:
  text: 陶山集卷五宋陸佃撰議元豐大裘議被衮時張璪等皆請服無旒之冕不且以黑繒為裘佃獨上此議宣德郎守太子中允集賢校理充崇政殿説書詳定郊廟奉祀禮文臣陸佃臣看詳冕服有六而周官辨師云掌王之五冕則大裘與衮同冕矣故禮記曰郊之日王被衮以象天戴冕璪十有二旒則天數也又曰服之襲也充美也禮不盛服不充是故大裘不裼此明王服大裘以衮衣襲之也先儒或謂周祀天地皆服大裘而大裘之冕無旒非是矣蓋古者裘不徒服則其上必皆有衣故曰緇衣羔裘黃衣狐裘素衣麑裘如郊祀徒服大裘則是表裘以見天地表裘不入公門而乃欲以見天地可乎且先王之服冬裘夏葛以適寒暑蓋未有能易之者也郊祀天地有裘無衮則夏祀赤帝與夏至日郊祭地示亦將被裘乎然則王者冬祀昊天上帝中裘而表衮明矣至于夏祀天神地示則去裘服衮以順時序周官曰凡四時之祭祀以宜服之明夏必不衣裘也或曰王被衮以象天此魯禮也臣以為記曰周之始郊日以至王被衮以象天則豈得以為魯哉或曰祭天尚質故徒服大裘王被衮則非所以尚質臣以為謂之尚質則明有所尚而已不皆用質也如蒼璧以禮天黃琮以禮地旗十有二旒龍章設日月此豈用質也哉故曰祭天掃地而祭焉于其質而已矣牲用騂尚赤也用犢貴誠也王被衮以象天戴冕璪十有二旒則天數也旗十有二旒龍章而設日月以象天也夫理豈一端而已亦各有所當也今欲冬至禋祀昊天上帝服裘被衮其餘祀天及祀地示並請服衮去裘各以其宜服之如允臣所議乞賜施行候敕旨原注元豐四年十月二十二日中書劄子奉聖旨依奏案宋史佃本傳神宗問大裘襲衮佃考禮以對神宗悅用為詳定郊廟禮文官即此議是也據史云同列皆侍從佃獨以光祿丞居其間今集中載此議在元豐四年佃于二年已為集賢校理時轉官已久足證載筆之誤又裘字史訛作喪諸本並沿誤元祐大裘議朝奉郎試尚書禮部侍郎充實録修撰陸佃檢會禮部奏元豐新禮皇帝祀天服大裘雖用黑羔皮為之仍作短袍樣制襲于衮衣之下與衮服同冕慮于禮典未合乞下禮部太常寺討論改正者佃謹按禮記玉藻曰服之襲也充美也又曰禮不盛服不充故大裘不裼則大裘襲可知襲從衣從龍亦或從龖龖二龍也則大裘襲衮可知大裘襲衮則與衮同冕亦可知故郊特牲曰王被袞以象天戴冕璪十有二旒則天數也而周官亦曰辨師掌王之五冕王服有六而辨師掌王之五冕則大裘與袞同冕明矣據此王冬祀昊天上帝被大裘服衮戴冕璪十有二旒經證甚明無足疑者今何禮部申述以為有可疑者八緣事無實質豈可以一人之私疑而欲改易大禮又況看詳並無可疑者具下項一何禮部云謹按周禮辨師掌王之五冕而司服實有六冕所謂大裘而冕袞冕鷩冕毳冕希冕玄冕是也又節服氏掌祭祀朝覲衮冕六人維王之太常郊祀裘冕二人執戈送逆尸從事既云衮冕復云裘冕則是裘衮各有冕不得大裘與袞同冕然辨師止有五冕蓋其職以旒玊為主而大裘之冕無旒故不聨數此其可疑者一也看詳周官司服掌王六服即無六冕之正文而辨師云掌王之五冕則是大裘與衮同冕若謂大裘之冕無旒故不聨數緣無旒之冕其説始于鄭氏實不經見而鄭氏言蓋無旒亦自以為疑則冕止于五可知又鄭氏謂大夫亦服無旒之冕今王祭天而與大夫之冕同則人儼然望之亦何以示尊卑之别哉節服氏云衮冕六人惟王之太常裘冕二人執戈送逆尸蓋大裘而冕謂之裘冕非大裘而冕謂之衮冕則衮冕必服衮衮冕不必裘今特言裘冕者主冬至而言之此無可疑者一也一何禮部云王有六服后亦有六服王之服自裘冕而下公之服自衮冕而下侯伯子男以至大夫士之服皆以降一等為尊卑之别王所以異于公者止有一裘冕耳今乃云裘與衮同冕當以衮襲之裘既無冕又襲于衮則是裘為裏衮為表凡所以謂之服章者蓋以章明貴賤之等以表于外而已今中裘而表衮則人儼然望之何以示裘衮之别是大裘徒有其名而無其實司裘何得云掌為大裘以共王祀天之服司服何得云王祀昊天上帝則服大裘而冕此其可疑者二也看詳王有六服后亦有六服王之冕五后之首飾三則六服不必六冕王之所以異于公者自以五采繅十有二就五采玊十有二玊而公三采九就九玉則衮服雖一而旒玊不同此正所以章明貴賤也豈得分衮冕裘冕而後為異哉若謂中裘而表衮無以示裘衮之别緣凡衣必有領焉以表于外如繡黼丹朱中衣是也何患裘衮之無别哉此無可疑者二也一何禮部云夫冬裘夏葛以適寒暑非有甚難知之理也古人雖質不應以裘為夏服但禮文殘缺無以言之然亦可以理求也如韍字從韋或從糸記曰有虞氏服韍易曰朱紱方來是從韋則冬服從糸則夏服必矣如韋辨服先儒解者云以赤韋為辨又以為衣裳或曰蓋韍布為衣而素裳二説非相戾也是亦順寒燠而已雖屨亦然士冠禮曰屨夏用葛冬皮屨可也以此推之則冬用大裘至于當暑不害其同色繒為之也若曰夏祀天神宜衮而已則衮乃饗先王之服非祀五帝所用其祭地祇之服即不見于經故曰祀昊天上帝服大裘而冕祀五帝亦如之饗先王則衮冕此其可疑者三也看詳大裘冬服也冬日至然後服以祀天若夏祀天則惟衮而已其祭地蓋亦如之故曰凡四時之祭祀以宜服之先儒謂崑崙神州亦服大裘謹按司裘曰掌為大裘以共王祀天之服則祀地不服大裘祀地不服大裘則以夏日至不可服裘故也今謂大裘當暑欲以同色繒為之又謂祭地之服不見于經然則欲以同色繒為之豈見于經哉兼與所引屨辨不同緣裘之名施于冬而已又經曰王被衮以象天則衮正祭天之服饗先王則衮冕云者是以祭天之服饗先王豈可執云衮乃饗先王之服非祀五帝所用此無可疑者三也一何禮部云記曰郊祭之日王被衮以象天戴冕璪十有二旒則天數也若謂裘上被衮以被為襲故引以為據則家語亦有此文但易衮為裘曰被裘象天又此一節正與周禮不同何者周禮祭天圜丘以冬日至此云郊用辛則冬至不常在辛是日不同周禮玉路以祀此云乘素車是車不同周禮蒼璧禮天牲幣倣器之色此云牲用騂是牲不同周禮王祀昊天上帝則大裘而冕饗先王則衮冕此云郊祭之日王被衮以象天是服不同然鄭玄以為魯禮王肅以為周禮若以為魯禮即不當言被裘若以為周禮則郊用辛乘素車牲用騂有所不合此其可疑者四也看詳郊之用辛自上辛之郊所謂啓蟄而郊者是也周之始郊日以至之郊所謂冬日至于地上之圜丘若樂六變則天神皆降可得而禮者是也故先儒曰謂之始者對建寅之月祈榖之郊為始據此非日不同又周禮乘玊路而此乘素車者蓋冬服大裘故乘素車皆以象冬反本之時餘郊則服衮而已故乘玉路故郊問上言服大裘下言乘素車同是冬時據此非車不同又牛人曰凡祭祀共其饗牛求牛饗牛蓋饗神之牛也求牛蓋求神之牛也牧人曰凡陽祀用騂牲毛之隂祀用黝牲毛之蓋求神之牲也大宗伯曰以蒼璧禮天以黃琮禮地皆有牲幣各倣其器之色此饗之牲也然則蒼犢所以祀天騂犢所以求之故先儒謂天神中非直有升壇玊帛牲亦有禮神者也地示非直瘞埋中有玊帛牲亦兼有禮神玊帛牲也據此非牲不同由是言之被衮服裘無疑又非服之不同此無可疑者四也一何禮部云郊特牲之文大槩與家語同家語曰天子大裘以黼之被裘象天既至泰壇王脫裘矣服衮以臨燔柴張融所引家語復異于是曰臨燔柴脫衮冕著大裘象天據此或言脫裘或云脫衮冕著大裘又以衮與冕皆脫然後著裘則是裘衮無同冕兼服之理今以二服合而為一此其可疑者五也看詳家語之文或云脫裘服衮或云脫衮冕服大裘雖古今不同然張融所引本曰臨燔柴脫衮冕著大裘則未臨燔柴止服衮冕既臨燔柴則脫衮冕著大裘所謂著大裘者豈可以徒服乎必復加以衮且郊問曰既至泰壇脫衮衣服裘以臨燔柴戴冕璪十有二旒今欲取脫衮服裘而捨戴冕璪十有二旒之文而取無旒之冕何也由此觀之衮裘不害于同冕而兼服此無可疑者五也一何禮部云周禮祭服以衣名冕則曰裘冕衮冕皆衣在上冕在下象上古先有衣後有冕也朝燕之服以辨名衣則曰皮辨服冠辨服皆辨在上服在下餘服既輕舉首為重也皮辨服之下有狐白裘冠辨服之下有黑羔裘若大裘非上服何為獨以衣名冕若狐裘羔裘非下服則皮辨冠辨何為俱以辨名衣蓋羔狐之裘褻故以衣裼之鄭氏曰袒而有衣曰裼必覆之者裘褻也惟犬羊之裘不裼大裘不袒彼以賤此以尚質故也凡裘上有衣謂之裼裼上有衣謂之襲者裘上重二衣也記曰君衣狐白裘錦衣以裼之羔裘緇衣以裼之麛裘素衣以裼之狐裘黃衣以裼之詩曰錦衣狐裘論語曰緇衣羔裘素衣麑裘黃衣狐裘皆據裼衣為言也裼衣與裘同色襲衣與裼衣同色若狐白裘以白錦衣為裼則以皮辨服為襲黑羔裘以緇衣為裼則以冠辨服為襲麑裘以素衣為裼則以諸侯視朔服為襲狐裘以黃衣為裼則以大蠟服為襲襲皆朝祭之上服也大裘則天子吉服之最上謂之大若大圭大路之比是裘之在表者服以祀天示質也記曰大裘不裼説者曰無别衣以裼之蓋他服之裘褻故表裘不入公門事天所以報本而復始非表裘無以見至誠也夫因其自然之謂質祭天因物之自然者也以文則離其本矣故兆為圜丘因高之自然也掃地而祭因下之自然也器用陶匏因性之自然也至于服豈不因裘之自然或宜其露質見素不為表襮而冕亦無旒聖人用是以饗上帝所謂至恭無文大事不崇曲敬也何必假他以藩飾之乎今云大裘以衮襲之似非禮意此其可疑者六也看詳古者裼襲一衣而已被裘而覆之則曰襲袒而露裘之美則曰裼故傳曰裼袒也又曰裼左袒也蓋君衣狐白裘錦衣以裼之亦以襲之羔裘麛裘其裼襲皆倣此記曰凡斂者袒遷尸者襲據此袒無别衣以袒之則裼無别衣以裼之明矣先儒以為裘上有裼衣裼上有襲衣襲衣之上又有正服不知何所據而言然鄭氏注禮雖曰詩云衣錦褧衣裳錦褧裳則錦衣復有上衣明矣天子白狐之上衣皮辨服與與者疑辭也鄭氏以無正文言之猶不果先儒遂以謂凡裘皆有裼衣裼衣之上皆有襲衣襲衣之上又皆有正服誤矣謹按中庸曰衣錦尚絅惡其文之著也據此是惟錦衣為有上衣若緇衣素衣黃衣則何所為而尚絅其無上衣亦明矣故佃以為羔裘以緇衣為裼即以為襲麛裘以素衣為裼即以為襲狐裘以黃衣為裼即以為襲故孔子一言而盡曰緇衣羔裘素衣麑裘黃衣狐裘蓋非専為裼言之也今何禮部稱若狐白裘以白錦衣為裼則以皮辨服為襲黑羔裘以緇衣為裼則以冠辨服為襲麛裘以素衣為裼則以諸侯視朔服為襲狐裘以黃衣為裼則以大蠟服為襲按鄭氏謂冠辨委貌其服緇布衣則所謂緇衣羔裘是也羔裘上既以緇衣為裼緇衣上又以緇衣為襲此何謂也且黃衣狐裘息民之服也皮辨素服蠟服也郊特牲曰皮辨素服而祭素服以送終也先儒謂服此以祭蠟又曰黃衣黃冠而祭息田夫也先儒謂服此以祭臘今曰狐裘以黃衣為裼即以大蠟服為襲則何以分蠟與臘若以謂中裘而表衮無以示裘衮之别今欲內黃衣而外皮辨服亦何以示黃衣與皮辨服之别若以謂露見裼衣謂之見美則緇衣之下又見緇衣何美之有然則所謂裘之裼也裼裘而已其襲也覆之而已大裘不裼則非衮而何此無可疑者六也一何禮部云且襲者對裼之名禮未有不裼而徒襲者禮曰執玊有藉者則裼無藉者則襲又曰裼襲不相因是行禮之時有裼必有襲也以衣服言之則裘上一重為裼故曰君衣狐白裘錦衣以裼之上當被衮宜曰以龍衣裼之而已禮有裼裘襲裘記曰裘之裼也見美也弔則襲不盡飾也服之襲也充美也無事則裼弗敢充也開襲衣而露裼衣不曰見美乎掩襲衣而不露裼衣不曰充美乎是裘上重二衣為襲也大裘本不裼鄭志乃云裘上有玄衣與裘同色蓋趙商之徒附會為説不與經合故前奏所不取今又以一衣為襲似于名亦未正此其可疑者七也看詳玊藻曰禮不盛服不充故大裘不裼則明大裘不裼而襲故曰裘之襲也充美也鄭氏謂大裘之上有玄衣據此雖不知祀天覆裘以衮然尚知大裘不可徒服必有玄衣以覆之又疏云禮不盛服不充者充猶襲也服襲是充美于內惟盛禮乃然大裘不裼者證禮盛服充之時也若以謂大裘則天子之吉服最上是裘之在表者服以祀天示質不惟于經大裘不裼之義有害亦于先儒之説不合又玊藻曰服之襲也充美也是故尸襲注云尸尊疏云尸主尊位無敬于下故襲也節服氏曰郊祀裘冕二人執戈送逆尸注云裘冕者從尸服也疏云服與王同大裘節服氏亦大裘夫尸服大裘而襲則王服大裘而襲亦可知今以為大裘則天子之吉服最上是裘之在表者以祀天示質不惟于經是故尸襲之義有害亦于先儒之説不合又禮所謂見美者露裘之美使見于外充美者覆裘之美使充于內若謂開襲衣而露裼衣為見美掩襲衣而不露裼衣為充美則是露掩反在裼衣不在裘與玊藻所謂裘之裼也見美也之言有害若謂至恭無文大事不崇曲敬大裘不必假他衣以藩飾之緣裘褻不可徒服故被以衮又非借衮以為藩飾此無可疑者七也一何禮部云襲古文作㦻蓋用兵因其不備而掩之曰㦻若裘上以重衣掩之亦曰㦻故從習有因習之義從戈有掩覆之意篆文從龍從衣許慎曰從衣龖省聲籕文不省然今之襲字雖從龍其義本出于重沓而已蓋龍者龖之省也如曾子襲裘而弔又衣一稱亦謂之襲大要以重沓為義今或云于文龍衣為襲此其可疑者八也看詳襲于文從龖龖二龍也蓋衮之象亦或從龍龍亦衮之象也若止謂有沓之意何不從沓而從龖也又謂衣一稱亦謂之襲大要以重為義蓋裘上有衣是亦為重此無可疑者八也一何禮部看詳古者四命以上齋祭異冠齋服降祭服一等諸侯自祭不得伸上服皆用玄冕則其齋亦以玄冠故記曰齋之玄也以隂幽思也以天子之祭為言若羣小祀以玄冕祭則玄冠齋社稷五祀以希冕祭則玄冠齋四望山川以毳冕祭則希冕齋先公以鷩冕祭則毳冕齋先王以衮冕祭則鷩冕齋昊天上帝五帝以裘冕祭則衮冕齋故鄭氏云王齋服服衮冕是衮冕者祀天之齋服也然齋路比之祀路亦降一等玉路以祀金路以齋後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服是又以齋服祭天梁陸瑋深詆其謬以謂祭天猶在掃地之質而服章獨取黼黻為文于義不可謂依古更制大裘以黑繒為之其制式如裘隋以黑皮為裘取同色繒為領袖其裳用纁而無章飾唐則繒表黑羔皮為緣開寶通禮祀圜丘鸞駕出宫皇帝服衮冕入行宫祀日未明一刻皇帝服衮冕至大次質明改服大裘而冕出次至此始復用衮冕為齋服裘冕為祭服兼與張融所引家語云臨燔柴脫衮服大裘象天其義相合所以本局前奏乞依開元禮開寶通禮鸞駕出宫以至大次並服衮冕至圜丘行事則脫衮服裘庶得禮意今與陸學士所見不同謹考據經義在前須至申請看詳周禮曰共齋服則有玄端素端禮記曰玄冕齋戒又曰玄冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也又曰古者冠布齋則緇之大戴禮荀子又皆曰端衣玄裳絻而乘輅者志不在于食葷也據此齋服大則玄冕次則玄冠而已其衣皆玄端也故曰齋玄而養又曰齋之用玄也以隂幽思也今謂祭天用衮冕為齋服裘冕為祭服此乃襲先儒之謬誤不惟不見于經而又與以隂幽思之義相反矣古者狐青裘則豹褎麑裘則青犴褎羔裘則豹飾未聞以同色繒為領褎也欲以黑羔皮為裘取同色繒為領褎無所經據又古者惟衣有裳未聞徒裘而有裳者今欲為大裘之裳纁色而無章飾亦無經據且後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用衮服則漢魏祭天嘗服裘矣雖無大裘未能盡合禮固未嘗有表裘而祭者也且裘內服與袍同又與絺綌同袍褻必有以表之經曰袍必有表不襌是也絺綌褻亦必有以表之傳曰當暑袗絺綌必表而出之是也裘褻亦必有以表之故曰君衣狐白裘錦衣以裼之鄭氏謂必覆之者裘褻故也夫裘褻矣而欲禪以祭天以明示質則是欲衩衣以見上帝祀天雖云尚質何至于是且云尚質則有所尚而已不皆用質也兼裘內服也安得有裳昨禮文局建議皇帝祀天圜丘脫衮被裘服無旒之冕佃以經傳參考謂裘不可徒服當被以衮戴冕璪十有二旒與何檢討所見不同先帝詔從佃議當時詳定衆官亦别無異同竊緣郊丘大事又嘗經先帝聖裁兼親郊已曾服裘被衮難以一人之私疑輒議輕改合依元豐新禮施行候指揮陶山集卷五
