body:
  text: 陶山集卷十三宋陸佃撰啓及第謝啓宗官奏籍遽冠于英遊天子臨軒復躋于異選退循忝冒實有夤緣此蓋伏遇某官器務并容義敦善誘致茲庸瑣獲豫甄升誓殫補報之勤用答題評之厚其于感愧罔罄敷宣及第謝二府啓奏籍省闈偶居于前列試言宸陛復玷于上遊祇荷寵靈切深震栗恭惟得士之實要在取人之難漢魏以還法不如于三代隋唐之際弊尤甚于兩京篆刻相髙風流寖薄維聖王之嗣厯邁治古以搜賢煥乎其有堯文粲然而興周道逮臨軒之覆試改射䇿以甄收于一朝俄忽之間去千載因循之弊宜獲士林之秀庶諧賢路之求茍屬非才曷符羣望如某者稟生椎魯趨世拙疏清白遺孫幸緣于祖慶詩書教子復恃于親嚴道之真治身竊嘗有意古之學為己終冀無慚因迫勢于貧窮遂強顔而干進瓦摳輒巧粳簸忽前猥自下陳擢居異等靜言忝冒實有夤緣此蓋伏遇某官宏業經天精忠許國德功兼茂名爵並尊英雄入于彀中為之進退風采傾乎天下莫不奔趨無遺忘賤士之心有長育賢才之志收之不滿之篋振以有餘之光致此孱庸預兹亨會黃中通理幸仰于嘉猷精白承休誓酬于大造除中書舍人謝丞相荆公啓濡螭頭而記動方愧超踰批鳯尾以代言更驚塵竊受恩彌重圖稱愈難恭以特進相公先生氣大至剛心精惟一降從嵩嶽之峻出應崑河之清遵大道之甚夷障狂瀾于既倒度關而覆雲氣嘗為著書敻夜而省夢魂果諧作弼進已見大儒之效退將為百世之師兩得所圖會歸于極而某學初為己才不逮人偶多在于門牆遂少窺于閫奧雨而無蓋護商也之非風乎舞雩嘉點爾之志具蒙善誘深被樂成是致甄收不遺蕪陋魯雞伏卵知長育之難酬魏鵲繞枝歎依棲之尚逺惟不慚于仕進庶無負于師承除中書舍人謝二府啓濡螭頭而記動方愧超踰批鳯尾以代言更驚塵竊伏念某性惟中下族本單平紫氣東來偶知于問道青氈故在粗識于傳家敢處人先每安分內逡巡仕宦雖異隴西之逰荏苒嵗時頗肖周南之滯長安十載太學三年孤進若迷靜思如夢比從鄉國再望闕廷豈云一對于清光遂爾屢叨于殊奬始求字訓旋預禮文備儒館之校讎陪書筵之勸講更從右史進直西垣雖寵渥之自天實夤緣之有地兹蓋伏遇某官大忠儀世宏業經邦堯西和仲而嘉成舜右臯陶而善治五雲長潤共知巖穴之虛六燕適均咸仰權衡之正遂令蕪陋亦與甄收某敢不正學以言中道而立當有終于志尚庶無負于生成潁州到任謝二府啓叨膺制檢獲領郡章蒙上聖之矜從荷大賢之借助伏念某器能甚陋資望素輕粗識廉隅竊循分域偶遭先帝遂躐稠人屢易嵗華一安時命十年騎馬固慚處士之高風雙日垂簾久綴從官之邇列曾微補報幾致顛躋因剡奏于嚴宸丐分符于便郡尺蠖徐動敢言士路之屈伸隻燕小飛安繫台衡之輕重曲蒙詔可豈曰才堪兹蓋伏遇某官精識際天純忠許國萬靈蒙福庶績咸熙堯作大章蓋得一夔而自足舜不下席實資左禹之相維顧維淺迂最荷憐眷付以近民之任使之報主之知某敢不虔奉教條務強政治當官如水況臨清潁之寒流與物為春願奉洪罏之暖律庶收薄效少答洪私潁州到任謝蔡州王左丞啓叨膺宸渥獲領州符已布寬條方承巨庇伏惟某官大忠許國精識際天抱超卓之竒才丁太平之昌厯有民與社暫騰襦袴之謡維鼎及鼒行正鹽梅之任內顧涼瑣仰鄰治封曾無從政之長乃有依仁之幸趨風尚阻跂德徒深鄧州到任謝二府啓求試潁尾莫窺千里之憂就遷秦頭仍總百城之重載惟忝冒第劇兢榮竊念某拳曲散材汗漫末學猥緣先廕早玷儒科櫪驥低昂空有心于長道蠧魚生死殆未脫于陳編客難東方人愚百里偶遭逢于先帝遂超躐于稠人受恩不資圖報無所髯龍忽逺腸鼠漫存逮日月之兼明戴丘山而加重爰求外補用益中慚惟東潁之近州有西湖之盛槩全家飽足終日端間豈圖隆私更徙巨鎮叨塵踰甚稱效茫然三顧頻煩想見昔賢之際遇百花洲渚適當聖世之隆平顧惟何堪而有斯幸兹蓋伏遇某官公忠亮直博厚高明民繫戚休國隨輕重迪上以先王之典納人于君子之塗遂令虛孱獲與任使願因餘澤促就微勞重念偏親每懷弱弟鄉關頓逺音問難常雖公義之是先亦私恩之寖迫神椎甚鈍肯睎汝鄧之風晝繡可歸尚懷明越之念終干陶冶少副􅒉闈顧賀燕之歸飛更于誰屋庶靈蛇之出報不在他門江寧府到任謝二府啓將母有懷每陳于私懇牧民無狀誠愧于數遷蒙上聖之矜從荷大賢之推指竊念某倭遲薄宦濡泥迂儒初慚洛下之少年仍抱漳濱之多病偶緣僥幸遂歷清華去朝廷固無所思在州郡未有所補忽叨會府復近鄉關維建業之名區據秦淮之勝槩土風甚美公事不繁山護金湯信登臨之可賦潮通臺沼豈寂寞以空回又況嵗時順成民物安樂舊逰庠校雖遼海之已非新過闕庭顧長安之未逺載惟忝冒良有夤緣兹蓋伏遇某官聖世巨人皇家隆棟兼兩宫之厚眷聳四海之具瞻愛惜人材持平國柄致令蕪陋獲被甄收某敢不睎三代之寧侯踵兩京之循吏丹心期于報主白髮出于為民環玉可銜肯效禽魚之細鎁金不躍一歸爐冶之公泰州到任謝宰相啓恭擇日時已臨職事尚叨民社仰繫陶鈞伏念某奮起諸生遭遇先帝擢自庶僚之底使陪法從之中殞首未酬攀髯忽斷況承信史敢徇他人然而智短材疏勢單力弱論涓埃之小補或有可矜責天地之大恩誠云不報向蒙容貸獲免竄投此蓋伏遇某官澤潤生民道佐人主以節義大間扶持巨業以高明碩望經緯萬方斷自聖心蔚為時棟事功式序宇宙蒙休曾何丙魏之足云當與夔龍而並駕某方縻謫籍竊恃閎恩雖坱圠之無私亦生成之有自載惟末路永託洪爐海州到任謝二府啓謫守海陵逮麥禾之再熟恩移朐阜亦飽暖之一麾祗荷陶鎔實深名戴竊念某才能素薄運命多竒偶竊科名誤膺宸眷亟叨塵于法從深辜負于明時果致疾顛尚繄宏庇一違恩館再領州符況東海之煙濤接西溪之風月居民富庶過客稀疏載惟便幸之多盡出生成之賜恭以某官元勳冠古精識際天智無間于幽深仁不遺于微賤搆衆材而成厦與萬物以為春遂令芻微得備器使再念某素蒙奬借最荷矜憐方此向隅或少妨于衆樂茍焉得斧當盡釋于羣疑矧有高明務昭忠善幸賜洗金之惠敢忘銜玉之恩弱羽雖傷願集權衡之上孤根可託請居桃李之間復集賢殿修撰謝二府啓節藩重寄祕殿華資祗荷鈞陶實深愧栗竊念某生為書蠧分是醯雞偶逰夫子之門牆曾侍先皇之軒幄恩私莫報罪戾滋多戚本自貽敢嘆周南之滯老將誰顧分甘冀北之羣豈圖孤生忽辱再造此蓋伏遇某官仙姿異稟台極元勳博厚高明公忠亮直堯得一夔而自足舜惟左禹之相知坐判忠邪旁求俊乂遂致羈窮之迹得逃黨附之餘桃曰膽之已深憑于澡雪蓷其乾矣更曲荷于生成某敢不吹虀懲前書馬慎後誓有收于末路庶無負于初心勉著微勞用酬盛德蔡州到任謝兩府啓情雖易辭過實難屢悉從湔濯仰荷陶鎔竊念某漦盝窮鱗泥塗病翼命維繫于斗水心久成于寸灰一去國門十更年籥省中啼鳥分掃迹于冰廳海上狎鷗故馳神于魏闕敢圖台眷特賜甄收既逃餘黨之間仍襲舊人之後棆無疵病雖云覆育之自天玉有精神實以含藏之為地眷惟上蔡特近中州介于淮滸之西越在汝墳之北土風甚美産神物之蓍龜公事不繁帶仙壺之日月靜言昧冒深切兢慚此蓋伏遇某官邦家光輝社稷勳德日開國境時信天工尹居伊陟之前公在成王之左金丹九轉自收起死之勞蛇珠千枚未盡謝生之意回蔡州交代李閌郎中啓叨塵書殿假借節藩久無披霧之由忽有及瓜之代併為厚幸良劇歡悰恭以某官問學該通襟靈夷曠早奉使華之重益增朝望之隆暫寄藩宣佇歸省闥重規復矩敢忘踐墨之思綿力弱才空抱續貂之愧炎蒸在候承際匪遙更宜保綏用符傾頌除右丞回諸路監司啓誤被宸恩進司省轄曾牢辭之莫遂知叨據之難勝敢意撝謙曲垂緘問除左丞上親王免啓恭惟某官間平賢王魯衛大國能密移于造化或隂借以齒牙敢丐敷陳庶諧矜允除右丞上二府免啓誤被非常真知不稱自初聞命非偽為辭矧素昧于經綸敢遽參于步武恭惟某官明堂隆棟太社元龜能回天心善救人物願因進對曲為敷陳儻上聖之矜從乃大賢之贊助永懷厚德實倍常情除左丞上二府免啓寶章批付實為非常瑣闥塗歸已云不及仕進迅速君恩頻煩匪畏臚言仍虞鬼闞願假黃金之諾請辭碧落之除俯燭微誠仰繄盛德恭惟某官建時皇極保國太和股肱漢之蕭曹筋力堯之稷契能密移于造化矧嘗借以齒牙敢丐敷陳庶諧矜允賀刑部徐侍郎啓伏審寵膺中渥榮陟近班副九重欽恤之懷協四逺僉諧之論伏惟慶慰恭以某官英躔間氣策府瓌才雖陪貴士之逰猶秉寒儒之操果從三館爰列二卿銜錦而歸嘗覩昔年之龍化摶風而上更聞今日之鵬飛教由是孚刑以之措雖所願學孔子乃儒者之素心然淑問如臯陶亦古人之能事佇迎殊用益峻羣瞻具為欣愈實倍倫等回發運孫龍圖啓伏審光膺宸檢榮總漕權分九重宵旰之憂副一道吏民之望伏惟慶慰伏惟某官踐揚甚久名譽素高負超卓之竒才丁太平之昌運紅牙運算暫繄強富之籌緑底頒書即迓褒升之命方修慶牘首辱珍函既深慚佩之懷更厚綏將之望回黃裳狀元以下新進士啓伏審祗膺睿澤榮擢殊科伏惟慶慰某官先輩涉道宏深受材廣博學該摻桂思敏然萁拳拳有愛君之心亹亹明當世之務果承清問遂占上逰騰一代之風聲聳四方之觀聽共期逺業即奮亨途慶牘未遑華緘首及其為感佩罔既敷陳回陳軒學士啓伏審某官被寵楓宸刊文藝閣伏惟慶抃竊以儒館校讎之職實惟人材養育之塗泛河漢之通津集蓬瀛之仙室將資潤色首預討論抱槧磨鉛迭處羣英之列拖金曳組即陪諸老之逰厥惟閎才乃副妙選恭以翊善學士行隆賢業學造聖真作客賢王日奉詩書之樂為郎省户時推論議之明果膺殊恩薦升華貫未遑慶禮首辱長箋銘篆之深敷敘奚盡回人謝館職啓楓宸布寵藝閣升華伏惟慶抃恭以某官思敏然萁學該摻桂早遘光華之運久登髙妙之科果沐茂恩允符公議宣室夜對行膚顧問之嚴蓬萊日長坐覺校讎之暇欣陪俊軌叨示珍題欽佩至深敷宣罔既回文及甫謝館職啓伏審光奉制恩允升仙館恭以某官學探聖域慶襲相門虎豹之駒華文實異龍蛇之蟄亨奮可期果被寵光式居華貫望蓬萊之宫闕觀河洛之圖書吉有舊勳久歷三公之任誼方年少更陪諸老之逰某初愧續貂忽諧附驥重迂髙駕猥辱珍函黃金投蛙雖費珍之已重縵帛復錦顧為好之更輕徒荷謙勤深增悚佩回安定郡王啓伏審顯膺帝制進受王封成命既宣羣心胥慶恭惟某官才宏器偉位重德隆與混沌畫眉惡髙名之出衆為穆生設醴知雅尚之尊賢又況屬籍承藝祖之華詔書存神考之意果膺宸綍兼擁將麾宗子維城信王基之有賴泰山為礪與國夀以無窮顧慶幅之未遑辱珍題之先及其為感愧罔既陳敷回刑部劉侍郎啓伏審寵膺宸檢進二邦刑履朝宷之亨衢協仕途之盛選伏惟某官踐修克敏論議持平自結冕旒之知久陪卿寺之列金科玉律素號該明苔獄草扉更資平恕果躋華近式副僉諧未遑慶牘之修首沐柔緘之及其為感慰罔既敷陳館伴高麗使啓狀叨奉睿慈獲伸良覿踐籩斯設初瞻拜貺之恭承篚是將遽沐貽箋之厚載言惠好徒用感慚祗奉宸恩欣陪宴惠猥以珍函之及副之懿篚之陳良紉謙勤實增愧荷特沐好音過形厚意姑致羞蘋之義庶伸報李之仁有少菲儀具如别幅叨會使華猥霑土實髙言何綺荷箋諭之未忘厚報匪瑶愧幣將之不腆載惟塵凂尚冀檢留祝文祭酺神祝文吏政不修蟲蝝為害翦除雖力民亦告勞殆不可以人力勝也謹率寮屬用款于神詩不云乎秉畀炎火無害我田稚惟神降康日靜原野俾兹民吏欣賴自然之功則有成報潁州祈晴祝文昔自康年風雨惟敘蟲螟不作物用嘉成今蝝生雖息而秋霖是病居者憂壓田者愁潦推原厥自吏職不虔嗷嗷下民其實怨咨惟神廟食兹土靈享具昭還賜時暘副我誠禱阜成嵗事迄用有秋又秋雨復作亦既成霖稻阻刈收麥妨敷播市鬨不集道途益艱惟神明靈願終隂祐使陽光布照隂慝潛伏以成甫田農夫之慶大田寡婦之利則惟洪私敢怠成報潁州謝晴祝文比以淫雨將害秋稼麥種失時民不遑安用控于神賜之景答屯雲解駮水潦訖收農事有濟神庇斯民其德厚矣敢忘馨香祗謝成貺又雨慣無節民用怨咨再禱而晴實惟神惠牲肥酒洌亦云不腆惟神卒功使成美嵗則民敬事永有靈饗之威鄧州祈雨祝文冬有積雪春有小雨此年之所以豐也今冬得雪既薄尚賴春雨以相農事惟神聰明廟食此土願施膏澤以慰民望鄧州祈雪祝文自昔康年繫時佳澤比緣修暵遍走羣祠雨雖獲而尚艱雪垂成而未下再傾誠懇一叩靈明滌盡春瘟阜成嵗事果終神惠實慰民心江寧府祭蔣山神祝文某在元豐之初以光祿寺丞資善堂修定説文赴闕欲自京口輕騎省王丞相于金陵是時汴流日淺議舍所乘舟自先濟江念未有長子姪可委夜忽夢神人金甲仗鉞自稱蔣山神迎候渡江無慮某初不知鍾山有帝之祠也既至金陵問知有帝拜伏祠下像如夢中惟冕服異耳其渡江日獨得順風二舟既涉風色斗轉他船皆不果濟竊嘗以謂異時或守金陵逮今十五年受命來守是邦敢忘帝之靈祐舊例視事越三日遍謁羣祠而帝廟以逺守臣未嘗躬詣某雖已用故常遣使告至今復祗見于祠下泰州感應觀音殿祈雨祝文涉冬閔雨宿麥不滋並走羣祠未獲嘉應恭聞寶陀妙力具大慈悲善應諸方無逺弗屆輒同官屬祗請紺容就宣詔亭普伸瞻奉冀敷膏澤以兆豐年永彰感應之名重揭望霖之號蔡州祈雨祝文自夏涉秋稍愆時雨雖勤浸灌功利實鮮是用奔走有祈于神願降霈澤興我嘉榖是神能福斯民而吏亦仰有依賴蔡州謝雨祝文比緣旱乾並走羣祀曾不崇朝膏澤云足未種者耕己植者茂年榖屢豐實神之造敢忘吉蠲以答靈貺祭文祭丞相荆公文維元祐元年嵗次丙寅四月某朔某日某甲子門生朝奉郎試尚書吏部侍郎充實録修撰陸某謹以清酌庶羞致祭于故司空觀文殿大學士贈太傅荆國王公先生之靈維公之道形在言行言為詩書行則孔孟孰挽而生孰推以死天乎人乎抑莫之使於皇神宗更張治具夔一而足二則仲父逮龍之升奄忽換世公則從邁天不憗遺嗚呼哀哉德喪元老道亡真儒疇江漢以濯之而泰山其頽乎承學諸生無問識否齋戒是修矧從公久祝之使肖成就長養聞訃失聲形留神往回也昔何敢死賜也今將安仰慟貌象之誰如恍音塵之可想嗚呼已矣病不請禱葬不反築寄哀一觴百身何贖尚饗江寧府到任祭丞相荆公墓文維元祐七年嵗次壬申某月朔某日某甲子門生朝奉大夫充龍圖閣待制知江寧軍府事充江南東路兵馬鈐轄陸某謹致祭于故司空觀文殿大學士贈太傅荆國王公先生之墓嗚呼法始乎羲朴散而器列靈嗣興文始具備祖述憲章約成六藝大明西沒羣星爭麗派别支分散作百氏歷漢更唐衆説蜂起天錫我公放黜淫詖發揮微言貽訓萬祀卒相裕陵真真偽偽義兼師友進退鮮儷荆山鼎成龍去不回公從而上梁壞山頽某始以諸生得依門牆一見如素許以升堂春風濯我暴之秋陽今也受命來守是邦公之所憩蔽芾甘棠蕙帳一空墓柏已行俯仰陳迹失涕沾裳論德敘情以侑一觴尚饗祭丞相蘇子容文維建中靖國元年嵗次辛巳七月某朔二十七日某甲子門生中大夫守尚書右丞上柱國陸某謹致祭于故座主觀文殿大學士太子太保致仕贈司空蘇公之靈巖夢曈曨嶽祇嶪岌我公膺之瓌珽是襲厚德醇行玄登之湇羮問手爛唾從面濕讀書萬卷青紫如拾作為辭章珠璣綴緝山巖備收臺閣兼習薄飯不羮館職供給蠧簡藝香螭坳墨汁草石圖經博極郡邑混儀漏成玉利銅澀鼇禁晦登鳯池早集典選材征尹京姦戢陽開隂閉一張一翕甘棠蔽芾行露厭浥兄弟相依鶺鴒原隰子孫頭角犀兕濈濈官至宰相夀踰八十元祐紛更閙藍不入紹聖歸休退勇流急風清月明漁蓑釣笠春扈推移秋螢耀熠間居日長其誰公及憶昔熙寧擔簦負笈借公風雷魚龍起蟄仙梯千層龍門三級換我凡骸神丹一粒鳴鶴與縻白駒維縶元豐中間官制初葺禁塗相追閣門贊揖飽聞典故因賡詩什洪範言箕中庸語伋人之生世瞬息呼吸東賓西飢羲娥汲汲不見幾時墓碑遽立壯夫感決兒女嗚咽銜環未報綍不及執一訣終天雪涕雨泣尚饗祭邵興宗資政文嗚呼公乎令德樂愷重厚如山閎深如海公之學問大白受采風落翰墨珠生謦咳公之政事吏憚民愛入典樞要出藩甸采謂宜夀考歸就衡宰孰云不常末路是改斾未及還棺已云蓋念惟陋庸早辱眄睞不見未幾話言如在遽聞公喪涕泣汗駭馳哀一觴永訣千載尚饗祭壻李知剛文嗚呼作乂自古有死其誰能免夀夭相懸雖若彭殤終于共盡蓋生之有死猶客須歸作者之必息也此理豫講之熟矣今于作乂不能以理自勝每一念至幾于忘生何也豈非作乂有竒才異能使豫有不能忘者嗚呼作乂器識高妙操行粹良德可以臻極而未充學可以造微而未盡使充且盡雖為名世可也非特李氏門户倚焉而吾家亦將有賴孰謂年不滿三十位不過掾屬而今死矣豫自聞訃逮今念子若迷若失亦如醉人萬象成非觸緒悲感覽子平生所為文字閲昔共讀經史展昔共玩書畫過所嘗逰覽臺觀遇所嘗會合親朋雖欲忍淚忽焉不知涕之流落也嗚呼作乂而至斯耶妻少女幼未有嗣息斯人也而至于斯極也父耶母耶天乎人乎浩劫易盡此恨無窮是誠難忘者也雖然尚有一事若可以自廣者聞訃之夕夢神告豫李掾今在好處毋甚悼後聞其死不愧通人達士疾革召其僚吳君願以後事付之願退于是盥手靧面正西向坐且曰我亦詣一好處揖吾女令勿悲惱善自愛語訖遂長往與前夢正協嗚呼子真能自達耶今真生好處耶子之諸父昆弟妻女與豫于此皆若可以無憾也嗚呼作乂我今知之理有固然物忌甚美事惡太全惟吾作乂成就似早行太老成經甚明了老尚難兼而況年少譬如草木之英雖竒不實雲霞之異雖竒易失嗚呼作乂今也云亡如夢一覺誰短誰長尚兹二女與母相將日就長養坐膝扶牀異時傳業尚繼中郎光靈弗昧來舉豫觴尚饗祭王元澤待制墓文維年月日具位陸某謹致祭于亡友天章閣待制贈諫議大夫臨川王公元澤之墓惟公才豪氣傑超羣絶類據依六經馳騁百氏金版六韜堅白同異老聃瞿曇外域所記并包渟蓄迥無涯涘形于談辨雄健俊偉每令作人伏首抑氣譬彼滄溟萬川俱至驚瀾怒濤駕天卷地又如白日雲霧斗起風裂雨驟雷震霆厲倏忽斂氛澄霽嫵媚異態殊狀率有義味自云功名可以力致何作弗成何立弗遂熙寧逢辰既昌且熾立談遇主騰上甚鋭公亦慨然任天下事命也奈何半途而稅孰夭孰夀孰興孰廢自古皆然竟亦何為念昔此邦初與公值曷敢定交公我所畏傾蓋相從期以百嵗今我來思如復更世豈無友人先我而逝懷舊感今擲筆掩袂猶想當年拍手論議白下長干倒屣曳履遺舟夜壑求馬唐肆顧瞻空山潸焉出涕尚饗陶山集卷十三
