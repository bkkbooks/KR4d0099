body:
  text: 陶山集巻十二宋陸佃撰書答陳民先都曹書辱書問以所疑某亦疑者嘗試言之足下其擇焉蓋召公有詩周公無之者公聖人也聖人無名故周南之詩美不于文王于其后妃而已譬如傳神畫眼眼似而神從之也小星衆無名星也以況賤妾則三五在東維參與昴固夫人也于陽星言其數數陽也于隂星言其名名隂也數對象則為隂對名則為陽譬如編氓甲在其東則乙西鄰也若丙又在其西則昔之西者今東矣蓋先王取義隨物轉徙非一端而已至于柏舟不言父者女比于母者也堯典四星獨于南方言火言火于南方為宜故也秋言毛毨冬言氄毛者孔安國謂毨理也蓋秋鳥獸之毛尚淺毨不勝毛故視之則毛徐而察之則毨也至冬而盛毛不勝氄視之則氄察之則毛也此與春秋六鷁五石之辭略相類先王之法言多如此故曰五石六鷁之辭不設則王道不亢矣舜典言嶽獨東言岱言巡守獨北言朔朔言終則有始也岱言代則有謝也于時之始言代則有謝于方言終則有始亦言之法也如初以著四時之同是以不言南也且北方隂陽具故北一名朔朔陽也北隂也豈特此也哉物有𤣥龜纁蛇藏有左腎右命至于卦又謂之習坎習重也是以天子之立也左聖鄉仁右義偝藏蓋藏𤣥之所在也至無而供其求時騁而要其宿實在于此故文兩人相背為北象兩己相背為黻古之人胥訓誥不必親相與言也以文與象示之而已噫言道而至于此亦不可以容聲矣若夫寅賓寅餞足下所謂先王運精神動心術以道格之是也夫運精神動心術以道格之雖尸居衽席之上可以騎日月也況賓而餞之乎以此讀書蓋有大者焉非徒析毫解縷而已方今學者之病正在此殆所謂繩上生蛇者也足下有美才善質誠能運精神動心術求其大者豈逺乎哉嘗聞九方臯之相馬曰牝而黄馬至乃牡而驪伯樂喟然太息曰是其所以千萬臣而無數者也蓋神之所㑹得其精微而遺其麤麤學乎學誠如臯之所觀雖以成變化可也故曰千轉萬變而不窮魯國儒者一人而已某迷謬日久所論尚不中願更疏示答周之才書某頓首近辱手筆問我以疑區區多故不即為報實用愧惕蓋天子之巡守大禮也故凡大山川于其所過則祀之于是時則歌般之頌以祭焉故其序曰巡守而祀四嶽河海也于其所至則望之于是時則歌時邁之頌以祭焉故其序曰巡守告祭柴望也蓋過而祭之則非至也臨而祭之則非望也故般之序言祀四嶽河海而已不言告至又不言望與時邁之詩異焉非柴止于一詩而望有二詩也若夫柏舟曰言仁而不遇獨稱言者疑若有意樛木之序曰言能逮下酌之序曰言能酌先祖之道而北門又曰言衛之忠臣不得其志爾如此者衆矣不皆有意似無説也古之言九州禹貢始于冀終于雍者此禹之治洚水先後之序也周官始于揚終于并者此周之列率土大小之序也蓋以古攷之言海岱及淮惟徐州而後言淮海惟揚州言荆及衡陽惟荆州而後言荆河惟豫州則所謂始于冀終于雍者禹之治洚水先後之序決矣以今推之揚之地在青之下徐之地在并之下則所謂始于揚終于并者周之列率土大小之序似矣爾雅九州之序則以夏周攷之皆不合郭璞以為蓋殷制也言蓋者璞亦疑之則其真不可得而攷矣闕之可也蓋君子于其所不知雖不敢忘闕亦不可强通也書曰佑賢輔徳孟子曰天下有道小徳役大徳小賢役大賢賢徳孰為而分者蓋徳者徳而已矣賢則又兼其行也記曰君子恥有其徳而無其行蓋有徳而無其行者有矣未有有行而無其徳者也詩曰肅肅罝椓之丁丁而序詩者以為莫不好徳赳赳武夫公侯干城而序詩者以為賢人衆多此一證也又書曰佑賢輔徳顯忠遂良遂不如顯之重而言忠在良之上輔不如佑之重而言賢在徳之上此又一證也賢徳之所以有辨者如此也易曰正言斷辭又曰其辭文其言曲而中言辭孰為而辨者蓋成句謂之言成章謂之辭子曰詩三百一言以蔽之曰思無邪則成句謂之言明矣乾之彖曰大哉乾元云云坤之彖曰至哉坤元云云而孔子謂之彖辭屯之六二曰屯如邅如云云晉之初六曰晉如摧如云云而孔子謂之繋辭則成章謂之辭又明矣言辭之所以有辨者如此也孔子之論顔子曰其殆庶幾乎者此如先生之誌深甫曰其于為雄幾可以無悔也言殆而又言庶幾則顔子之于庶幾纔近也言幾而又言可以則深甫之于可以纔近也君子之所以品藻無者不敢誣有者不敢略蓋如此夏官之職方言貢而無逺近之限者此先王之為政因賦而貢者也故以法取之不責于所無不恕于所有所謂制其貢各以其所有者是也秋官之大行人言貢而有逺近之限者此先王之為教因朝而貢者也故以教取之而使近者貢以尊逺者貢以卑所謂侯服貢祀物要服貢貨物者是也荘子曰徳兼于道即老子所謂天法道也荘子曰道兼于天即老子所謂道法自然也蓋自然者天中之天也郭象曰天者自然之謂而河上公曰天中復有天某取之希聖以為耼周之此言宜若不同乃如某所學則惟耼周之此言宜若不異也又䝉謂某在越為學者説詩而以不及聴見慕此似希聖惑于妄者之傳而殆非相悉之辭也孔子曰不憤不啓不悱不發古之教者如此孔子之弟子又記子路未之能行不欲有聞漆雕開未之能信不願有仕古之學者如此而今之不善教學者多反此好名者以説書為徳好利者以説書為功而隨之學者聞之于不問聴之于不思適如風之過耳常自皮外而去豈足以美七尺之軀哉此正荀子所謂口耳之學者也教者道之所以不尊學者功之所以不倍由此之故耳故某在此未嘗為人説書而亦欲希聖慎之也然不與希聖相見既久矣恐所論尚不中有所見焉幸教我䝉許見臨願如前約予日望之也未間保重答李賁書某頓首李君足下前辱臨訪以書為賜其言及于微妙之學而乃許不肖謂能知之且将就學以取正焉此有道者之所畏而非足下之所以望某也適居鄙疾不獲面造慚惕慚惕雖然足下之意勤矣某雖不敏而幸亦槩乎有聞聊相為言之不敢默默而已也蓋君子之學有體有用體不欲迷一方用不欲滯一體而古之聖人本數末度足以周上下圓神方智足以盡往來而蹈常適變莫逆于性命之理者如此而已矣故二帝三代之士有得于聖人之道而仁足以教者必告之以此有求于聖人之道而智足以學者亦必問之以此自王者之迹熄而詩亡夫子沒而大義乖道徳之體分裂而天下多得一體諸子雜家各自為書而聖人之大體始亂矣故言體者迷于一方言用者滯于一體其為志雖篤其為力雖勤而不幸不見古人之大體長見笑于大方之家者由此也嗟乎道之不一久矣而臨川先生起于弊學之後不向于末偽不背于本真度之以道揆持之以徳操而天下莫能罔莫能移案莫能移上文原闕二字故竒言異行無所遁逃而聖人之道復明于世某亦幸當此㑹而偶獲承教于先生之門其所謂君子之道體不欲迷一方用不欲滯一體嘗聞其一二矣故四方之士有意于某而以此問者未嘗不以此吿也況足下之質有可以受于道者又挾鄉里之契而其意且至焉則某之所有自非所無者安敢有惜于左右哉蓋孔子去魯事與齊不同君子之道所以待父母國者與他國實異也鄙疾方愈未可以出風尚阻造謁姑道此以為謝足下諒之而已答史仲至書某啓為别久矣引企友益無須臾之頃不在此辱承手筆因小官役役多事益以無聊此涉人間世者之所常然而勢有不可如何者也蓋古人所謂開口而笑一月之中不過四五而不如意十常八九者正類此爾惟君子達于性命之際故分内之常可以義處而意外之變可以理遣也如吾仲至有受道之質而言足以守中行可以鞭後使少加意焉則養之于四十可以不惑縱之于七十可以不踰而所謂下學而上達于性命之際者是不難也何至乎三十而無立五十而無聞乎卑辭之及此亦已太巽矣某承乏于此行将成攷四方之士問足以起予辯足以助我者日益以至蓋後生真有可畏者非特可愛而已迺如所謂使追之者躍如視之者瞠若則予豈敢此朋友借譽之過耳雖然某也從事于斯不為不久矣課老易之無而責有温詩書之故而知新所謂性命之天理道徳之仁義雖不盡曉然不可不謂槩乎其嘗有聞者也顧未知何時復獲瞻際坐吾仲至以發予之狂言庶幾如不動之質而以妙斵施之霑之者蠅若運之者風如也未間千萬以道自愛答宏姪書所問禘祫猶當如前説但用致夫人前説恐誤夫人左氏所謂哀姜是也吾姪疑詩亦右文母恐于禘而祭天為礙蓋詩言後世推先王所以右考妣之心于是乎有禘耳于禘而祭天奚礙吾姪又疑禮喪三年不祭惟祭天地社稷為越紼而行事恐于既練而後祫為礙蓋喪三年不祭謂外事不祭耳于練而後祫奚礙且新主即廟與其祖妣合食固禮之情也仁之實親親是也義之實尊尊是也禮之實節文斯二者是也故曰期而祭禮也期而除喪道也道進于禮矣夫事師者不疑而悦回也是也疑而不悦由也是也回也不疑殆不若由也之疑而不悦有以觸師使言也吾姪勉之而已答崔子方秀才書案子方涪陵人流寓淮南時尚新學子方三上書請復春秋不報遂不應舉所著有春秋經解本例例要三書見陳振孫書録解題崔君足下僕與君一在揚州之南一在其北惟是雞犬不相聞也又平時未嘗有交臂之新半面之舊惠然貽書問我以春秋何耶豈非足下與僕氣同聲比不待相見而相知也春秋孔子自為之書也辭雖數萬其指數千襃貶繫片言隻字而萬物之聚散皆在焉雖㳺夏不能賛一辭于其間逮今千有餘嵗未有能精之者也若陸淳纂例近時孫復發微學者頗宗焉淳于經固疎而復為疎尤甚昔常秩謂發微動輒有罪商君之法耳非聖人忠恕之道王回以秩為知言孟子曰春秋無義戰彼善于此則有之又曰五霸三王之罪人也今之諸侯五霸之罪人也知此則知春秋矣蓋春秋撥亂以今責今彼善于此則可知矣而發微以王責霸是不知論其世之蔽也故余每患學者宗復無所折衷竊嘗盡心焉頗見聖人之㫖一二惜夫荆公殁矣不得而證也今足下好學善問有意于我聊相為言之夫經一而足春秋之傳不係舊史存否可知若聖人作經又待魯史而後傳是二而足也故曰春秋甚幽而明無傳而著其設方立例不可以一方求亦不可以多方得譬如天文森布一衡一縮各有條理久視而益明易曰化而裁之存乎變推而行之存乎通神而明之存乎其人豈獨易也哉故曰詩無達詁易無達吉春秋無達例要在變而通之焉耳然則説者曰春秋無例誰歟春秋無襃誰歟春秋不過數十事又誰歟若夫荆公不為春秋蓋嘗聞之矣公曰三經所以造士春秋非造士之書也學者求經當自近者始學得詩然後學書學得書然後學禮三者備春秋其通矣故詩書執禮子所雅言春秋罕言以此案安石不以春秋取士至謂為破爛朝報獨此論甚正疑未必出自安石或佃欲為師迴䕶其短耳由是觀之承學之士驟而語禮不知其本也驟而語春秋不知其始也倒經而言逆而説者人之所教也安能教人至于三傳得失公羊于經為精榖梁次之昔仲舒學公羊者也公羊能使仲舒三年不窺園乘馬出入不知牝牡則其所得殆非十之二三也足下更博攷而深求之譬如食稔其味在後嗟乎百年人之大期也至者萬無一二中分百年余已半聰明非復前時也惓惓之意不敢以虚辱恐所論尚不中足下擇焉可也餘非面論不能悉陶山集巻十二
