body:
  text: 陶山集卷四宋陸佃撰劄子乞添川浙福建江南等路進士解名劄子原注元豐八年臣伏見諸路州軍解額多寡極有不均如京東西陜西河東河北五路多是五六人輒取一人而川浙福建江南往往至五六十人取一人竊緣士人之盛無如川浙福建江南今解名極少不無遺才其京東等路薦送之數太寬濫得者衆臣備員同知貢舉具見諸路舉人程文若五路試卷取至中等僅能滿數餘路雖中等以上取或不及契勘熙寧中更選舉制自五年以後諸科不許新人投下文字卻以諸科解名添充進士解額今開封府諸科消減殆盡見已有解額二百四十人內除五十人近准朝㫖添撥解發本府進士外尚餘諸科解額百九十人及諸路逐次科場諸科漸少並已增解進士緣五路進士見今解名極寬欲乞特詔有司許將開封諸科所消解額百九十人并自今諸路消到諸科合增解進士名額並于川浙福建江南等路舉人至多解名極少州軍量行均撥所貴五路州軍不至濫取餘路解名窄狹去處得以兼取取進止乞立武舉解額劄子臣伏覩朝廷選舉之制雖備而諸路武舉未有解額遇有科場止是兵部牒官文臣自提㸃刑獄武臣自路分都監以上各保舉一名于兵部類試其間寒素之士或難得知舊論薦往往有妨應舉欲乞令有司立法每遇科場許于逐路轉運司類試量行解發兵部更不牒舉所貴寒素之士得由藝業以公自進取進止乞潁州第一劄子臣昨自官制肇新叨塵侍從逮今首尾已及九年未嘗更歷外任重念臣仕進甚寒羇危少與䝉先皇之識拔荷二聖之保全仰辜休明無所補報矧煩言之可畏亦孤植之易搖願假一麾少圖寸效欲乞除臣知潁州一次伏望聖慈特賜矜允第二劄子今月二十四日伏奉聖詔以臣乞知潁州未賜俞允訓辭深厚非臣所能副稱而區區所懷義不敢止者誠以臣更練尚疏踐修未至久編巨典嘗講多儀猥次成周之天地官實慚太史之牛馬走坐貪榮寵彌歷嵗時已負難酬之恩尚睎易退之節敢再干于宸陛願一試于藩維庶宣教條少贖尸素第三劄子今月二十七日準尚書省劄子以臣乞知潁州伏奉聖㫖依前降詔書不允聖恩深厚未賜矜從而下愚難移輒復有請者實以臣子許國命雖甚輕士人潔身義亦自重矧惟孤進曾乏兼長偶緣遭逢猥致超越久叨塵于法從深辜負于明時雖荷并容未加捐棄粗識盈虛之常數庶全去就之大方況復鳧鴈集不為之寡多燕雀飛無繫于輕重更叨紫微之邃願成清潁之行惟仗忠誠冀回聰聽乞明州劄子臣輒瀝懇誠上干天聽臣昨知潁州伏䝉聖恩就移今任寄委增重寵榮至深非臣所能副稱重念臣生于東南寒鄉偏親懷歸惓惓在念臣初不敢遽有所陳黽勉從事逮今已踰半年稽之昔日國爾忘家雖曰公義而將母來諗亦容及于私恩方當二聖臨御純體仁孝徇萬物之至情各獲分願是臣得以私恩控訴之時伏望聖慈特許差臣知明州一次異日如䝉朝廷别有繫使自當糜捐仰圖報效臣無任辭免吏部侍郎劄子原注元符三年二月臣昨在任准正月二十九日尚書省劄子已降告命授臣試尚書吏部侍郎今依條交割職分公事訖乘遞馬發來赴闕臣今已至祗候朝見聖恩深厚非臣糜捐所能報稱竊緣天官之二所繫非輕宜得實才以副任使如臣虛孱已試不效茍貪榮寵昧冒而居恐纍聖神知人之明所有告命未敢祗受蔡州召還上殿劄子二首原注元符三年二月臣竊惟聖君踐阼要在正始正始之道當自朝廷朝廷一正四方逺近莫敢不一于正記曰朝廷曰退燕逰曰歸師役曰罷蓋用師役未有不罷者也燕逰有出而無歸則縱朝廷有進而無退則爭又曰朝廷之美濟濟翔翔所謂濟濟舜命九官是也所謂翔翔翔而後集是也朝廷之上公卿大夫如此可謂美矣竊見近時學士大夫往往競進務相傾奪以善求事為精神以能許人為風采以忠厚為重遲以靜退為卑弱相師成風莫之能止正而救之實在今日恭惟陛下憲天聰明深燭民隱修明百度首以人材為急而臣逮事神考元祐補外逮今一紀陛下即政之初首加識拔此臣夙夜未知所以論報之方區區愚忠不能自已伏望陛下慎初謹始正自朝廷眷忠厚之臣擢靜退之士使躁輕者革心浮薄者易慮建用皇極布宣中和以熙百志以凝庶績以追唐虞三代之治臣愚不勝願幸取進止臣伏覩陛下即政之初乾清坤夷玉燭明潤臣民欣戴無有逺邇惟知鼓舞歡呼恭惟陛下仁孝恭儉粹然天成聖神之姿人久屬望加以溫恭好問學有光明方將紹承謨烈以登太平如臣凡陋首與收召臣誠不自揆願效涓塵之微竊見神宗皇帝聰明文思延登真儒建立法度布在四方以幸天下後世而元祐之際輒見詆譏紹聖以來又皆稱頌夫事無當否一切紛更國有常刑固在不赦然理有損益不無賡續惟務稱揚亦已過矣爾雅曰賡揚續也夫續前人不必因前所為利則賡之善者揚焉是為善續詩書所稱後世詠歎不息是也若元祐紛更是知賡之而已不知揚之之罪也紹聖以來率皆稱美是知揚之而已不知賡之之過也伏願陛下咨謀人賢詢考政事有賡有揚以續大前人之光惟其時物與其當之為貴大中之期實在今日伏惟聖神采擇取進止舉臺諫官劄子原注元符三年三月二十五日上二十八日諤以右司諌召准元符三年三月初五日尚書省劄子奉聖㫖臺諫官員闕甚多內外兩制以上可各選舉合入通判以上資序朝官須學問該博操履端方德義著聞明于治體可任言責三人密具姓名聞奏右臣伏覩承議郎樞密院編修文字王渙之承議郎孫諤奉議郎前太學博士吕益柔問學該通行義修飭兼明治體守正不回可任言責謹録奏聞謹奏辭免修哲宗皇帝實録劄子建中靖國元年六月准閣門告報伏䝉聖恩授臣哲宗皇帝實録修撰者聖知益厚非臣九殞所能報稱竊念臣昨嘗預修神宗皇帝實録以不稱職擯斥纍年辜負裕陵識擢之恩已試不效循愆省謬慚悔迄今傷禽驚弦痛定猶怯戰蟻奔北語勇甚慚私義未安禮當披訴伏望天地之造父母至恩憐其誠心非為僞飾改求俊乂免誤使令所有敕命不敢祗受又尋准尚書省劄子原注奉聖㫖修史事先朝已自辨明更不許辭免翼日兼修神宗皇帝寶訓臣伏奉聖詔以臣辭免哲宗皇帝實録修撰不允者天光照融下監幽隱蚍蜉有藴雖小得伸竊以泰陵之書將示無極摹寫治象精神為難如臣荒蕪久廢筆硯文從字順與年俱衰揆稱度宜實不堪可重念臣頃在紹聖纇雖播遷中靡他腸敢懷纖芥尚懼愆尤未蓋志行未孚僉言未諧案此下當有脫文今無從校補辭免奉使大遼劄子竊念臣犬馬之齡行將六十艱難末路血氣日衰外雖虛憍中實疲瘁兼以生長吳越但諳炎蒸既未嘗冒大寒又不任久乘馬雖欲黽勉有所不能川途阻修必致疾病一誤國事罪悔難逃伏望恩慈特賜矜免狀辭免資善堂修定說文成書賜銀絹狀今月一日准學士院送到詔書伏䝉聖恩以臣修定說文書成特降奬諭賜銀絹五十匹兩者義有未安雖榮而愧竊念臣預修字訓初誤選掄問學淺微良淹嵗月偶天與幸遭值獨深編摩甫終已陟嚴近雖使古之真賢克生聖世因時際遇善建勳庸受恩若此未易云報況如臣愚才劣于志雖誓報稱不知所為區區一書何足言者敢圖聖慈復有褒賚仰承明詔光賁大矣藏示子孫永以為寶所有銀絹不敢祗受辭免集賢校理狀原注元豐二年初有御批付中書陸佃資性明敏學術贍博可除集賢校理竊念臣賦材昧陋涉道淺迂比䝉聖知拔自孤逺講求字訓參議禮文嵗月既多無所補報校讎之職以待俊良顧臣無堪何足以當陛下奬擢之意所有敕命不敢祗受元豐轉對狀臣伏覩朝廷所修敕令實一代之典必令文簡而該貫之事備乃可成書以參先王垂法後世惟該貫之事備而文簡則其因革增損離合與其所以去取之意别載看詳雖可考知緣頒行之際止是淨條而看詳之文不出自非有司曉習法令以其文簡不無疑者旋稟朝廷即成迂滯若便以意推行又或不皆當法欲乞候今編敕書成布之州郡并以看詳之文與之庶幾官吏得知因革增損離合與其所以去取之由推行無惑不至違誤謹録奏聞伏候敕㫖乞宣仁聖烈皇后改御崇政殿受冊狀原注內批并詔附元祐二年二月寒食假中佃入此奏假開即聞批付三省又五日遂降詔今月二十日奉敕原注節文太皇太后受冊依章獻明肅皇后故事詳定儀注而臣愚區區輒抱螻蟻之誠有不能自已者伏惟太皇太后陛下自同聽斷以來保護聖躬裁決萬務敬天愛人動懷謙畏至公至明度越前古尚慮臣下未能將明聖意一切檢用章獻明肅皇后故事弗加討論萬一典制闕失或纍聖德故臣愚區區輒慕古人事上篤于愛敬之義竊見天聖中翰林學士李維等嘗上章獻明肅皇后御崇政殿受冊儀注後雖改御文德緣文德外朝在紫宸垂拱之外故至今公議猶以維等所定儀注得禮之中惜其不果施行方當太皇太后陛下至誠虛心每事求當乘此嘉㑹或䝉收採特詔有司改御崇政受冊一明內外之辨自我神母垂訓萬世不勝大幸況于盛德至仁有光無損臣職在禮官茍有所懷義當罄竭不敢輒以愚昧自止亦冒國恩深厚思以涓塵求助海嶽仰瀆聖慈臣無任惶懼隕越之至謹録奏聞謹奏貼黃臣見候假開即集禮官依敕以章獻明肅皇后故事詳定儀注今來所陳只乞作太皇太后聖意批出伏望聖明曲加矜擇原注三月二日內批將來受冊有司雖檢用章獻明肅皇后故事當御文德殿顧豫涼薄豈敢上比章獻明肅皇后所有將來受冊可只就崇政殿宜令三省敘述此意降詔施行仍先具詔本進入三月七日詔祥禫既終典冊告具而有司遵用章獻明肅皇后故事當受冊于文德殿雖皇帝孝愛之意務極欽崇而朝廷損益之文各從宜稱仰惟章獻明肅皇后輔佐真廟擁祐仁皇茂業豐功宜見隆異顧豫涼薄絶企徽音稽用舊章實有慚德所有將來受冊可只就崇政殿赴江寧府過闕乞朝見狀臣昨知鄧州伏奉敕命就移知江寧府竊念臣偶遭聖時久備法從今路由京闕伏望聖慈特許依例朝見訖前赴新任臣見迤邐起發沿路聽候指揮次伏候敕㫖赴江寧府乞給假迎侍狀臣伏䝉聖恩移知江寧府竊念臣本貫越州臣弟傳昨自鄧州侍偏親先歸契勘越州去江寧府不至迂逺欲乞暫給假至鄉里迎省前赴新任伏望聖慈特賜矜允伏候敕㫖赴蔡州過闕乞朝見狀今月十三日伏奉告命䝉恩授臣集賢殿修撰知蔡州竊念臣一違省曹十換年籥身在湖海神馳闕廷勘㑹淮康軍路由國門出陸伏望聖慈特許臣朝見訖發赴新任臣不勝惓惓螻蟻之情見迤邐前至南京以來聽候指揮伏候敕㫖舉進士王升狀原注建中靖國元年臣伏見睦州進士王升秉義甚高操行至美年幾五十讀書未娶訪求師友徒步千里焚膏繼晷率常達旦逮今二紀秖如一日衆經羣史諸子百家無所不讀雖佛經道藏亦皆博極其事親孝奉兄悌喪親水漿不入口者纍日寢食如禮使推所藴更政閲事必有可觀方當陛下紹隆聖考求賢以任擇善而使如升者宜見收録伏望聖慈特賜詢察如臣所稱不誣乞賜檢㑹陳師道家素等授官體例除升一命處之學校以勸多士取進止陶山集卷四
