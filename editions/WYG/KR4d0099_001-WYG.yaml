body:
  text: 陶山集巻一宋陸佃撰五言古詩依韻和毅夫新栽梅花誰賦梅花詩擬繼三百五昔聞林居士幽棲賁巖塢瓊章雖在人玉樹已埋土湖山今寂寥五雲謾無雨夫君擅文章頗以詩自許芬芳春草生光芒夜珠吐人間再生島名在詩書圃錦囊貯西施佳麗生百娬翺翔道家山文采動人主陽春定能和白華應可補後生誰敢當柏直口尚乳案漢書高帝紀問大将誰也對曰柏直上曰是口尚乳臭此詩節取成句原本訛柏直為相值今校正老夫幸未疲腰劍猶能舞七言古詩贈王君儀嘗思孔子昔在世門生弟子三千人大哉巻舒聖人道弦歌講誦鄒魯濱立身非以利欲誘至誠惟學義與仁雍容徳藝愈磨厲烜赫光輝彌日新追塵力行慕汲汲忘疲善誘思循循外榮豈就卿相位内樂惟知探道真所以萬世作師法望之仰之如北辰吾嘗苦愛孟子語淵源事業醇乎醇得君達欲善天下陋巷窮惟周一身當時舉世謂迂闊進退何妨吾屈伸紛紛流俗何足託以道優游能自遵瞥然顧彼萬鍾禄有如聚散空中雲乃知君子所為學志将憂道不憂貧君儀建徳一儒士篤學滄溟陶粹純年强有志闢邪説氣壯力苦鋤荆榛放出森森梓杞材秀枝爛漫敷青春讀書侵暮即然燭為文夜坐常達晨誰憫顔瓢啖藜藿自憐范甑生埃塵每云外物未嘗恤披巻動能經累旬有時揮筆瀉霖雨但聞霹靂飛車輪雲開霧散卻晴霽清風淅淅無纖塵案此句用韻與前複佳花美木競妍秀高山逺岫皆嶙峋有時高談傾耳聴又如天馬超崑崙回顧駑駘百千輩疲筋竭力安可羣我嗟才識頑且鄙書齋日得相依親勤勤顧子能如此固宜使人長書紳依韻和孫勉教授汝隂先生學雖興官職冷靜真如冰門前鳥雀可羅網甑中埃墨隨炊蒸收拾人才妙長養落筆雖誤猶成蠅至于敗羣亦不受畫脂徒費知難凝従來説詳富學海發揮春秋破晻曖仲舒玉杯足瑕纇中散珠船不光彩原註中散謂王微之著書固知非一日作詩又欲重千載公卿爭迎為上客信知淮楚文章伯應許曹參避正堂未甘賈誼虚前席男兒富貴固有時如何宦達微愆期衮衣繡裳畢竟在秖是即今髭鬢改平生耿介性不容凛凛勁節凌秋風金華中丞最稱賞惜也未老先龍鍾去人闔棺命云促浮生瞬息風中燭原註莘老尤稱重誠之華萼飄零不得歸涕淚數行悲手足顧予未放雪滿顛乞得清潁如升仙喜聞故人在學校宛若見面初開牋揚州騎鶴未足羨便欲共醉花中間西湖風景事事好不似吳越惟無山海棠方恨我來遲君欲歸去将何之期向聖時同盡瘁况復交情淡如水他年若和原註去聲傅説羮免使鹽梅鼎顛趾依韻和李知剛黄安見示蒋山鱗鬛蒼嵯峨參伐可捫斗可摩建康開府占形勝千檣萬舳來江艖憶昨司空駐千騎與人傾蓋腸無他有時偃蹇枕書臥忽地起走仍吟哦諸生横經飽餘論宛若茂草生陵阿發揮形聲解竒字豈但晚學池中鵝余初聞風裹糧走願就秦扁醫沈疴登堂一見便稱許暴之秋陽濯江沱夜深歸來學舍冷鼓吹有蛙更聞鼉曾參捉襟肘屢見回也簞食傾瓢蠡誰云寒儒偶遭遇馳道馬疾揺鳴珂因縁乞郡得金印闗吏雖識難誰何邇來二紀世已換仙棊一局真爛柯孔林父子久同葬謝安墩在空坡陀顧瞻思賢有儀象挂壁未去聊隨梭中年觸緒易感慨賴有二子相經過隴西家兒信竒偉美玉在巖珠在波慙非冰清託之女亭亭松柏垂蔦蘿黄生初來似蠶蠋被絲纒裹今成蛾磨礱爪距擅場屋擬與羣俊爭殊科惟黄與李豈易得一二自抵三千多回思爭雄六戰國競致賓客尋干戈黄金築臺禮郭隗玉盤進手延荆軻雞鳴狗盜何足數雖欲定霸終蹉跎大哉皇宋聖人出日月雙麗君臣和嵗時金穰玉燭潤紀功泰山崖可磨平生慷慨慕荆國自誓中立無邪頗異時與子共勲業請效䕫契賡堯歌五言律詩登塔題寫看前輩躋攀接後塵日邊窺兩觀雲下念雙親宫線徐添晝林花頓減春夕陽猶獨立萬慮入經綸依韻和彭器資直講嵗久親談麈春深集試闈才名非畫餅科等是傳衣鶯稍遷喬出鴉應反哺飛羨君親膝近昨夜夢先歸呈張邃明舍人世掌絲綸美聲名壯紫微賜茶天上坐退食日邊歸簡在除書密時清諌疏稀佇公㕘鼎席寰海望餘輝思巖老呈彭器資春逺下樓遲城高背落暉鶺鴒經嵗别鴻鴈幾時歸栁闊行人盡花殘驛使稀濠州在雲下深欲伴歸飛寄龔深父給事往嵗手曾攜穿雲路欲迷蓬萊風引近靈鷲月飛低晝永棊相對春深鳥自啼别來真約在何事少書題蘇丞相挽歌詞二首樂易雖難老艱難亦備更高官誰不死厚徳是平生曾負阿衡鼎仍調傅説羮須知夷險異髙臥看南行世徳層層外年齡九九餘浪傳千嵗字真記五車書帳冷閒金鴨泉深暗玉魚前時傅巖像今得幾分如鍾評事挽歌詞銀餠當年遇金鉤幾代收一經知教子千橘等封侯瘴雨松門夕悲風桂嶺秋江深人不見依舊水東流馮朝奉挽歌詞仕宦惟遭遇神仙信杳冥老年多感慨同牓半凋零附葬銘旌暗平生信史青須知玉川子傳後有添丁公議郎中挽歌詞愷悌雖平進艱難亦備更冰㕔諳冷宦夢境過浮生雲海仙舟隔風旌粉字横莫埋言行録留著後人行劉大卿挽歌詞許國丹心壯傳家素節清葬無金椀送庭有玉棺迎紅幕賓朋散青囊宅兆成惟餘原上月猶是舊時明陳夫人挽歌詞鄰與鄒人卜門歸太史評忽隨雙佩失不見一珠成夢入清都杳船維彼岸輕空餘江上月依舊度牕明魏國太夫人陳氏挽歌詞漏逐晨鐘盡舟隨暮壑移文歸大家傳行在小星詩珠珮臨江失金丹渡海遲侍郎頭已白兒慕不勝悲贈慈覺大師講花天散墜醉草客爭收明月來相識孤雲學自由隙曛穿薄暮簷溜滴髙秋不鎖西牕夢名山有舊逰贈李柔得道士傳得真人性長安久卜居噀成西蜀雨換得右軍書原註一作桂林無雜樹䑕壤有餘蔬酒散顛狂極香消寂寞餘更能盤礴畫傳寫十分如五言排律再用前韻呈毅夫案此所云前韻一首永樂大典缺載洛陽曾識面穰下竟論交久若居蘭室初如食蔗梢故非偷姓孔誰敢僭名郊作事常師古當官肯代庖匪躬期蹇蹇夷行笑嘐嘐稷也真堯力參乎豈桀髇金樓傳寳構雜俎當珍肴講舍推攸止賓筵絶載呶孫牕餘臘雪徐榻臥寒茭反舌宵鳴蟈長踦暖挂蛸即今除户墐那得曝簷茅逺夢方隨蝶輕綃擬換鮫歴來雙鳯闕律動半山坳草色揉藍染花名篆字鈔膘肥熊自撲香滿麝爭跑乳雉翔仍集鳴禽語漸勦栁将金自比楮與玉相淆節應豳三日陽添泰一爻碧圓牽翠荇紅蕾破香苞鶯出求同志鴻歸學共胞形容當舞籥音韻中笙匏麗苑聞亡是熙臺亞有巢不材真是櫟何算信如筲交淡非同醴流清豈為膠往來須倒載生滅任浮泡縦阻陳歌管猶容聴鐲鐃北牕寜獨臥南岳謾相嘲酒用陶巾漉詩須賀錦包儘教談麈盡仍取唾壺敲不向花前醉應慙薄荷貓七言律詩閒居示王君儀五色文章爛錦開謾勞天女翦刀裁黄鶯窺水亭亭立白鳥投空逺逺來清晝光隂輸靜客碧雲岐路屬多才羨君直入文滄海探盡驪珠始肯迴送諸張就學經年客㑹稽父兄應久怪歸遲故知子學優來日想得人看勝舊時食蔗已甘佳境近為山纔止素功虧少年況有修身志莫為區區應舉移依韻和尚用之秀才梅花二首假借鉛華素不曾肯将桃李較衰榮向人有意如相識混雪無言恥自明青帝信音元苦逺素娥風調不勝清愛君詩思誠高古睥睨𤣥尊與太羮年年先發更誰曾憔悴中間獨自榮素豔得如人淡佇暗香能共雪分明銀河魄轉霜風耐青冢魂歸月夜清莫與将軍輕止渴須知丞相要調羮送能協禹門千尺晚登龍稽古従來緩見功清節藴珠函柱白高文浮蜃吐樓紅落花正值行時盡圓月還成别後同寄字好憑魚上下汴渠流水洛新通呈越州程給事南海歸來請㑹稽錦衣新過浙江西暫違香案蓬萊小久擅詩名太華低花影欲重公事退鳥聲初鬧吏衙齊雲衢已怪朝天晚乘興無因訪剡溪依韻和程給事留題法雲寺方丈淨室兼容海衆臨維摩憔悴病仍侵且將燈續光明藏時見珠隨咳唾音素壁短碑深掐原註去聲玉畫簷新牓大書金故溪曾指桃花記乘月何時更一尋題適南亭呈程給事二首子真仙去學喬松華宇經營得我公海近蓬瀛全彷彿山經樓閣半虚空一千里地簷前月九萬程天座上風従此鑑中登望好卻應渾勝水晶宫參陪初見翦蒿萊頃刻疎紅户牖開賀老湖光浮枕簟梅家山色染樓臺翠微已借雲根築青瑣仍供月影來聞説紫泥追詔近使星躔次傍三台依韻重和再住法雲寺案此云重和自有初和一首永樂大典缺載聞說重來住法雲舊縁香火一番新桃花可認曾移主鷗鳥還應不避人腦玉幾陵虹氣勢頷珠長借月精神何時乞得東南守共禮黄金丈六身贈真戒大師時訪城西長者家欲将無定友煙霞百函貝葉聴揮麈一炷爐香看㸃茶猿立砌臺偷落果鳥穿簷柏獻新花舊曾題處煩師䕶肯學常流旋碧紗登塔望太行浮圖千尺俯樓臺天地晴無一㸃埃日薄馬初經具次原註具茨之山一従具次風輕船稍近蓬萊遷移曾費愚公力分擘寜煩巨掌開東北若無丘壟礙好同靈鷲卻飛來依韻和彭器資直講二首三年清苦下書帷諸子専門盛一時研盡錦砂重注易草殘饒紙謾箋詩鼓催閩越茶應早線引昭陽日漸遲侍講㑹須拌共醉狀元新約未差池歸盡春風未得歸相逢還是落花時文衡仔細誇程石飲量麤豪笑滿巵安穏鴛鴦多左翼低回烏鵲尚南枝稍尋前度曾逰處更覺新懐慰舊思依韻和蕭惟申檢法同年老驥如龍久屈盤追風消得用金鞌即今将相多同牓自古神仙有法官病起縱驚秋鬢改詩成猶伴夜珠寒他時直上三千里願看雲天一整翰門下王相公南郊謝雪子敏甫學士監禮楊傑有詩次其韻雪擁平田萬頃寛一郊和氣屬天官撒鹽久欲資調鼎成璧初疑捧上壇雀帶玉飛金屋煖龍和珠睡錦牕寒他年祠罷親陪燕應得屏風隔坐觀依韻和元參政祈雨翦爪七年矜久旱齋心三月愧疎雲地鍾潤澤來耕壠天借清凉入繡紋常膳鼎寒揺萐莆正衙爐煖和蘭薰原註是日得雨上復常膳御正殿越裳㑹見朝丹闕共識中原有聖君次韻和曾子固舍人二首閶闔晨開玉殿浮靈鼇不動海波柔是般仙果三千嵗一樣春風四百州鸞扇影寒裁就月蜃爐香煖結成䄛從今不顧瑶池宴閒卻西巡八駿騮原註右集英殿春宴呈諸同舍平明下馬錦䝉鞍暫向飛廊一整冠行近栁隂移晝寂坐來花氣辟春寒别張翠幄黏絲絮更想金人捧鏌干洛下少年今亦老宴逰無復似前歡原註右上已日瑞聖園錫宴呈諸同舍資善堂御筵奉詔送陳資政出守邢州共輔龍飛與五蛇一時恩禮有誰加華堂玉椀更傳酒便殿金瓶獨賜茶寳帶光芒腰下印繡衣形影幕中花平生自與韓公合名徳應歸太史誇呈王聖美少談竒字客長安妙斵無人得郢墁兩鬢已秋陪後進十年如夢守前官原註公改中允十年矣竹延西角東須徧梅發南枝北尚寒原註佃先聖美進職従古晚成終大用扶揺行見海鵬摶依韻和章樞宻景靈宫奉安列聖神御綵輿同日㑹仙山金鎖晨開玉殿闗駕象法王趨側畔騎龍真祖䕶中間紫浮渭北衣冠氣紅壓終南衮繡顔更祝聖孫千萬夀奉祠長御景靈班依韻和曾子開舍人従駕孟饗景靈宫四首汎灑従誇雨㸃匀九天宫闕自無塵五更玉勒爭門入十里珠簾夾道陳薄宦即今雙鬢改従官還是一番新須知鸞駕重涓日不似春秋四卜辛原註是時有㫖别選日夏木隂清氣候匀平明鸞仗簇芳塵百年禮樂傳宫注萬國衣冠拱廟陳紅芍藥開迎晝永紫櫻桃熟奉時新天街自不容生草布屑由來枉用辛三宫同日下雲萊帶曉千門萬户開黄繖日隨清景駐玉爐風度暗香來眠當道路驅除栁守得宫庭委付槐亭午扇還新廟閟紫雲重複護周迴脩廊圖畫列伊萊金碧旁看啓佑開山壓巨鼇初踴出宫隨靈鷲忽飛來瀟湘佇泣空留竹海岳遥趨想畏槐聞說都人爭擁道鳯輿纔見第三迴瓊林苑御筵奉詔送文太師致政歸西都四首原註元豐七年三月二日文案七年原本誤作元年攷神宗本紀元豐三年彦博為太尉九月加節鎮六年十二月以太師致仕七年入覲三月辛丑宴瓊林苑帝製詩以賜之與詩中節次相符今據以改正車後鵷鸞隨劒履帳前貔虎擁旌旄星環紫極三階正鼇立青天一柱高上苑金杯新錫餞下都銀鑰舊均勞重來更捧宸章爛華衮何如玉字襃黄鉞新兼兩鎮雄至和前已冠三公傳将名徳蠻夷外老卻年華将相中十雨燮成堯壤厚五雲飛盡傅巖空原註易飛候云視四方有大雲五色具而不雨則其下賢人隠矣更聞定策刊彞鼎千古英雄伏下風太師勲業在丹書乞得身歸主眷殊五色詔容瞻鳯闕白雲篇不換蛇珠閒應物外神仙有健復人間将相無明夜畫船回首處汴隄煙月栁千株原註公歸上特令具船黄金曾酌御尊餘恩禮何人更得如北極星辰趨觀闕西京花木臥田廬手持宸翰春羅馥身入仙壺晝景舒八十為師精力在太公應愧齒先疎興龍節口號案宋史哲宗紀帝生日為興龍節祥雲好色近蓬萊列辟稱觴廣殿開樂奏九成丹鳯降香焚百和玉龍來三農臘雪方呈瑞萬國春風已暗迴共祝聖君千萬夀年年長奉白雲杯興龍嘉節㑹簪纓步武蹌蹌鷺集庭拜笏競從花外見仙歌疑是夢中聴升平聖世眞難遇醉飽君恩敢獨醒同望闕庭稱萬夀慶雲中見老人星依韻和王微之學士坐籌國事尚才堪屈指同年秖二三平昔醉鄉營别業如今仙籍換頭銜光隂老去猶能惜世事閒來不更談聞說進書歸祕閣絶勝流落在山巖爾雅新義成查許國以詩見惠依韻答之二首背未成鮐齒未鯢暫時來放五雲低初従荆國猶年少久侍神皇見日躋近正鉛黄新眼目指南塵土舊輪蹄愛君文采真難敵他日横空是紫霓探盡驪龍鑿盡鯢明珠未出價猶低晉人已覺蟚蜞誤漢客仍從豹鼠躋到底錯薪須刈楚從來得要忘蹄他時若綴三經後五色雲中有紫霓戲和鄭通叔仲春晨起春來燕姹復鶯嬌不飲喉咽頓覺焦桃被臉深将露洗栁縁腰細得風饒船中載酒猶嫌少席上看花每恨遥可惜襄王今老矣不堪雲雨夢朝朝送文太師再致政歸西都二首原註元祐五年二月太師天賦與人殊除卻汾陽盡不如萬乘有時前膝席百官隨處避肩輿鉅公多出陶鎔後重事仍歸議論餘聞說挂冠恩寵厚恨無官職可教除乞身章疏竟難移雙鎮辭來亦重違絶域共驚吾父在别都今喜我公歸渭川士宦相先後遼海人民半是非誰念昔曾陪祖帳同時賓客坐中稀原註公元豐間致仕西歸賜宴瓊林苑今惟蘇子容并佃二人再預陶山集巻一
