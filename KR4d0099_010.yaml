body:
  text: 陶山集卷十宋陸佃撰制翰林學士除節度使制門下周寄軍政將皆出于命卿魯用真儒文必兼于武備乃眷詩書之帥以提仁義之兵敷告大廷載揚明命具官某社稷之器邦家之光才足以資修飾潤色之嘉道足以贊經綸戡定之美壯猷能決老志善圖無狐鼠進退之疑有龜蛇捍避之固早陪法從良副具瞻非獨擅制作之文抑亦窮戰鬬之事禁林甚密豈意得頗牧之才方略又新不至學孫吳之法足當閫寄以協廟謀是用築上將之壇埸建中軍之旗鼓式消寇虐用遏殊方於戲韎韐作師豫方勤于賞善黃河為帶爾其顧于誓功祇服訓辭往膺榮號宣徽南院使除河陽三城節度使制門下天下雖安敢愆忘于武備閫外之事尤屬賴于將臣宜得真才以諧實用粵敷明命咸告大廷具官某老志善圖壯猷能決沈鷙而懷氣節慷慨而志功名頃副簡求屢更煩使玉關萬里繄綏撫之才金匱六韜得經變之略威號素著恩信甚明作之而鼓鼙之聲歡令之而麾鉞之色倍是以殺敵惟果攻無堅城戰功實多兵有常勝眷豫爪士時乃虎臣比宣令猷彌膺羣望兹用錫元戎之旄鉞築上將之壇場付以三城委之一面式消冦虐用勸臣工於戲韎韐作師朕方勤于賞善黃河為帶爾其顧于誓功惟寬仁可以愛民惟秉義可以報國往膺寵命祗服訓辭宗室除節度使制門下國以宗彊蓋本懷和之義政由親始實先比佽之仁于古有稽肆豫敢怠在書則分寶玉庸展伯叔之親顧禮而有脤膰以同兄弟之福矧兹近屬時乃真才惟明綍之將施宜搢紳之是告具官某肺腑之戚聲聞之賢貴而有謙靖之風富而無亢滿之纍外禦其侮絶讒鬩之嫌旁明厥思保踐修之善而又沈鷙而懷氣節慷慨而志功名敦閲詩書究觀韜略無俾城壞既宣夾輔之勞何以家為更懷忠勇之意乃付元戎之鉞俾分大鎮之符匪出私恩實從公義於戲蔦蘿施于松柏雖實托豫之尊葛藟庇其本根亦惟資爾之助往欽寵號祗服訓辭邊鎮節度使除開府儀同三司制門下設位語能無重經邦之貴敘階言極有嚴開府之華屬肇制于官名尤慎班于爵號使膺實用爰得真才敷告大廷載揚明命具官某有剛實之德有柔令之儀忠孝稟于天成文武惟其器用玉關萬里繄綏逺之功金匱六韜得經變之略克寬外顧式副旁求壯矣邦家之基居然廊廟之器天將大任民具爾瞻況以久于建旄宜進同于補衮斷自朕志往哉汝諧於戲角犀豐盈聳四方之望威儀赫烜視三公之崇體豫眷懷茂乃嘉績亦若虢叔共修諸夏之和無俾阿衡獨擅有商之美吏部尚書除尚書右僕射制門下伊尹格天暨湯咸有一德高宗享國惟說命總百官顧臣主之俱賢致朝廷之既治將布偉績爰告大廷具官某行可以鎮浮才足以經逺中道而立無昵于小人當官而行不隕于流俗安危攸繫左右具宜比副明揚屢膺器用厥猷翼翼深符王國之思維石巖巖大聳師垣之望乃眷前王之盛實資上相之良燕及神人阜成華夏雖眇躬之莫及或碩輔之可圖尚濟登兹是用命汝爰自治官之正使陪令席之尊其式往欽以經來效於戲黃耳金鉉永繄調燮之才赤芾蔥衡益稱褒嘉之命恭朕之詔惟乃之休樞密院副承㫖元宗孟可文思副使制敕某將事樞府克謹奉承厥由省官往二使秩服勞于外思稱茂恩皇太后遇同天節典入內東頭供奉趙諒可文思副使制敕原注腦詞同前同天之澤進序官榮往服恩章愈思懋勉西京左藏副使智誠可文思副使制敕疆埸之臣久勤征戍不有勸賞何以閔勞遷爾一官是為寵數三班奉職周閎中可右班殿直制敕具官某爾父將事公府以能屢遷今復纍勞盍升使秩頗睎廉善乞寢茂恩是加爾官以就清志往維祗服共勵忠勤堂後官兼提㸃段繼隆可承議郎時恢可奉議郎制敕具官某爾為公府之屬而能將事恪恭有勞可録朕于爵賞何所愛焉敘進厥官往祗乃服宣徽院通引官行首解中立可三班借職制敕朕罷不職之官而宣徽院廢以爾祗事嵗時頗久錫之一命其往慎哉奉議郎蕭國鎮可降授宣議郎制敕具官某朕順考舊典敷同官儀凡在臣工卒從新秩爾雖罪廢猶不汝遺錫之訓詞用更位號其往祗飭尚蓋厥愆步軍都虞候英州刺史林廣可衛州防禦使馬軍都虞候制敕曩者瀘南之戎冦我邊鄙蠢爾匪茹敢煩王師朕命將臣討兹無赦具官林廣有勇有謀克承廟算往殄巢穴人罔繹騷戰功居多無負任使擢登禦防虞度騎旅是為休寵益務忠勤東上閣門使王光祖可四方館使皇城使忠州團練使姚兕可果州防禦使制敕瀘南之冦負固亂常乃煩王師罪在不赦前啓後殿左右是翼惟時將帥各迪有功具官王光祖忠義秉心深入擊討蟻聚殄滅師不踰時朕圖汝勞擢司賓館其務忠報以對茂恩其姚兕朕嘉汝勞圖厥褒勸進司兵防往務忠報宗室仲峭可贈安化軍節度使制門下先王崇建蕃屏無専享于文武之功同姓分錫脤膰庸展親于伯叔之國乃眷公族之茂蔚為王國之華其于云亡惻然永悼具官某小心而畏義强志而婉容頎然高明輔以禮樂用能帥乃舊德光于前人豈獨恭儉孝悌之修沒有遺範以至始終哀榮之極備于歸全日月有時窀穸告具其錫爾祉以將余哀雖云飾終特出異數苴茅元社易乃通侯之封金節雕戈畀以元戎之命故皇姪右千牛衛將軍可贈右監門衛大將軍制敕具官某祖宗之法敦敘九族生見褒優沒有榮號情協禮稱朕用丕承爾以近親秉德信厚永言淪逝良用衋傷褒榮飾終國有舊典尚兹冥漠克享顯休濮安懿王孫右監門衛大將軍仲江左千牛衛將軍仲郵仲的仲葳各王韶案此上有脫誤字女封邑號制敕朕于大臣之後恤孤録遺而遺奏以爾為請用錫封邑庸示褒優思顯而親其務祗服宗室仲容所生母王氏可封縣太君制敇具官某所生母王氏靜德是將嬪于宗室克生賢息似續有休爰啓邑封厥惟華寵思稱朕命其克欽承中大夫守尚書右丞王安禮曾祖明贈太師中書令兼尚書令可追封英國公制敕朕惟成王推皇考右烈考之心而後及于文王又推而上之至于后稷率禰之義豈特王者有是心哉蓋王天下者獨致其隆耳朕欽輔臣原其親考尊祖之意使伸其恩以追榮三世蓋非逺求也具官某曾祖明含章在躬克開厥後積仁纍慶施及孫曾後先相望作我良輔嘉謀在國維爾之詒有華衮章亦既無愧光靈弗昧尚監兹哉中大夫守尚書右丞王安禮曾祖母某氏可追封韓國太夫人制敕朕廣德澤申勸輔臣有以一身而榮三世其生者貴死者見封曰惟故常厥有宜稱性情度數蓋無得加焉具官某曾祖母某氏有言有容行應圖史作合良士家用榮懷亶侯多祥實始茀祿來毗國政是生曾孫朕擇爾封莫如韓樂尚兹休享長佑後人中大夫守尚書右丞王安禮祖用之贈太師中書令兼尚書令可追封衛國公制敕自古忠臣常出于慈孫孝子而孝子之愛其親慈孫之尊其祖天性厚矣茍用人之子孫而薄其祖考尚何以責其忠哉具官某祖用之處身恭恪應物和靖天篤之慶以有聞孫為時宗工恂善之效徙封大國尚克歆承中大夫守尚書右丞王安禮祖母某氏可追封燕國太夫人制敕禮者因時而造固有起于後世而先王未之盡者變而通之存乎其時而已朕即人心以義起禮褒其子孫因使死者有爵雖古所無豈負于禮之意哉具官某祖母某氏克明靜德休有淑聲是興孫謀以佐王國載錫之地自越徂燕靈其有知歆我明命中大夫守尚書右丞王安禮父益贈太師中書令兼尚書令可追封楚國公制敕先民有言國人稱願曰幸哉有子如此君子之所謂孝也已朕率是道以臨卿士登用厥子因隆其親使名協位稱以大國人稱願之意具官某父益允修厥猷忠孝惟寶是産哲輔來寧邦家克紹德門以永譽處他人無一爾有二人錫之土田大啓楚宇天下稱願豈不偉哉中大夫守尚書右丞王安禮母某氏可追封魯國太夫人制敕古之慶賞尚得與其鄰里鄉黨相共矧伊親矣可不及哉具官某母某氏婉娩聽從爰得良配饋我黍稷克堪厥家媲德合善謂宜夀考豈嗇于厥躬以昌嗣子乃遷大國于魯有休言告幽扃尚克嘉享中大夫守尚書右丞王安禮母某氏可追封魏國太夫人制敕昔孟軻之母亡軻祭前以士後以大夫蓋君子從禮視位之高卑與祿之厚薄肆朕寵綏臣工率禮不越朝與燕坐榮則逮親然位有髙卑故封有逺邇雖自我作豈與先王異意哉具官某母某氏為婦若母若為威姑無所不宜以砥燕譽均仁七子間有俊傑爾子安石嘗以道相朕贊成政法布在四方今更官儀允釐庶職維汝安禮仍在倚毗有蹈有知咸迪兹訓賜之全魏軻母是光尚兹淑靈克享榮報中大夫守尚書右丞王安禮妻某氏可進封魏郡夫人制敕禮之為道取稱而已故夫尊于朝妻榮于室厥有彞訓朕敢弗循具官某妻某氏興自慶門來嬪顯族慈從婉聽習熟見聞茂厥壼儀靖嘉維則勵相君子作我輔臣粵新官名使贊其始大啓爾郡用齊褒榮尚昌而家永宜象服陶山集卷十
