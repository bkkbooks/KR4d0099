body:
  text: 陶山集巻六宋陸佃撰議廟制議臺門周書曰太廟路寝明堂應門庫臺注謂門者皆有臺于庫門見之從可知也臣謹按爾雅曰閍謂之門正門謂之應門犍為舍人曰閍廟門也應門南向大門明堂位曰九采之國應門之外北面東上然則太廟明堂同制大門謂之應門蓋築臺為屋于其上禮記曰天子諸侯臺門有以高為貴也又曰臺門而旅屏大夫之僭禮也正義曰兩邊起土臺臺上架屋謂之臺門𤣥閫周書曰應門庫臺𤣥閫注謂以黑石為門階也提唐周書曰太廟提唐注謂唐中庭道提謂為高之也臣謹按攷工記曰堂塗十有二分注謂分其督旁之脩以一分為峻也爾雅曰廟中路謂之唐堂塗謂之陳詩曰中唐有甓注謂中中庭也唐堂塗也據此中唐有甓謂中庭道則庭外廟中之路提使少髙而已弗甃也疏屏明堂位曰太廟疏屏注謂疏今浮思也刻之雲氣蟲獸若今闕上為之矣疏曰天子外屏人臣至屏俯伏思念其事臣竊謂疏屏蓋謂疏其上也尚書大傳曰諸侯疏序注謂序牆也于上為疏疏牕也謹按義訓曰交牕謂之牖櫺牕謂之疏鄭氏謂刻為雲氣蟲獸誤矣四門家語曰孔子觀乎明堂覩四門墉有堯桀之象而各有善惡之狀興廢之誡焉臣竊謂宗廟與明堂同制則廟亦四墉有門其南曰閍三面謂之闈故蔡邕明堂月令論曰古大明堂之禮膳夫氏相禮日昃出西闈日闇出北闈知宗廟之門四也九階攷工記曰世室九階注謂南面三三面各二疏曰明堂位曰三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上以此知南面三階也大射禮云工人士與梓人升自北階禮記云夫人至入自闈門升自側階又曰升自東階以此知三面各二也左墄蹴鞠者傳曰黄帝所作王者宫中必左墄而右平薛綜曰墄限也謂階齒也天子殿高九尺階九齒各為九級其側階各中分左有齒右則陂陀平之𤣥陛周書曰太廟内階𤣥階注謂以黑石為階臣竊謂内猶中也南面三階其中階之陛以黑石為之重屋周書曰太廟重亢注謂重亢累棟也復格周書曰太廟復格注謂復格累芝栭也臣謹按芝栭山梲也方小木為之爾雅曰閞謂之槉栭謂之楶注槉欂也疏曰欂一名枅字林云枅柱上方木也櫨謂斗栱又明堂位曰山楶藻梲天子之廟飾也鄭氏謂山節刻欂盧為山也藻梲畫侏儒柱為藻文也禮器曰管仲山楶藻棁君子以為濫矣鄭氏謂大夫無畫山藻之飾然則山楶刻而畫之天子廟飾重焉黑楹明堂位曰太廟刮楹注謂刮摩也疏謂以宻石摩柱廣雅曰天子諸侯廟黝堊大夫蒼士黈臣看詳説者據爾雅以為牆謂之堊地謂之黝按荘子郢人仰塗堊墁其鼻則不特牆謂之堊又榖梁曰天子諸侯黝堊大夫蒼士黈丹楹非禮也按此刮楹亦以黑白飾之故春秋正義曰禮楹天子諸侯黝堊徐邈云黝黑柱也然則黑柱以白畫之丹桷尚書大傳曰天子之桷斵之礱之加宻石焉注謂礱礪也密石砥之也漢書解詁曰桷椽也諸侯丹桷以丹色也臣竊謂宗廟丹桷禮也刻桷非禮也榖梁曰楹天子諸侯黝堊據此諸侯丹桷則天子桷丹可知也飾礩尚書大傳曰士大夫有石材庶人有石承注謂石材柱下礩也石承當柱下而已不外出為飾臣看詳士大夫石材外出為飾則天子諸侯柱礩飾之從可知矣達鄉明堂位曰太廟達鄉注謂鄉牖屬謂夾户牕也博雅曰牕牖䦳也臣謹按攷工記曰四旁兩夾牕謂于重屋四旁面各兩牕以納日月之明所謂達鄉而鄭氏以謂每室四户八牕非是也説文曰在屋曰牕在牆曰牖則牕在屋明矣交牖義訓曰櫺牕謂之疏交牕謂之牖臣謹按説文曰牖穿壁交木為牕也儀禮曰司宫闔户牖則牖蓋交木為之可以開闔已祭則閉焉藻井周書曰太廟旅楹舂常畫旅注謂常累系也舂常謂藻井之飾也言皆畫列柱為文風俗通曰殿堂象東井形刻作荷菱荷菱水物也所以厭火賁墉尚書大傳曰天子賁墉諸侯疏厚注謂賁大也牆謂之墉大牆正直之牆不衰殺其上臣竊謂廟垣謂之牆今其外繞牆也承室之牆曰墉儀禮或曰北墉下或曰西牆下墉與牆異明矣牆蓋衰殺其上攷工記曰囷窌倉城逆牆六分注謂逆猶卻也六分其高卻一分以為閷設移周書曰太廟設移注謂承屋曰移臣謹按爾雅曰連謂之簃注謂堂樓閣邊小屋博雅曰宫室相連謂之簃蓋天子宗廟重廊故于堂邊設移屋連之詩曰繹繹寝廟繹繹連也重廊周書曰太廟重廊注謂重廊累屋也臣謹按古曰廊廟廟之有廊明矣山牆周書曰太廟山牆注謂牆畫山雲臣謹按子貢曰譬之宫牆夫子之牆數仞不得其門而入不見宗廟之美百官之富蓋其脩之數右臣謹按周禮匠人夏后氏世室堂脩二七廣四脩一五室三四步四三尺殷人重屋堂脩七尋堂崇三尺四阿重屋周人明堂東西九筵南北七筵堂崇一筵五室凡室二筵鄭氏謂世室宗廟也重屋王宫正堂若大寝也或舉宗廟或舉王寝或舉明堂互言明其同制周書亦曰太廟路寝明堂咸有四阿重亢重廊復格藻井設移旅楹内階𤣥陛提唐山牆臺門𤣥閫則三者同制明矣故明堂位曰太廟天子明堂而月令仲夏天子居明堂太廟先儒謂明堂制與廟同亦曰太廟也然則天子太廟五室土室在中大于四室故謂之大室書曰王入大室祼是也其左為東房其右為西房皆南户而木室在東北火室在東南金室在西南水室在西北木室東户火室南户金室西戸水室北戸詩曰築室百堵西南其户傳謂或西其户而家語又曰賜觀太廟之堂未既還瞻北闔皆㫁西户謂金室北户謂水室也四室中夾室劉熙釋名曰房旁也在堂兩旁也夾室在堂兩頭故曰夾也夾室皆有前堂謂之廂爾雅所謂室有東西廂曰廟無東西廂有室曰寝而覲禮云几俟于東廂是也説者謂天子宗廟無廂夾不已誤乎其四中則南曰明堂北曰𤣥堂東曰青陽西曰總章月令所謂春居青陽太廟夏居明堂太廟秋居總章太廟冬居𤣥堂太廟孟月居左个季月居右个是也至于閏月則闔門左扉立于其中而還適路寝居門終月鄭氏謂于文王在門謂之閏則太廟象先王平生所居與明堂路寝同制五室十有二堂理宜然也或曰宗廟與路寝明堂制同則上有五室不得有房又惑矣按書路寝實有東房西房東夾西夾而明堂位曰太廟天子明堂則魯用天子禮樂太廟如明堂制而季夏六月以禘禮祀周公于太廟君衮冕立于阼夫人副褘立于房中則太廟路寝明堂有房明矣今先所圖上廟制欲以八廟約少牢大夫宗廟為之雖增四阿重檐山節藻棁堂九尺階九等略應王禮然未有五室九階臺門𤣥閫内階𤣥陛山牆賁墉重廊累棟復格設移四門達鄉黑楹丹桷藻井之制又以房為堂且謂房無北壁故得北堂之名夫堂與房異著矣安有為房而無北壁者哉至于饎饔又在廟中西堂下凡皆所未盡也説者謂饎饔在西堂下逼西壁為之夫爨置于廟中理不安矣況欲逼宗廟西壁為之乎説者或謂西壁謂西牆也按儀禮有曰西牆有曰西壁則壁與牆異以臣攷之特牲饋食曰主人服如初立于門外東方南面視側殺主婦視饎爨于西堂下蓋堂謂門側之堂爾雅曰門側之堂謂之塾匠人曰門堂三之一古者爨在廟門外或在東或在西故饎爨在廟門外之西堂下少牢饋食云饔爨在門東南北上廩爨在饔爨之北特牲饋食云牲爨在廟門外東南魚腊爨在南皆西面饎爨在西壁士虞禮曰側享于廟門外之右東面魚腊爨亞之北上饎爨在東壁西面由是觀之饎爨在廟門外之西堂下逼西壁為之明矣故曰饎爨在西壁又曰主婦視饎爨于西堂下臣稽攷載籍廟與路寝明堂同制雖具其凡如右然其脩廣之度匠人以為南北七筵東西九筵凡室二筵謂之凡室二筵則太室大矣太廟五室十有二堂太室又大則廣九筵脩七筵不能容之按匠人市朝一夫鄭氏謂方各百步則東西九筵南北七筵亦謂南北各六十三尺東西各八十一尺歟且古者寝不踰廟燕衣不踰祭服而宣王考室之詩曰如鳥斯革如翬斯飛則先王宫室其輪奐至矣又曰噲噲其正噦噦其冥噲噲大聲也噦噦小聲也言其閎深可以答響豈與大夫之陋同日而語又況後王彌文積隆以至于今也然則天子廟飾雖古制殘缺不可盡見而今亦有不可盡如古者要之攷先王度當世與時宜之而已其前代載籍所傳不具與其後世未之有法可以道揆禮可以義起使華副實稱昭明垂之百世取度于身實在聖衷如允臣所議乞叅校舊圖擇其善者以聖訓裁之昭穆議原註圖併劄子附宣徳郎守太子中允集賢校理充崇政殿説書詳定郊廟奉祀禮文臣陸佃臣伏覩中書省批送下張璪何洵直所論宗廟昭穆欲以宣祖為昭翼祖為穆真宗為昭太祖太宗為穆英宗為昭仁宗為穆尊卑失序非禮意也竊謂昭穆者父子之號昭以明下為義穆以恭上為義方其為父則稱昭取其昭以明下也方其為子則稱穆取其穆以恭上也豈可膠哉謹按祭法曰去祧為壇去壇為墠議者以為壇立于右墠立于左臣以周制言之太王親盡去右壇為墠王季親盡去左祧為壇左右遷徙無嫌則洵直謂昭常為昭穆常為穆左者不可遷于右右者不可遷于左之説非矣璪謂四時常祀各于其廟不偶坐而相臨武王進居王季之位而不嫌尊于文王及乎合食于祖則王季文王更為昭穆不可謂無尊卑之序臣竊以為古者合食毁廟之主有不皆祫者則璪之説非矣大傳曰大夫士有大事省于其君干祫及其高祖干者預也言大夫士本無祫祭惟其有功善于其君進使干祫則毁廟之主不皆合食特自高祖而已假令大夫昭穆以世次計曾祖適為昭高祖適為穆父適為昭祖適為穆同時合食則将偶坐而相臨義不得以卑而踰尊則璪等将令昭常為昭穆常為穆乎如此則曾祖居尊高祖居卑父居尊祖居卑矣非所謂父昭子穆昭以明下穆以恭上之義許慎曰父為昭南面子為穆北面大夫干祫若使曾祖復為昭高祖更為穆則是子為昭南面父為穆北面大傳曰旁治兄弟合族以食序以昭穆則是生而居處同堂合食亦序昭穆假令甲于上世之次為穆今同堂合食實屬父行乙于上世之次為昭今同堂合食實屬子行而偶坐相臨則甲宜為昭乙宜為穆豈可逺引千嵗以來世次復令甲居右穆乙居左昭紊同堂父子合食之序乎璪又謂既為昭矣又有時而為穆是亂昭穆之名臣竊以為昭穆父子之號耳茍為昭者不復為穆為穆者不復為昭則是昔嘗事父為之子者今雖有子不得為父茍復為父則以為是亂父子之名可乎祭法曰天子立七廟曰考廟曰王考廟曰皇考廟曰顯考廟有二祧焉則天子立廟自親始矣初立考廟于是立王考廟其次立皇考廟又其次立顯考廟猶以為未也于是立二祧焉與太祖之廟而七顯考廟王考廟與左祧為昭皇考廟考廟與右祧為穆所謂三昭三穆如曰成王之世武王為昭文王為穆則武王為父不入考廟而入王考廟矣故臣竊謂八廟之制當以僖祖居中翼祖為昭宣祖為穆太祖太宗為昭真宗為穆仁宗入王考廟為昭英宗入考廟為穆是為父昭子穆稱情順理尊卑協序而議者蔽于所見與臣未同伏乞㫁自聖學一正羣議不勝幸甚宣祖昭廟眞宗昭廟英宗昭廟僖祖祖廟貼黄據此子乃為昭父更為穆翼祖穆廟太祖太宗穆廟仁宗穆廟右張璪等所定圖翼祖昭廟太祖太宗昭廟仁宗昭廟僖祖祖廟貼黄是謂父昭子穆宣祖穆廟眞宗穆廟英宗穆廟右臣佃所定圖臣竊觀陛下創法立制必先本之性情稽之度數師成于一心務使仁協義稱後世無得而議堯言禹度影在四方又将大新八廟泰然不疑以齊三代盛王所以隆祖親考之意然而昭穆之次議者與臣未侔而臣區區愚忠偶懐單見不敢輒止謹上八廟昭穆異同并條次嘗所答述者乞賜折諸聖學垂法萬世取進止元符祧廟議準元符三年五月四日敕中書省尚書省送到禮部狀據太常寺狀本寺稽叅典禮竊以為哲宗皇帝升祔宜于太廟殿増一室本部看詳合降指揮令侍從官并祕書省長貳集議三省同奉聖㫖依告報逐官集于本部尚書㕔參議聞奏右臣謹按書曰七世之廟可以觀徳則記所謂天子七廟三昭三穆與太祖之廟而七也恭惟國朝自僖祖而下至仁宗始備七世故英宗祔廟則遷順祖神宗祔廟則遷翼祖三昭三穆合于典禮将來哲宗皇帝祔廟于序為穆則合遷宣祖為允蓋哲宗皇帝之于神宗正如唐敬宗之于穆宗當以廟世數之今祔廟不入世數則與宣祖為八世是四昭四穆古所無也廟祭議臣倣古度今詳定八廟之祭廟各三獻同日而畢蓋約其禮務為可行欲以施于春祀而已至于夏礿秋嘗冬烝當如古制合食于祖蓋古有宗廟之事一日而畢至于祫祭餘祀廟各一日少牢饋食禮曰來日丁亥用薦嵗事于皇祖伯某以某妃配則是丁亥一日纔祭祖妣而已賈公彦謂大夫三廟少牢筮日止于丁亥則明祭無尊卑廟數多少皆同日而畢誤矣蓋祭祀卜日卜其首日而已若大夫丁亥有事于祖廟則其昭廟以戊子祭穆廟以己丑祭理宜然也且大夫室事不祼又無朝踐之事其禮固畧矣然而薦腥饋熟品其籩豆奉其尊彝修其簠簋遷其鼎俎陳其巾冪升降進退侑尸獻酬賓主百拜餕徹之序品節衆多假令逮闇而祭繼之以燭奔走趨事三廟一日而徧則雖有强力之人不能支矣又況天子禮具樂備品節之多乎然則先王之時各祀其廟無有一日而畢者也謹按王制曰天子犆礿祫禘祫嘗祫烝諸侯礿犆禘一犆一祫嘗祫烝祫鄭氏謂天子言犆礿諸侯言礿犆互明其文則天子言祫嘗祫烝諸侯言嘗祫烝祫亦互明而已也然則古者天子七廟四時之祭春祠各于其廟而夏礿秋嘗冬烝則三昭三穆皆升合食于祖故周旅酬六尸而仲尼燕居曰嘗禘之禮所以仁昭穆也若夫諸侯春亦犆礿烝嘗皆祫于祖而禘則一年犆一年祫下天子也明堂位曰夏礿秋嘗冬烝天子之祭也夫礿祠烝嘗諸侯類有之今魯更以為王禮又不言春祠者春祠特祭天子諸侯同故也其夏礿秋嘗冬烝則天子與諸侯異故曰諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿又曰禘一犆一祫由是觀之雖周春祠特祭而三時亦祫非特夏商之制雖然天子時祫纔及未毁廟之主而已至于三年一祫于是毁廟之主皆合食于太祖故謂之大祫言大以有小故也按文二年八月丁卯大事于太廟公羊曰大事者何大祫也毁廟之主陳于太祖未毁廟之主皆升合食于太祖榖梁亦謂大事者何大是事也著祫嘗蓋著猶别也三年一祫大于祫嘗祫嘗秋祭也今魯合祠太廟亦以秋祫故言大以别之也且天子七廟日祭月祀各就其廟三時皆合食于祖其毁廟之主則三年然後大祫亦禮之殺也由是觀之先王之祭有祫又有大祫明矣此自漢以來論者未之知也陛下聖學高妙徳蹈堯禹以操為驗以稽為決復千嵗之墜典實在聖時今欲八廟既立春祠各就其廟而夏礿秋嘗冬烝皆升合食于祖既應典禮又與舊儀四時八室並饗少近獨為合古之制宜若可行亦其七廟之主㑹于祖廟委蛇從祀優而不迫盛禮大樂得以備舉如允臣所議乞下有司叅定儀注施行陶山集巻六
