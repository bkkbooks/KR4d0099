body:
  text: 陶山集巻八宋陸佃撰表海州謝上表臣某言伏奉敕命除臣依前朝請郎就差知海州軍州事臣已于今月某日到任訖海濱相望路分不改舉家便幸荷國恩私竊念臣憂患餘生孤寒末族偶受知于神考嘗承學于真儒遭逢固稀顛躓亦速賴上恩之矜貸與外補以保全而況東海便州淮南善地鹽形似虎知威教之兼懐山色如朐信登臨之最樂未知報稱但有兢慚此蓋伏遇皇帝陛下道極聖堯徳兼神禹擇循良而共理撫逺近以同仁遂使孱虚得承匱乏臣敢不視民之憂若己當宫之事如家益勵前修更圖後效仙梯失足久違英俊之躔靈劑滅瘢尚冀聖神之造賀受玊璽表案哲宗紀元符元年咸陽民段義得玊印一紐詔蔡京等辨驗五月戊申朔御大慶殿受天授傳國受命寳行朝㑹禮此表文與紀合臣某言准都進奏院遞報五月朔皇帝御大慶殿行受寳之禮者降年有永傳國無窮俾熾而昌式歌且舞厥惟景貺兹謂興符臣竊以龍圖授羲寳鼎歸漢書稱錫禹洪範詩云詒我來牟雖並為前世之珍固未若今日之盛恭惟皇帝陛下繼志神考追功聖堯徳澤昭天而漏泉禮樂極高而蟠厚故地不愛其寳而天申命用休致仙鶴之珍羣發神光之佳氣盡扶景祚併效殊祥臣端遇明時側聞熙事九州建千七百國同極懽心三皇治萬八千年是為聖夀臣伏限守職在逺不獲躬詣闕廷臣無任謝復集賢殿修撰表原註元符二年二月先是有御批付三省陸佃復集賢殿修撰就差知蔡州今月十三日准進奏院遞到告一道伏䝉聖恩授臣集賢殿修撰知蔡州者愆尤一洗疑似頓明此生未終九死難報竊念臣蔓緒猶近聲鳴甚微蟲淫詩書鼠竊名器偶被老商之眄誤膺神禹之知夤縁遭逢驟致超越久叨塵于法從深辜負于明時容貌竊鈇已分甘于冗散面顔發赤但中抱夫兢慚敢圖聖慈俯賜昭察矜憐撫掩澣濯煩撋加秘殿之隆名付節藩之近服驚魂初定感涕交零此蓋伏遇皇帝陛下仁漸窮荒明燭幽隠賡揚前烈駕馭羣才遂令敗鼓之餘亦厠遺簮之舊青雲得路更尋英俊之逰白骨成人盡出聖神之造蔡州謝上表伏奉吿命授臣集賢殿修撰知蔡州軍州事臣已于今月某日到任訖罪戾至深恩私甚厚仁歸淪浹義在糜捐竊念臣早竊詞科久塵禁從進退不果建明無聞既辜先帝之深知仍昧古人之逺識合從廢斥尚荷矜容四扈推移已侵尋于老境九重清切但夢想于鈞天允賴聖神灼知蕪陋念臣才能雖薄猶是舊人察臣悔咎固多實非餘黨拔之末路責以後圖矧京右之名藩實淮西之樂土地生神草天在仙壺夫何賤疵乃爾僥倖此蓋伏遇皇帝陛下堯夀無極舜仁自然兆穜稑繁滋之祥臻魚藻愷樂之盛憫憐舊物收拾遺才遂使孤生得歸再造蟻子載粒敢萌過分之思鮫人泣珠難盡感恩之淚願收薄效少答洪私賀城西安州表案宋史哲宗紀元符二年五月建西安州及天都等砦疑城西安州即在此時伏覩進奏院報涇原路城西安州畢功者靈旗所指一方盡平鼛鼔弗勝百堵皆作張軍勢之十百收戰功之衆多廟社交忻寰宇稱慶竊以王命南仲往城彼朔方昔在召公日闢國百里聿追粹古允屬熙朝恭惟皇帝陛下穆若而文赫斯以武遵藝祖之遺業卒裕陵之駿功盡消猾夏之虞高邁懲荆之事一勞永逸甫臻偃革之期萬夀無疆願上稱觴之頌賀冊皇后表案宋史哲宗紀元符二年九月立賢妃劉氏為皇后時佃在蔡州故篇末有限共侯服云云伏覩制書冊立皇后者王假有家天立厥配宫闈欣奉海宇瞻儀臣聞易基乾坤禮重婚冠禹之興也則以塗山堯曰欽哉亦于溈汭載惟王道之易實繄母才之難若聖與仁以今準古恭惟皇帝陛下徳運而海内服身修而天下平以隂禮教六宫請玉女事宗廟又況雞鳴踐賢妃之戒熊夢發聖子之祥是宜正椒房之稱亞鬱尊之祼周召自北並歌風化之行伊洛而南具載采章之盛而臣限共侯服阻造王庭望長安之雲惟知徘徊于其下聴鈞天之奏不獲鳴躍于其間賀收青唐表案宋史哲宗紀元符二年九月青唐酋隴拶以城降詔以青唐為鄯州伏覩進奏院報收復青唐故地者持絳慮無匪俟行枚之出以紅帕首奄觀捷布之馳醜虜歸窮王靈大赫神人懽喜河隴晏清竊以魚爛湟中獸窮徼外葦苕顛覆桑椹變移爭奉𤣥黄之篚以迎王師罷持赤白之囊而撤邊警渥洼龍種致聖漢之所未來崑崙河源窮神禹之所不到自今伊始于古有光恭惟皇帝陛下用夏變夷以文經武高蹈無前之跡坐收不戰之功招徠降王羈致偽主臨殿閲武踵神宗之閎規御門納降講藝祖之故事方且卻走馬以糞豈云得白狼而歸而臣老見太平屢聞慶事前年星變已兆掃氛之祥明日夏亡更申奏凱之喜馬遷之網羅放逸副在京師韓愈之鋪張閎休薦之郊廟仰惟我后宜有斯人賀徽宗皇帝登寳位表今月某日伏奉赦書皇帝陛下登寳位者溥天率土罔不依歸大國小邦永有尊奉燕及郊望慶流社宗伏惟皇帝陛下緝熙昭明遵養潛晦雷雨之動蓄而未施乾坤之容衆所先仰慈孝極仁祖之道英睿有神考之風果膺天心式副民願而臣限拘符印阻造闕廷鳯躍龍飛是謂亨嘉之㑹鼇抃獸舞不勝馳嚮之誠謝吏部侍郎表原註元符三年二月伏䝉聖恩特授臣依前朝奉大夫試尚書吏部侍郎仍賜對衣金帶者買臣出守久慚印紱之榮季友來歸猥貳銓衡之重善衣紆紫寳帶圍金人謂遭逢臣知忝冒竊念臣書衣中蠧甕器底蟲雖力學麤有寸心除自守更無片善君臣際㑹荷神宗特達之知師友淵源覘王氏發揮之妙寖罹讒疾幾致顛躋一去國門十更年籥忽遘真人之出信知名世之興孰云虚孱首與收召此蓋伏遇皇帝陛下體堯仁孝陟禹儉勤日上九天春回萬物罷工作之非度損徼巡之無名徧雨曾不終朝太平適在今日臣敢不老當益壯久而彌新初心雖愧于前時晚節庶收于末境涓塵有補誓求報國之門掄選無疵願盡得人之路謝皇太后表伏奉聖恩特授臣依前朝奉大夫試尚書吏部侍郎仍賜對衣金帶者斵雕成樸甫觀聖政之新返絶以環猥與天官之舊善衣曳紫寶帶横金退省叨塵俯懐兢慄竊念臣中阿微草大道醯雞行未追于古人言無補于當世徒以遭逢上聖親炙大儒偶驟歴于禁途遂寖淫于拙宦一違天日十換星霜忽遘聖君之作興更繄神母之保佑漁樵駢首而談至徳耆老拭目以望太平孰云空疎首被收采此蓋伏遇皇太后陛下永懐謙畏暫濟艱難媧皇之補青天轉增具美娥母之為明月或仰餘光臣敢不貳正治官㕘稽中徳冰霜一節保清白之相承洛渭同流俾濁黄之自辨謝權吏部尚書表原註元符三年六月伏奉聖恩授臣依前朝散大夫權吏部尚書尋具劄子辭免奉詔書不允者吏部四選實畫省之劇曹尚書六聨蓋彤廷之上處不濡咮翼胡取囷㕓但負愧于稱鬚敢振矜于聴履伏念臣伐冰末族積雪寒生呻吟詩書匍匐步武食常併日偶未絶于昬昕馬固多年了不知其牝牡終縁樸學早玷華資久諳仕路之風波僅滿謫仙之年月面顔新皺謂老将至而耄及之蹤跡前逰則昔之甲者今果矣流光易失盛際難逢敢意誤知更容虚受此蓋伏遇皇帝陛下由舜慈儉克湯寛仁龍徳正中玉色温潤奉堯典常行之道蹟周官太平之書内釐百工外倡九牧遂令流落之後亦厠召還之中恩私頻煩資望淺竊臣敢不增增自勵俟俟相先上天之官府固多後世之文書雖廣願清吏治期盡人材六燕相亭試銓平其輕重孤鸞可照更區别于妍媸少著微勞仰酬殊眷謝充欽聖憲肅皇太后欽慈皇太后山園陵禮儀使放罪表原註建中靖國元年三月初少府監韓粹彦太常少卿李昭玘奉引木主入黄堂佃察視之乃空匣即按發其事又自劾失職有詔放罪昨充欽聖憲肅皇太后欽慈皇太后山園陵禮儀使為失㸃檢禮直官等擡空腰輿行等罪奉敕特罰銅十斤者罪大責輕恩深徳厚粉身難報感涕易零竊念臣生長寒鄉出逢盛際夤縁厚幸玷竊華資一昨憲肅因山欽慈復土仁聖昭格神靈䕶持雨暘為之調和嵩洛至于清潤何太常之迷謬仍少府之愆違而臣職在總臨失于檢察論辜應坐罪非可漏之魚懐懼實深奏有不全之馬卒䝉矜貸盡出生成兹蓋伏遇皇帝陛下上徳能寛至誠樂與虚成康之囹圄畫堯舜之衣冠委曲保全始終覆護姑從輕比止以贖論臣敢不淪髓知恩懲羮慎過玉瑕不掩已難蓋于前愆金鍊而精冀或收于來效仰酬洪造誓畢餘生謝試吏部尚書表原註建中靖國元年五月伏奉吿命授臣依前朝散大夫試吏部尚書尋具劄子辭免奉詔書不允仍賜對衣金帶金魚閙裝鞌轡馬者九重之深每疑于夢到八座之貴敢意夫真為寳帶垂魚華韉飾駿丘山加重蚊蚤甚微竊念臣嘉祐諸生元豐近侍久低徊于流落漸荏苒于衰遲忽因遭逢曲先收召曾莫成于薄效但有負于洪私而況周禮太平之書尚書百官之本粤新彝制尤慎詔除官至銀青僅能參其班綴頭如白雪或未入于詮評夫何淺迂乃爾僥倖兹蓋伏遇皇帝陛下舜功甚大堯性至仁文景不言兵戈成康幾措刑辟深懐記履慎付持衡猥令鴽鷃之卑濫冠鵷鸞之盛臣敢不扶偏用正去甚惟中雨鷇風胎顧難酬于啄抱山塵海霧願少助于崇深辭免尚書右丞表伏奉告命授臣中大夫守尚書右丞具劄子辭免未奉詔書伏䝉聖恩特降中使傳宣押臣赴閤門受告及都堂治事尚書省供職者蝜蝂不止将致疾顛蚍蜉自量敢忘微分幸未昬于榮利願終寫于精誠茍知不能何敢但已竊以弼諧之任上應台躔丞轄之司今為政府遴朝廷之任選具寰海之觀瞻故曰才難信為徳舉豈伊微昧敢預登崇倘反汗之無嫌雖還風而何害伏望皇帝陛下憫憐薄祜照察微衷知蚊負之難勝念駑疲之已試特頒俞㫖使免空官以全聖主知人之明以遂微臣量已之義謝尚書右丞表伏奉告命授臣中大夫守尚書右丞者風行不再知初命之難迴魄至于三愧終辭之莫遂召拜恩于上閤押莅事于中臺可謂光榮如何報塞竊念臣踐修甚苦遭遇最先早依天子之門牆曾侍先皇之簪履頃嘗失路久分行泥倦鳥回翔誰記不雙之譽寒龜退縮自深藏六之思兹蓋伏遇皇帝陛下文武聖神孝慈恭儉收臣于流落之後察臣于隠約之中父母愛憐天地包覆粤従執事迄至登庸莫知幸㑹之何由但愧糜捐之無所重念臣儒流迂闊仕路孤寒涉道未醇更事蓋鮮生長文字頗類蠧書之魚作為詞章僅同拆襪之線深知無用姑務有常敢圖制恩使預機政辛勤積累忽逮九層之高勉强磨礱試睎一割之用贊明先烈允蹈中行體君子之用心俾小人之革面仰承至意少贖空飱辭免尚書左丞表伏奉吿命授臣依前中大夫守尚書左丞仍加食邑四百户食實封一百户尋具劄子辭免未奉詔書伏䝉聖恩特降中使傳宣押臣赴閤門受告及都堂治事尚書省供職更不令辭免者忱詞雖罄聰聴未迴輒干鈇鉞之誅重叩冕旒之邃恭惟皇帝陛下徳漸窮髪刑漏吞舟行顧大中事惟至當曰求佽助使佛仔肩豈臣所知敢逮斯意茍失辭榮之義是迷知止之方惟伏素心冀還新命謝尚書左丞表伏奉告命授臣依前中大夫守尚書左丞仍加食邑四百户食實封一百户者立朝無補方抱兢慚坐席未温又驚昧冒丘山在頂冰炭交懐竊念臣數眯迂儒屢空寒士聚螢積雪初未識于道真種朮駕羊老安知于時務偶叨殊眷獲厠近司將少答于聖知姑暫妨于賢路敢期柄任亟被甄陞此蓋伏遇皇帝陛下道侔太虚徳備皇極諒隂之孝邁于高宗夢齡之祥紹我文考旁求魁傑共致丕平謂臣每懐永裕之威神頗識元豐之政事遂容冒寵試與圖成臣敢不在在勿欺常常匪懈賛紹􅒉而上下務柴立以中央私背之為公敢纖毫于異意忠貳之成患更砥礪以同心謝賜生日禮物表伏䝉聖慈以臣生日特降詔書賜臣羊二十口法酒一十瓶法糯酒一十瓶糯酒一十瓶秔米一十五石麫一十五石者生當盛際實千載之難逢仕至近司知幾人之能逮詔音單厚恩數實繁揆寵踰涯置慚靡所竊念臣性惟鄙朴材匪将明流落初歸微洛陽之半面侵尋已老俄甲子之一周敢意記憐曲加慶賚此蓋伏遇皇帝陛下義均家國禮厚臣鄰既優鑿御之陳仍備餼牽之賜雙親已逺永辜生育之恩三代可還尚冀弼諧之效辭免冬祀加恩表伏奉告命授臣依前中大夫守尚書左丞進封吳郡開國公加食邑七百户食實封二百户者日以至而始郊漏當午而大赦受福上帝加恩羣臣冀逃虚受之慚敢布縷辭之義竊念臣不材病櫟無字頑碑偶備四隣之間濫陪五使之後雖駿奔之有恪曾顯相之無聞式造在庭而多與邑自知明甚誰謂當然伏望皇帝陛下移日月之明回乾坤之造亟還茂渥大示至公成禮䑕之能辭庶恩魚之可報謝冬祀加恩表伏奉告命特授臣依前中大夫守尚書左丞進封吳郡開國公加食邑七百户食實封二百户者至治馨香屬肇禋于有昊湛恩汪濊遂洽比于無垠猥令虚孱誤玷優渥敘封而光祖考延賞而茂子孫已極戴天更容加地恭惟皇帝陛下網羅漏典斧藻上儀曲禮三千駕龍十二氾掃反道務極于平夷戛擊鳴球期深于感格菲食追禹藜羮紹堯既卻輦而疾趨又虚次而端立是以於穆清廟始雪而終晴爰熙紫壇下風而上靜歡聲載洽慶事告成欲均被于神禧故隆施于聖澤又況修明初祀錫予近司象笏䓞袍副萬釘之寳帶繡韉金勒兼千古之名駒甫及駿奔終微顯相咸被食加之寵獨懐代匱之慚尚誓同寅克膺殊奨亳州謝上表伏奉告命罷尚書左丞依前中大夫知亳州軍州事仍放謝辭臣于今月初四日到任訖噬臍悔過空形何及之嗟刻骨知恩實抱未酬之恨追惟遭遇辜負盛明有靦面顔不勝涕淚竊念臣徳非稱驥材不中輪忝侍臣鵷鷺之間綴太史馬牛之後曾微補報居足悔尤既累誤知之恩復迷引避之義合從擯斥尚備承宣此蓋伏遇皇帝陛下成湯克寛大舜純孝嘗奉冕旒之邃每聞金玉之音有所施為無非慈恕誰言春草能報照臨之私自知秋毫盡出生成之力擢髮不足數賈罪猶冀自新雖天無以喻堯仁敢忘胥戴願圖來效式葢前愆謝賜崇寜二年厯日表案佃以崇寜元年五月罷此表當在亳州時上鳯凰適至方瞻享御之休螻蟻甚微亦荷匪頒之賜恭惟皇帝陛下先天凝命紹祖膺圖氣逰玉燭之間政在璇璣之上三年成葉知洪造之難名十月書螽愧閏餘之易失九功惟敘萬福攸同臣敢不儀舜丕彞體堯至意載祀六百頌永世之休祥弼成五千奉敷天之正朔陶山集巻八
