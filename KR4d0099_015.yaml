body:
  text: 陶山集卷十五宋陸佃撰志銘石子倩墓志銘子倩諱徽之姓石氏越州新昌人祖渥渥生待用纍贈工部侍郎四子其三皆承學而子倩獨秉家政侍郎憐之以養吾志故廢學一日出金帛與之曰鬻此可以得爵子倩謝曰孝于父母友于兄弟是亦為政何必仕爵以資取徽之不願也為人恭儉父兄在不以私恩掠譽貪人每不快欲得飛禍中之而創詞未能也久之家奴戎吉者誣主金榖利多自與訴于州是時太守張公伯玉初惑讒慝而疑子倩戒獄吏嚴甚子倩至曰盜憎主人此奴易曉欲誣徽之以釋所負耳即出家籍示守其綱目明白不欺如官府卒坐吉于是鄉黨稱其廉也初娶王氏早卒再娶陸氏吾姊也才且賢伯父琪惜其為女子為擇佳配以嫁子倩子四人景舒景愈景完景洙女三人長適鄉貢進士卜彊本次適鄉進士傅質次在室景舒與諸弟昔嘗從豫在太學見其粢食不美夜分寒燈熒然欲減其光映書兄弟共之而寢臥才半榻偃息蓋遞焉刻意堅槁甚于寒士以此知吾子倩治家有節訓子有方矣今方病吳越之俗多浮夸傖子借名于儒而橫用家資如水千金之室至以讀書破業者有矣則石氏勤約之風不可以不多也然而諸子應舉數竒或人唁之子倩曰得之不得命也吾如彼何哉强為善而已矣春秋五十有五病革問日之早晚曰曛矣于是即化實元豐元年五月甲子也遺言乞銘于豫而諸孤卜以某月某日葬于豐樂鄉梨塢之原以王氏祔焉余義不得辭銘也銘曰水之意如慕山之容如即孰則居之子倩氏石以燕嗣子以燕爾域助教傅君墓志銘揚州傅君諱瓊字君寶淮之南善士也居鄉有宏量隱德一鄉稱長者遇人無素游偶際常喜動顔色或欺而侮之不愠也嘉祐中朝廷募民入粟君以應募賜助教熙寧五年正月十三日卒以三月庚申葬其墓在浮山之原方君病時里閭多為之憂問病者屨常滿門既卒矣又多為之悲也享年四十有九將葬其孤豫赴以龍浩之狀訴焉而乞以銘豫有美志讀書知慕師友與當世學士大夫逰而吾逰之舊者也欲因余文以顯其親于後余屢辭焉而不得故為之次論云蓋君非學者也而柔良好善特出于本真故其所養仁心常勝于義德而處己與人時有不當于理者然未嘗失于薄也蓋孔子所謂茍志於仁矣無惡也若君者似之矣娶王氏又娶陸氏子男三人長曰昭次曰舒皆早卒而其季即豫也女二人長適杲案杲字上有脫文孫三人長曰兌餘皆尚幼父億大父義曾大父旺三世者皆不仕云銘曰工相方匠營阡卜龜長筮蓍圓肇厥居尚不騫志賁之於萬年傅府君墓志高郵傅明孺諱常攝揚州助教瓊之第二子嘉祐治平間與豫同硯席共敝衣服無憾也是時明孺尚未冠豫亦年少耳淮之南學士大夫宗安定先生之學豫獨疑焉及得荆公淮南雜說與其洪範傳心獨謂然于是願掃臨川先生之門後余見公亦驟見稱奬語器言道朝虛而往暮實而歸覺平日就師十年不如從公之一日也既歸明孺驚曰自今事兄矣豈曰友之云乎然豫亦不自讓也憩其館纍月食客以豫故日嘗數十人助教禮數益隆無倦容厭色逮豫遭遇神考既躋侍從而明孺喪親生事日窘急不復積精問學矣雖有良質美意不能充也元豐中過我京師豫勉之曰夫青出于藍而青于藍故學而能過其師者有矣昔子質美于豫今更弗如是不學之過也明孺嘆曰老矣不能復進于此願教子如公教且傅氏多隱德若隂報不昧後當有興者請名子興祖興宗興嗣曰此其所以志也居久之豫守金陵過其家明孺既卒矣弔其孤而哭焉見其卒時自為偈有風掃落花之語是亦達者也享年四十六嵗娶王氏早卒其娣沈氏生三男六女女四人已嫁其長壻進士章忱明孺自擇也家事賴其經理頗有緒云興祖能自樹立蓋傅氏父子積功纍善其鍾將在于此明孺以元祐七年四月甲子卒以紹聖三年四月甲子葬墓在揚州天長縣亭午鄉助教之兆云卜君墓志銘湖州樊澤卜居士者名之先字知幾自號無知子西河子夏之後也曾祖漢祖君寵父彥忠居士為人剛介不可犯事親孝嵗時祭祀思慕輒涕泣平居清約喜閒曠視世味淡如也出遇勝處有泉石松竹之秀一觴一豆未嘗不竟日少時頗讀書知古今晚更學佛能以理自廣談宗㫖教相雖律師禪伯不能屈享年七十有五卒時不怛亂凝然正坐實紹聖二年六月丁丑也娶任氏前十年卒四男子謀亦早死彊本端本復本彊本從豫逰有志尚與其弟為學皆甚力四女子適沈達顧庠蔡潯石景禧孫男女十有七人景禧吾甥也彊本吾娣之壻擢進士第今為潭州右司理參軍越十月墨縗自吳興趨江隂涉海取徑道走海陵乞銘于豫且曰祿以逮親為適今大親已矣願請銘以慰風樹無窮之悲一不從請再再不從請三三不從請四請五期于得請而後已豫以故不能違也葬用十有二月乙酉墓在烏程麻谷之原以夫人任氏祔銘曰發為昭明氣在天蛻為塵垢魄在泉生必有死自古然兒女變換陵谷遷蜉蝣一日龜千年等歸于盡疇後先妄人剛欲睎神仙黃金難就煙飛鉛蓬萊杳茫風引船善哉居士投真詮能視死生如蛻蟬睥睨麻谷期終焉殷勤自種柏已圓下無螻蟻上無鳶珠璧璀璨星月懸作詩瘞之和之前玉石可軟刀可鮮鸊鷈磨瑩蟾蜍鐫尚兹寶字崇完堅朱府君墓志銘暨水之陽有潛德曰朱君者諱瑩字文玉蓋古人所謂鄉黨自好者也為善于家養父孝教子義鄉人以為法熙寧五年卒于十有二月丁酉葬以明年九月丙午其墓在白隔之原王氏塢享年四十有九娶陳氏子三人曰戩曰祺曰佑曾大父綰大父亮父昉三世者皆以農自業而昉敬因果輕財樂施與有善緣率常唱其鄉人君以乏無供其求能不逆其意慶厯中仁宗皇帝以善養天下開設學校申敕學者去浮華而師道盛于東南士子多吳越之秀君于是時知改向而迫迫未遑也以其長子教之曰學吾志也吾方耕且養日月數矣二者不得兼汝戩其成吾志戩有懿行淳淳惟謹似不能言者善述君之志徒步千里以睎大人君子之遊其淵源蓋逺矣而與豫尤相好也豫雖不及識君以戩卜之不問可知為令人矣其里人張堅適道吾知其論篤者也今又書其平生之行來乞豫銘其可不銘哉銘曰藏有新宅墓有新塋厥初相攸曰戩是營戩也永懷曷畀其寧敷是幽光則志則銘譬彼長夜有嘒其星引而升之久視益明長夀縣太君陳氏墓志銘士有百行可以功過相除又有朋友故舊與其賓客為之譽歎故其積善在躬易以光顯至于婦人女子則惟以貞信為節又無外事在深閨隱屏之中非有純德至善不能著聞于世譬如玉煙珠氣必久而後能見其潛光養晦非一日也幸而得之可不為之貴重而愛惜歟故余每聞女子婦人之志操而樂為天下後世道者以此也矧若夫人者潛德隱行珠圓玉潔其光美蓋久而著見是宜貴重而愛惜者也故與為銘夫人世莆陽人祖諱允考諱賞蓋漢陳實唐陳嶠之後為人妻盡妻道為人母盡母道良人徐氏子諱某既窶且貧又不幸早世有子銑鋭鎰鐸并其二女以委夫人方兹時銑才成童鐸猶在懷抱夫人守節不嫁提攜鞠育卒能使子立而女行為孀遺門户之法熙寧中天子策多士鐸遂為第一而鋭亦登科釋褐同歸拜夫人堂下鄉里咨嗟歎息後十餘年鐸為朝奉郎鋭為奉議郎于是鐸封夫人夀光縣太君鋭封夫人長夀縣太君福祿夀考報如其施然而夫人衣服雖敝舊猶服子以為言夫人曰榮養雖爾祿也知其所愛吝亦吾福焉享年七十有五及見孫十有三人曾孫一人元祐二年正月某日卒于京師某年某月某日葬于莆陽某山之原鐸有學行六年博士足不數公卿之門其言動淳約尚如布衣時與余特相好也而鋭在官聞亦有政績云銘曰維性之無愧兮齊女之所畏兮匪可畏也亦可跂也維命之無憾兮夀母之所願兮匪可願也亦可憲也趙氏夫人墓志銘夫人氏趙嫁鄭氏夫曰惇儒字景真有才氣丹陽竒男子也少則卓越勇于敢言敢為世莫能知焉熙寧中為筠州録事參軍以死夫人相參軍盡妻道保其子夷甫夷行夷庚及其二女盡母道夷甫封州夷行溫州軍事推官夷庚早卒女歸楊濟趙鍇而鍇之室夫人出也其撫掩矜憐與諸子等有鳲鳩均一之風年六十有六元豐七年二月甲午卒十月乙酉葬穴在丹徒石馬山參軍之兆王父乂纍贈都官郎中父鼎虞部員外郎纍贈工部尚書夷行有志行其在貧如客事夫人能盡其孝道銘曰北一為丘案此句原本無一字考說文丘從北從一此句蓋用其義今據增死以為域如行得歸枕之用息惟休在斯言示無極長樂郡君賀氏墓志銘夫人蘇州吳縣居士賀倣之子唐祕書監知章之後也為兒時不類諸女嘗遇相者曰女有角犀貴人也居士隂竒之以歸今正議大夫程公師孟是時正議尚布衣夫人才二十矣齊德合善一家之人以為宜未幾正議以文行中甲科稍登顯仕知南康軍兩親尚無恙夫人承其適設酒醴從正議鴈行前為夀能得其歡心逮其亡也葬祭之皆如禮平居性甚約瑱象之飾不隨時好輒變易正議之為廣州也夫人曰南海珠貝百貨之府廉吏至此往往以家自纍失其趨操吾夫庶幾有終始者乃飭家人水火不交于民久之正議治成上嘉之自光祿卿遷諫議大夫賜紫再留及其去橐中蕭然如迎日其清如此蓋夫人之助也享年六十有九纍封長樂郡君元豐六年七月辛亥以疾卒疾甚不怛亂盡施奩中物市田贍其墳之寺嵗以度僧一人越明年三月壬寅葬墳在桃花之塢子十有一人寬少登科十年不仕有大志明當世之務上即位詔求直言獻書辭數萬考在第一未及用與其弟七人皆早卒惟三子在容開封府陽武縣丞宏真州軍事推官視貴高意氣不少貶稱其家兒也純叟承務郎尚幼女二人長適郊社齊郎郭鈞次適潁昌府長社縣令陳廓孫男女十有二人嘉祐中余以童子從吕宏學適連居士之牆吕嘗指居士曰吾里程侯與是翁咸有吉德號吳中二善是皆宜有後者程今有子賀有女配焉天之報施將在于此後二十餘年正議以給事中集賢殿修撰代今少保趙公為㑹稽守余其邦人也始識二公退聞父老歌其政化有雙燭之諺蓋少保以慈正議稍濟以義而州皆治皆繪像祠之既聞夫人家政之善雞鳴而興朝其妾婦有君臣之嚴與正議終日莊語如賓未始壞坐也門內之治與門外爭肅及正議罷青州謝其政而歸為第于晝錦坊甲鄉里夫婦白首同堂族姻慶賀嵗時以百數爛然盈門觀者歎息福祿夀考實受成報于是吕之言驗矣銘曰無善不報報無常所程則在子賀鍾之女有培爾華爾果則碩二姓侯興恂善之力言告而鄉而黨而族自考徂祖尚鴻厥福㑹稽縣君吳氏墓志銘朝奉大夫陸公佖有夫人曰吳氏龍泉人殿中丞瑴之女于佃皇考為冡婦于佃為丘嫂在父母家事親孝自家而出資以為婦而順以之為嫂而恭大夫窶且貧夫人能以有無相補祭祀賓客爨竈有容不譁而具豆豐爼碩人往往誤意室中之藏建中靖國元年十月甲子卒如寓得歸脫然就駕蓋學佛之力然夫如喪良朋友子如失嚴師傅垂髫之孫戴白之婢哭之如哭其母享年六十有四封君仁和㑹稽之邑子表民榮州司理參軍充都大提舉汴河堤岸司勾當公事長民太廟齊郎三女子適進士王珙試太學正吳孝能承事郎僉書漢陽軍判官㕔公事周熊孫女三人男一人紹兒卜以某年某月某日葬于某縣某鄉之原銘曰水歸其壑土反其宅乃今息已久矣其為客仁夀縣太君吳氏墓志銘太君建陽人吳氏之幼女陸氏之長婦父尚書職方員外郎諱植夫尚書吏部郎中直昭文館贈諫議大夫諱軫夫人二十為母有母道三十為姑有姑道四十有九而老八十有六而卒纍封仁夀縣太君及見曾孫娶妻生子于婦為曾祖姑于孫為高祖母平居視聽不衰心志不耗飲食不哽不噎四德修而五福備諫議學道鍊丹辟榖而夫人學佛雞初鳴起誦經至日旰乃已蓋更數十寒暑精進如一日也元祐六年八月辛卯以疾卒明年十有一月壬辰葬其墓在上龜山望諫議墳百許步男琪袁州萬載縣令圭國子博士女適內藏庫使牛沿尚書虞部郎中楊沆皇城使王從伾孫儼宿州符離縣主簿佖右朝奉郎通判楚州佃左朝奉大夫龍圖閣待制知江寧府傳左奉議郎僉書鎮東軍節度判官㕔公事倚杭州餘杭縣尉伸鹽官縣令孫女一人曾孫男女二十九人𤣥孫四人夫人男女皆已先卒孫儼伸亦亡矣今承重者佖也佃為之銘銘曰以孝為慈以悌為友義以為榮仁以為夀凡百為女為婦姑母曰求爾法我家則有王氏夫人墓志銘夫人越州蕭然山人三司鹽鐵判官王公諱絲之女袁州萬載縣令陸公諱琪之妻于先祖為冡婦于先考為丘嫂君姑吳氏今為仁夀縣太君元祐元年仁夀之夀八十夫人七十婦姑同堂為嵗百有五十一門之內實具五世鄉人嵗時窺園見高曾二祖姑映花微步曾𤣥隨之龍眉翠髮超然塵外以諫議家真神仙也諫議學道錬丹辟榖隂功著在人間明年佃迎仁夀始來京師耳目聰明尚能貫針審聞細語如平時又明年夫人亦隨子之鹽官官舍居無何夫人得疾十有二月甲子遂至大故報書至仁夀哭之慟且曰死生安可期吾耄矣豈知反哭者爾也傳曰父不喪子兄不喪弟此和之極也頃以為然今徒虛語耳夫人為家有統紀執術不煩薰然孝慈而衆行從之故其卒也側臥而蛻如佛所謂吉祥睡者二男長曰儼宿州符離縣主簿次曰伸杭州鹽官縣令女嫁進士石徽之孫男女十有二人今在者八人宇郊社齊郎宏完察實季女泰女六皆尚幼又明年甲子合葬夫人謝野萬載之墓儼伸事夫人皆孝謹而儼不幸早世今能送終者伸也銘曰藏于斯慕于斯以昌其後于斯王氏夫人墓志銘夫人王其姓密人也曾王父王父父曰浣曰仲卿曰度浣尚書駕部員外郎仲卿太子左贊善大夫度太常博士夫人十有五而笄二十而嫁嫁為束氏冢婦天資仁儉能安束氏之貧不以衆多為侈內自宗族外逮婚姻下至侍兒婢子牛馬之走稱其淑德懿行同然一辭故能以禮贊其夫以義成其子夫稱老成子云令器平居有逺慮達識惡阿諛喜忠鯁胸中白黑明甚聞士大夫賢否必曰某某可親某某可逺後成敗當如是後信如是也夫正卿今為朝散郎通判邢州子長孺朝孺朝孺亦有美才不幸早喪長孺今為涇州録事參軍蔡州州學教授二女子長適進士姜規卒季適進士徐驤孫二人毅彀孫女三人長適進士李翰仲季在室夫人封夀安縣君春秋六十有八元符二年以九月甲子卒以十有一月甲子葬葬在鄆州某所皇姑之墓次方夫人疾時長孺侍加一飯損一衣皆脫然小愈居無何長孺被檄西京考試規免焉而不得在試闈中母子精誠相通發于夢寐長孺曰懷歸私恩也靡盬公義也君子不以義妨恩今事有甚迫情有至極我其歸哉于是請急兼道而歸夫人見其歸失喜噎嘔為之力進粥藥嗚呼人誰不死有子如是雖死可以無憾矣銘曰斯人也而至斯也即歸咎有所可勝責耶夀安縣君張氏墓志銘朝請大夫提舉三門白波輦運褚侯之室夀安縣君者張諱隱之女也元豐三年閏九月朔以疾卒于夫之官舍嗒然坐逝無所畏怖蓋夫人旦輒蔬食讀西方之書見其理前此一日筆句偈于金榜之上以謂佛須心解而經不必多讀其蛻于腐餘如此竊觀世之妄人酣于世味如醉者之魘以贋易真雖警不寤者衆矣而夫人之寐何其易怛稽佛之力是豈不足為多耶春秋六十有七律己清約主褚氏祀四十五年考其所以勵相大夫字其子孫友其娣姒臣其僕妾可以為法則三男子唐輔唐彥應進士舉學行甚修唐輔登第今為處州青田令幼曰淮兒三女子其長早卒一嫁進士丁址一嫁進士王然大夫名珵所至有愷悌之政與豫俱越人也將以其年某月某日葬夫人某縣某山之原乃來速銘銘曰生也有誥以錦韜軸死也有銘以蟾瑑玉誥傳之家銘閟之穴嗚呼夫人兹謂不滅王氏夫人墓志銘夫人王氏者諸暨同里俞君諱擇之室擇居鄉主忠信讀書略通大㫖夫人齊之為婦若母若為威姑皆有賢行其言之出又多顧禮不妄與上言言慈與下言言孝故其言行之修以積久化其子孫施及鄰里鄉黨而義安之間女愈愈婦姑無勃豀者君子曰玉在山而水潤其信矣夫人春秋七十生堅稔確磷砥磻六子子又生方亢彥燮兗京裒交衮永云褒十二孫孫又生曾孫三男二女子稔與其父皆早卒夫人宅孀遂専家政維子若孫各付之職曰確汝其營花山之業曰磷汝為産中浦曰砥汝為産白門曰堅汝為鼻子其總綱領無逺吾側曰磻汝與孫方亢彥遊學四方維其所之以昌而家方兹時子孫旺長爭迪兹訓俞氏遂為望族熙寧九年先考棄諸孤尸仙濠上某也抱巨創之至痛迎棺東歸卜塋寶峯之南蕭然故廬寢苫待盡夫人高吾義遣方買鄰以居曰是其諫議隂德之後克紹其門者又嘗問道真儒盍往歸焉方從豫游為學知所先後蓋將求心之解非若淺丈夫汲汲于外以睎世利而已夫人頗竒之撫愛異甚視其所愛又有以知夫人也元豐三年以七月己巳卒以閏九月壬辰葬墓在潘塢東山其夫之兆曾大父某大父某父某銘曰婦也琴好夫雉之剛克成厥家在暨之陽善不于躬亦于其鄉有巉斯石尚賁幽堂夀安縣君王氏墓志銘江淮荆湖兩浙制置發運使少府監廣陵孫君之夫人夀安縣君太原王氏其自滄州之清池徙河南世有顯人太府卿諱某者皇曾祖也庫部員外郎贈禮部侍郎諱某者皇祖也屯田郎中贈吏部侍郎諱某者皇考也至夫人諸兄亦皆為郎尚書而多以材藝稱當世夫人好讀書善為詩靜専而能謀勤約以有禮吏部君愛之而尤以擇所嫁于是少府君為大理評事簽書淮南節度判官㕔公事以夫人歸焉皇姑曰自是兒有婦內外族人加親而吾食寢甘焉少府君材能為朝廷所信以至休顯其盡心外事不以家為恤者以夫人為之內也嘉祐四年某月某甲子夫人卒年五十三明年某月某甲子葬揚州之天長縣博陵鄉皇姑之兆子男二人某某女六人一嫁蘇州節度推官毗陵張誨一尚幼四先夫人卒銘曰朅朅少府有儀有聲誰相其祁以迄休成維王淑女順婦慈母內諧尊卑燕及婚友錦韜象軸告命之華序章爵邑維榮有家方大茀祿以宜寵服嗚呼其徂葬有吉卜王氏夫人墓志銘夫人衢州王某之女鄭君諱某之妻有女德婦道居家以慈孝聞生七子襄卞亶褒衮云方襄嘗預計偕而褒云逰吾門其文行皆可喜而云從豫最久愛其進學駸駸如驟有足以起豫者元豐二年佃承乏資善招之使逰闕下夫人喜甚眷眷問云行期曰吾老矣豈不欲汝長在目前顧爾就師學有所進雖隔千里聲問時至猶謦咳吾側也茍為索居問學雕落雖不出户庭溫席凊枕視寒暖之節豈吾所樂哉自云之西夫人常秉香火以祁豫夀蓋其嚮仰之風如此明年三月十有一日朝步庭下猶折花引孫為戲晝得暴疾將逝無所怛惑徐曰云獨不覩吾化然其師學得地吾與兒雖永訣皆可無憾也享年六十有六孫男十四人孫女十九人曾孫男女三人卜以其年九月朔祔于北郭龍塘西園其夫之墓噫夫人之達雖能以義自廣可謂賢矣而云之抱痛未易忘也讀書甚苦斗升之祿未始云獲東歸逮門而夫人既死蓋棺久矣嘗聞其鄉里晉王質者小停石室視二童子棊甫終質起顧斧柯爛盡既歸無復時人以云觀之挾策讀書歸失所恃故吾浪在而昔歡非矣悵然四顧徒見山高而水深與棊之換世其有辨乎其無辨乎嗚呼去劫易盡此痛無窮是誠難忘者也然則不銘何以慰云之思竊觀周衰變風作而泉水載馳之詩出于婦人其言之美雖當時搢紳先生不能二也每恨後世一盛一衰中間嘗更平治而婦人女子何以理為循者少而惛悍者多也宋興祖宗造邦戡定以武真宗仁英休養生息其仁如天而德澤有衍矣聖上收之日趣堅成以躋禮樂譬如五天更王木敷金斂纁夏𤣥冬各以其序至而萬物竝遂方兹時天下竒男子往往間出獨淑婦者猶寂寞而罕聞及得云母所為乃知德化之美有二南之風其在下州僻陋之邦賢若夫人者有矣豫獨不能盡知也銘曰鳲鳩平均仁七子兮六子在榛其一西飛路逺翎短不能遄歸旋失所哺其鳴孔悲幽幽故山舟壑潛移城郭雖是而人也非嗚呼已矣矢此銘詩陶山集卷十五
