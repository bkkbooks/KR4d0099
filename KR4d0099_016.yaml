body:
  text: 陶山集卷十六宋陸佃撰志銘盛氏夫人墓志銘夫人姓盛氏和州人生數嵗工部侍郎李公虛己育之及長李公季女歸于山隂尚書屯田傅郎中瑩夫人往媵焉夫人婉娩聽從不事華靡而居家忠能動其上恕能化其下一家慕之李早世傅公再娶謝氏號永安縣君夫人移所以事李者事之永安歸寧嘗與夫人偕而陽夏公絳歎其詳淑至引其賢以訓飭左右且謂傅公曰家有三美主君仁明而其妻良而娣又良也今之學士大夫罕得而兼焉惟公得之全傅氏其殆興乎生二男一女曰傅師傅中女適鎮江軍節度推官王淵孫男四人廉卿溫卿毅卿願卿孫女一皆幼傅師傅中有文行應進士更為舉首安貧樂義蕭然隘巷而弦歌之聲弗輟也夫人恃之樂以忘憂嘗曰吾觀世人金多鼠壤有餘肉而往往兄與弟鬩子與母鬨雖享三牲不下咽矣以彼易此吾弗許也蓋其母子之賢如此後寢疾醫來輒命遣之曰弗活矣靈丹不能起無命雖欲救曷濟也享年七十有一以熙寧十年七月壬戌卒以元豐元年七月壬午葬其墓在會稽五雲之鄉將葬傅師傅中以施君渥狀請銘銘曰死其散耶生其聚耶夭夀其専于數耶疇斡旋是疇佛仔肩而行是夢者為覺乎覺者為夢乎夫人知哉杳難問歟嗚呼已矣燕此新居鮑氏夫人墓志銘夫人溫州永嘉人出鮑氏歸侯氏太常少卿諱軻之女尚書屯田郎中諱正臣之妻天性警悟所習無不工早失母而祖夫人春秋已高諸弟尚幼夫人事大母如母處家事悉有倫少卿尤鍾愛既嫁事姑如大母雞鳴而起率至夜分就寢姑意有所欲未及言夫人輒先意而至平居于財無所愛吝以資奩嫁族中女數人晚年自奉益簡儉視世味甚薄每晨興惟誦佛書雖久弗懈疾且革合掌焚香稱諸佛名號乃卒實元祐七年十月甲子也享年六十有九纍封仁夀縣太君將以明年十月甲子即郎中墓而合葬之在杭南陽驍龍山子需早亡臨右宣德郎開決二浙積水渙蘇州長洲縣丞觀舉進士兩至禮部壻溫州進士張存南劍州順昌縣令張拊安州録事參軍監杭州鹽官縣鹽監郭汝嘉右朝散郎知隴州趙亢婺州觀察推官張伯昌孫男女十有四人臨非夫人出而夫人撫視之如同生莫知其異出也臨亦篤于孝敬事夫人與他子等每夫人疾病皆不出卧內殆廢寢食母子之間慈孝兼至人莫不以為難夫人獨曰慈孝相應之行爾此以慈往則彼以孝至亦報施之道自然之理也臨當官強敏兼之威惠嘗為剡宰剡人至今思之又嘗為信守信人思之如剡蓋良吏也二弟亦佳士余為給事中嘗薦臨宜備朝廷器使今臨歷任寖顯名卿巨人雖多知之然皆莫余先也銘曰嗚呼仁夀而受斯邑仁則是矣夀止于斯耶仁夀縣君鮑氏墓志銘夫人姓鮑氏開封人幼有至性五嵗侍母病不解衣下榻族人竒之及笄父從周以歸直翰林醫官院張君昭式逮事舅姑其孝不衰焉為人恭儉衣服帷帟之具取潔而已熙寧九年以慶夀殿推恩賜冠帔後四年封君于仁夀縣及後五年二月戊寅以疾卒生五男三女子二已嫁男曰應年早世其次博古好古信古知古好古今為翰林院醫官以方術世其家博古為進士學有根本屢試禮部能不以科舉為意從余逰蓋久嘗得遺金輒訪遺者還之余每歎其行而今紫微蘇公亦以辭學稱之曰是必能大其門者也信古娶竇氏亦有孝行方夫人病刲股者再焉由子若婦觀之則夫人之母道及其為姑可知矣故與為銘使概見後世且祔赤蒼其夫之墓實元祐元年五月二十八日也享年五十有一銘曰得封以夫得銘以子匪耀其生亦光其死夀昌縣君陸氏墓志銘夫人夀昌縣君吏部郎中直昭文館陸公諱軫之女右諫議大夫集賢院學士楊公諱大雅之婦二公者信道深篤為宋醇儒在真宗仁宗時逡巡內官有靜退君子之風而其意嚮莫逆也于是遂為婚姻夫人習于兩家之善女德婦道咸應禮法家人宜之方斯時舅沒姑老蓋內政屬焉而閨門諧嬉姑從婦聽薰然慈仁翕翕一堂之上而使人之鬩也消可謂賢也已矣熙寧九年二月初七日以疾卒于蘇州享年五十有一三男子曰上卿信州上饒縣尉曰客卿舉進士曰列卿尚幼六女子長適睦州桐廬縣主簿程容次適婺州永康縣主簿吳師復次適試祕書省校書郎程宏餘在室卜以元豐元年二月十六日葬于蘇州吳縣長洲鄉官山龍師塢祔其夫虞部郎中諱沆之墓上卿以銘屬我夫人吾姑也知其褘懿為詳莫某若者然則非某其孰宜銘銘曰以所願乎下上以嬪乎姑以所治乎內外以媛其夫春秋承祀蘋藻靜嘉芼之湘之薦徹不譁示我壼儀克堪厥家猗歟夫人特女法耶蔣氏夫人墓志銘金壇蔣氏者其父諱郢春秋七十又五元豐三年以季夏癸丑卒以季冬庚申葬墓在登龍之鄉其夫潁川府君積中之兆男四人孟曰獻臣次衮次亢次京孫男七人孟曰廓次度次庶次賡獻臣早卒其三孫未名女五人孫女五人曾孫男女五人夫人立德不驕不吝無所専妒資于事父以事舅而舅曰尊我資于事母以事姑而姑曰親我又能以義相其夫以仁道其子舅姑既沒府君實賴夫人經理其家蓋事常豫立問奴以耕而非春鳴之所驚問婢以織而非秋蛬之所促卒以積日纍勞殖陳氏之宗其後府君棄世夫人春秋高矣方兹時亢耕兗學廓度庶賡亦舉進士已而廓度相躡登科朱丹其門實遊吾館廓頗朴茂度也翹俊可喜釋褐東歸拜伏堂上夫人蓬然白髮玉雲可鑒視二孫之立青袍凌草邑閭榮之熙寧嵗在單閼勾吳大飢夫人令子為食于路與里之飢者又壝其地以掩暴骼數千百人君子聞之不多其子而多其母也廓今為江寧府句容縣主簿度試祕書省校書郎齋戒授書以狀乞銘于豫且曰吾母生于遐方晦里無爵位名號光顯以死當得君言以信于後余悲其意不得而違也銘曰婉娩玉女姤我金夫嫓德合善以同而車克生孫子珠璣在庭勿憚勿投慎垂之旌庶幾有傿以妥厥靈孫氏夫人墓志銘夫人孫氏蓋淮之南賢女子擇對不嫁至年二十五而歸喬氏嘉祐中卜鄰而處在高郵玉女鍊丹井少東數十步御家有常德推以孝慈而百善備平居言行皆可從迹自其為婦訖于為母家人欲指其過而不得又少崇佛甚謹雖白首猶躬自滌濯具香火然非有所怖而求福也皇考諱護子曰執中師中執中今為尚書吏部郎中師中郊社齋郎吏部篤厚君子也郊社亦良士乃豫布衣時師友實聞夫人之行舊矣距今閲二紀而夫人年八十有七見子有孫孫又有子醇德美道與年俱尊其惠澤不獨成其子之賢而又以其餘善其宗族鄉黨豈所謂河潤九里珠生淵而崖不枯者耶吏部既貴夫人四受封邑元祐二年正月某日以夀安縣太君卒于京師二月某日其孤泣血徒跣扶其柩歸葬于揚州三月某日遂祔其夫光祿寺丞諱某之墓銘曰為女斯女為婦斯婦有婦而姑如其為母誰畫之圖或書之史曰求女法將在于此陳留郡夫人邊氏墓志銘故觀文殿學士孫威敏公夫人邊氏者其先楚丘人祖諱肅樞密直學士贈兵部侍郎考諱調兵部郎中贈開府儀同三司夫人十有七嵗歸威敏是時公為祕書丞監高郵軍酒明道二年以南郊恩封金城縣君明年公為監察御史裏行未幾以言事謫監永州酒夫人方歸寧報至家人皆驚惻以航重湖為唁夫人獨慨然曰丈夫為國以忠義得罪無所愧恨重湖雖險安之若命可也慶厯八年公為龍圖閣直學士環慶路經略安撫使知慶州以南郊恩進封仁夀郡君皇祐四年廣源蠻儂智高反據雍州朝廷倚公討賊乃除廣南東西路經略安撫使公以任重嘗退朝深念夫人輒請公曰曷念之深也如聞河陜之間騎卒精鋭宜若可使者適與公意合遂請以從厥後破賊卒以騎勝公還上乃特賜夫人冠帔明年公為樞密副使進封陳留郡夫人夫人曰公在西樞我從公貴而吾母尚未命願以今恩施及幽竁可乎公為言之于是追封溫氏旌德縣太君後公謝事居符離以真自適與世淡若無意家事無大小決于夫人公自以不憂而內外之姻至所以應之皆顧禮公薨未始少惰蓋十有六年如公之存一日也先是公考妣葬蘭亭即其地置寺賜名資慶顯尊禪院因以私田二千餘畝贍其僧及公從葬夫人又令葺其宇上嵗益以山隂之田四頃由是孫氏之阡長以完善夫人吾從母也有才智持家頗嚴甚遇事以理取勝雖公不能無屈亦天下竒女子也一男之敏承事郎年少耳見義輒為善與人交重然諾有威敏之風實能祗事夫人諧之以孝然其鞠養成就至于如此蓋夫人之德也三女子長適朝散郎胡宗堯次適太子中舍蘇炳次適河東轉運判官奉議郎莊公嶽其適宗堯公嶽者皆已亡夫人春秋六十有五元豐四年六月六日以疾卒之敏將以某月某日葬祔公之墓乃來速銘銘曰夫人之才威敏是資惜也女子而止于斯克紹厥家一子而足彼雖多子有不能續作此新銘載以吉玉墓表沈君墓表居士諱鋭字蓄之其先吳興人仕錢氏及俶納土遂遷桐川因家焉曾大父某大父某父某皆不仕桐川之沈分散扶疏至居士蓋四世矣居士少尚氣節博讀子史百家之言雖星經卜志無所不習晚學佛書解其理喜為詩文善飲酒與賓客燕私談笑每終日忘其力之憊也出入閭巷里人目而敬之春秋六十有二卒于熙寧六年十有二月丙戌以八年八月乙酉葬其墓在廣德鄉義和里丹井山先塋之側未卒兩月嘗語人曰人生一世如夜托逆旅方六七十則雞唱之時也睡餘飛夢不旋頃而覺則又行而之彼矣因賦詩以道前意子三人曰某曰憑曰某憑賜同進士出身女三人已嫁皆先居士卒桐川之俗初不趨學讀書者輒笑之居士獨使憑學憑有文行吾逰之賢者也治平三年今大丞相王公守金陵以緒餘成學者而某也實並羣英之逰方是時初識憑面愛其平粹無礙與之交淡然已成故固已卜知居士矣其後遂為同年之友憑遂起家而華其鄉里然人不多憑之能慰其父而多居士之善教子也夫人某氏亦有懿行孝于舅姑友于娣姒善相其夫而母三男三女以慈後居士六月亦卒貴溪縣丞程君天民墓表尚書都官郎中程公諱迪有子曰天民字行可未冠舉進士中甲科後二年始應銓格進所撰詩書論以洪州司法參軍充相州州學教授遷瀛州防禦推官知衢州西安縣事充饒州州學教授丁外艱服除調信州貴溪縣丞以疾卒于智亭實元豐九年正月十三日也享年三十二葬以八月二十四日墓在其鄉三衢雲臺大澳之原君幼則聰敏不好兒弄日誦數千言成童屬文操紙立就及出仕宦恂恂一年少爾然為學官有師法為縣有吏治熙寧中豫暨行可嘗試開封進士是時神考相王文公作成治法初以經術造士其被命考校者至數十人稱一時之選余于其間愛行可受才俊邁而造行粹良竊謂異時當為國器即今雖未備成蓋詩所謂金玉其相者也傳曰金錫鍊而精琮璧性有質此衛武公得數九十有五更事閲理既老而益精故詩人歌之道盛德至善民之不能忘也嗟乎行可雖受道之質可謂美矣然閲世未久不幸短命以死誠使黃髮兒齒台背如古之人其所至豈易量哉有文集若干卷亦可以觀其志也夫人尚書左丞鄧公諱潤甫之女生男曰俱今為假承務郎女二人適太廟齋郎樓彥升婺東陽縣主簿朱耜俱能自樹立甚似行可其續大前人之光將在于此故樂為之道使歸揭石焉朝請大夫鄭公墓表公姓鄭氏名惇忠字景孚其先陳留人今徙潤州丹徒皇考諱向在真宗時試禮部賦政本于天為第一有露灑慈愛霜嚴興彝之語都人至以書錦屛紈扇而四方學者競傳誦之一時聲名藉甚及廷試遂中甲科家藏書萬餘卷考其平生趣操蓋清慎君子也官至尚書兵部郎中職至龍圖閣直學士知杭州卒公天聖十年始以皇考奏補守將作監主簿五遷太子中舍賜緋章服又五遷尚書比部郎中會更官制改授朝請大夫賜紫章服歷監潤州台州滁州三商稅務知明州奉化湖州歸安洋州西鄉三縣通判衢州又通判沂州知筠州遂致仕公為人有美質粹然天成見之使人愛慕殆詩所謂溫其如玉者也夫人何氏尚書職方郎中知止之女亦有賢行初封孝義縣君再封仁和熙寧中佃娶夫人長女居公之家久見公為政篤于惠愛如其名而夫人孝義仁和如其號常譽嘆之不足已而宦學往來鶉居無常處率五六年一相值逮今更數十寒暑蓋再見而無夫人又一見而無公矣嗚呼生者逆旅也豈不信哉夫人以元豐六年正月丁亥卒年五十七公以元祐二年六月乙酉卒年六十一合葬黃州黃岡縣永安鄉之原嵗在大荒落月在丙日丙辰也二男子夷逸黃州司理參軍夷道太廟齋郎四女子壻曰瀛州防禦推官周夀歙州軍事判官沈竦右班殿直曹彥輔其一即佃也孫男四人皆尚幼竊嘗聞之死而不亡者夀蓋非聲名之粗事也然世之人才共以此為不泯故佃載公暨夫人之迹使葬而揭之石且告後世焉亦得而已也行狀周氏夫人行狀夫人周氏越州山隂人初事府君年二十有六矣天性勤儉不務華飾奉嫡夫人孫氏能以禮不以府君之愛輒懈也嫡夫人久而愛之屬以內事康定中傅氏之族蕃衍日大而府君以不足于養為憂去城之東湖得童山廢田百頃又得浪港廢陂數百畝府君以千金易之曰田將種之粳稌而陂將養之芻葦也顧諸子尚幼又欲令力學以世其家問誰可主者意在夫人而夫人承其意府君喜曰汝才真可以此付也故常往來童山獨為提其大要而以其節目任之凡所以更革而新之者出于夫人之謀十三四也居久之生事就緒嵗有餘入而府君無內顧之憂者實夫人之助也慶厯中嫡夫人卒皇祐中府君卒夫人尚居山中又十餘年逮族人析生夫人已白首矣始歸于家謝去生事而誦浮圖之書以永日生子二人長璟舉進士次珫早亡常謂二子曰吾所以望汝者不在于應舉覓官在于力學以為善士不為鄉人之所輕則吾志足矣二子就學夫人出奩中物供其求無秋毫愛也將卒雖衣衾有所不完而未嘗介意璟尚古喜學與其從兄稱于鄉里號諸傅云而今右正言直集賢院孫公愛其文行以其子妻之則其母之所存可知也享年六十有五卒于熙寧三年十二月初六日邊氏夫人行狀原注借龔深之待制名撰夫人楚丘人兵部郎中樞密直學士贈兵部侍郎邊公諱肅之孫兵部員外郎贈開府儀同三司諱調之女吏部郎中直昭文館贈諫議大夫陸公諱軫之婦國子博士贈正議大夫諱圭之妻初諫議在三司為鹽鐵判官得疾危惙子弟幼家人惶擾不知所為儀同至誠惻怛躬率國醫治之日三候門恩義甚篤吏部既愈以故願通婚姻夫人十五而嫁十六而字子薰然孝慈族中老婦壯母自以為不及平居自奉儉薄不服犀玉珠貝之飾不好出入逰觀所至官舍未嘗臨御窗有池臺花木之勝雖近不覿若汝隂所謂西湖南陽百花洲金陵小金山皆天下名園去州宅才跬步子孫強之為一至而止日常焚香誦經持念諸佛名號數珠為屢絶其婉娩聽從出于天性非有保阿傅姆珩璜琚瑀如古也而言應詩禮行中圖史為諸女法人以為難生四男子佖右朝奉郎通判楚州佃左朝奉大夫龍圖閣待制知江寧府傳左奉議郎僉書鎮東軍節度判官廳公事倚杭州餘杭縣尉孫十有三人表民長民一夔師稷師契師益舉進士宦字右承務郎守宰宲宥邃尚幼孫女十人四人已嫁壻曰鄉貢進士王珙瀛州防禦推官知婺州浦江縣吳孝能左宣德郎知開封府封丘縣周邦式池州司理參軍李知剛曾孫男女四人景德中契丹犯澶淵侍郎是時守邢州詔聽棄城以便宜從事侍郎匿詔書閉門拒敵全活數十萬人河朔父老尚能言之今夫人白首孫曾滿前有笄有冠亦有攜抱夀考光大克享備福蓋邢州隂德積纍之厚實在于此纍封永嘉郡太君元祐八年二月八日卒疾亟子孫涕泣問所欲言者夫人曰吾平生方寸不昧神天雖使僕妾常加假借至于貓狗未嘗妄叱也自視無罪悔又姊妹間吾夀最高子孫最盛大豈復有所言哉矧今往生鄧氏矣亦樂處也毋用修營佛事享年六十有九諸孤卜以十月二日合葬寶峯山正議之墓原深之與夫人諸子逰案此句原本脫深之二字據此文係借龔深之名撰則此處應有此二字今增入于待制嘗同寮尤相好也審聞夫人家行之美姑次第之以俟當世法言之君子志焉而納之墓陶山集卷十六
